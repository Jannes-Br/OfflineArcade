      // 3. Draw Owned Territories on top of playable cells
      for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows; r++) {
          const cell = grid[c][r];
          if (cell.void || cell.owner === null) continue;

          const owner = players.find(p => p.id === cell.owner);
          if (owner && !owner.dead) {
            const rx = padX + c * cellSize;
            const ry = padY + r * cellSize;
            ctx.fillStyle = owner.color;
            ctx.globalAlpha = 0.45;
            ctx.fillRect(rx + 0.5, ry + 0.5, cellSize - 1, cellSize - 1);
            
            ctx.strokeStyle = owner.color;
            ctx.globalAlpha = 0.75;
            ctx.lineWidth = 1;
            ctx.strokeRect(rx + 0.5, ry + 0.5, cellSize - 1, cellSize - 1);
            ctx.globalAlpha = 1.0;
          }
        }
      }

      // 4. Draw Active Trails directly from player coordinates
      players.forEach(p => {
        if (p.dead) return;
        ctx.fillStyle = p.color; // Vibrant main solid color
        ctx.globalAlpha = 0.85;  // Strong solid-looking trail
        p.trail.forEach(t => {
          const rx = padX + t.c * cellSize;
          const ry = padY + t.r * cellSize;
          ctx.fillRect(rx + 0.5, ry + 0.5, cellSize - 1, cellSize - 1);
        });
        ctx.globalAlpha = 1.0;
      });

      // Subtle grid line overlays
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= cols; c++) {
        ctx.beginPath();
        ctx.moveTo(padX + c * cellSize, padY);
        ctx.lineTo(padX + c * cellSize, padY + rows * cellSize);
        ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        ctx.beginPath();
        ctx.moveTo(padX, padY + r * cellSize);
        ctx.lineTo(padX + cols * cellSize, padY + r * cellSize);
        ctx.stroke();
      }

      // 4. Draw Heads, Eyes & Nametags
      players.forEach(p => {
        if (p.dead) return;

        const rx = padX + p.x * cellSize;
        const ry = padY + p.y * cellSize;

        // Head
        ctx.fillStyle = p.headColor;
        
        let glowSize = 10;
        let isRaging = p.isBot && p.rageTimer > 0;
        if ((gameState === 'playing' && spawnTimer > 0) || isRaging) {
          const pulse = 0.5 + 0.5 * Math.sin(performance.now() * (isRaging ? 0.02 : 0.008));
          glowSize = 5 + pulse * 25;
          ctx.globalAlpha = 0.4 + pulse * 0.6;
        }
        
        ctx.shadowBlur = glowSize;
        ctx.shadowColor = p.color;
        
        ctx.beginPath();
        ctx.roundRect(rx + 0.5, ry + 0.5, cellSize - 1, cellSize - 1, 3);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;

        // Eyes
        ctx.fillStyle = '#000000';
        const eyeSize = Math.max(1.5, cellSize * 0.15);
        const eyeOffset = cellSize * 0.2;
        
        if (p.vx === 1) {
          ctx.fillRect(rx + cellSize - eyeSize - 1, ry + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(rx + cellSize - eyeSize - 1, ry + cellSize - eyeSize - eyeOffset, eyeSize, eyeSize);
        } else if (p.vx === -1) {
          ctx.fillRect(rx + 1, ry + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(rx + 1, ry + cellSize - eyeSize - eyeOffset, eyeSize, eyeSize);
        } else if (p.vy === 1) {
          ctx.fillRect(rx + eyeOffset, ry + cellSize - eyeSize - 1, eyeSize, eyeSize);
          ctx.fillRect(rx + cellSize - eyeSize - eyeOffset, ry + cellSize - eyeSize - 1, eyeSize, eyeSize);
        } else if (p.vy === -1) {
          ctx.fillRect(rx + eyeOffset, ry + 1, eyeSize, eyeSize);
          ctx.fillRect(rx + cellSize - eyeSize - eyeOffset, ry + 1, eyeSize, eyeSize);
        }

        // Small Nametag
        ctx.font = '700 9px Fredoka';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
        ctx.fillText(p.name, rx + cellSize/2, ry - 4);
      });

      // 5. Draw Death Particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      });
      ctx.globalAlpha = 1.0;

      // 6. Draw Countdown overlay
      if (gameState === 'playing' && spawnTimer > 0) {
        // No countdown text, players just softly pulse in place
      }
    }

    // WebRTC Authoritative state sync
    function broadcastState(forceGrid = false) {
      if (gameMode !== 'multi' || mpRole !== 'host') return;

      const hostData = {
        players: players.map(p => ({
          id: p.id,
          name: p.name,
          color: p.color,
          trailColor: p.trailColor,
          headColor: p.headColor,
          x: p.x,
          y: p.y,
          vx: p.vx,
          vy: p.vy,
          trail: p.trail,
          dead: p.dead,
          score: p.score,
          kills: p.kills
        })),
        gameState: gameState,
        paused: paused,
        spawnTimer: spawnTimer,
        particles: particles.map(p => ({
          x: p.x, y: p.y, vx: p.vx, vy: p.vy, size: p.size, color: p.color, life: p.life, decay: p.decay
        }))
      };

      if (forceGrid) {
        // Compress grid owners to 2D array
        const compressedGrid = grid.map(col => col.map(cell => cell.owner !== null ? cell.owner : 0));
        hostData.grid = compressedGrid;
      }

      gameMP.send('move', {
        game: 'paper-io',
        data: hostData
      });
    }

    // Multiplayer Event Receivers (Guest processes incoming Host ticks)
    let onMoveHandler, onSteerHandler, onPauseHandler, onRestartHandler;
    
    function setupMultiplayerEvents() {
      if (mpRole === 'guest') {
        onMoveHandler = ({ game, data }) => {
          if (game !== 'paper-io') return;

          // Sync game states
          gameState = data.gameState;
          paused = data.paused;
          spawnTimer = data.spawnTimer;

          // Re-instantiate players
          players = data.players.map(p => ({
            ...p,
            isBot: p.id > 2 // Bots are ID 3+
          }));

          // Sync scoreboard
          const guestP = players[1]; // Guest is Player 2
          if (guestP && !guestP.dead) {
            scoreVal.textContent = `${guestP.score}%`;
            killsVal.textContent = guestP.kills;
          }
          updateLeaderboard();
          updateOverlay();

          // Sync particles
          particles = data.particles || [];

          // Sync grid (if sent on change)
          if (data.grid) {
            const compressed = data.grid;
            for (let c = 0; c < cols; c++) {
              for (let r = 0; r < rows; r++) {
                grid[c][r].owner = compressed[c][r] === 0 ? null : compressed[c][r];
              }
            }
          }

          // Clear all trails in local grid and reset them from players list
          for (let c = 0; c < cols; c++) {
            for (let r = 0; r < rows; r++) {
              grid[c][r].trail = null;
            }
          }
          players.forEach(p => {
            if (!p.dead) {
              p.trail.forEach(t => {
                if (t.c >= 0 && t.c < cols && t.r >= 0 && t.r < rows) {
                  grid[t.c][t.r].trail = p.id;
                }
              });
            }
          });
        };
        gameMP.on('move', onMoveHandler);
      }

      if (mpRole === 'host') {
        // Receive steering commands from guest
        onSteerHandler = (data) => {
          const guestP = players[1];
          if (guestP && !guestP.dead) {
            guestP.nextVx = data.vx;
            guestP.nextVy = data.vy;
          }
        };
        gameMP.on('steer', onSteerHandler);
      }

      onPauseHandler = (data) => {
        if (mpRole === 'guest') {
          paused = data.paused;
          pauseBtn.textContent = paused ? '▶' : 'II';
          updateOverlay();
        }
      };
      gameMP.on('pause_change', onPauseHandler);

      onRestartHandler = (data) => {
        if (data && data.game === 'paper-io' && mpRole === 'guest') {
          mapSizeSel.value = data.mapSize;
          mapShapeSel.value = data.mapShape;
          if (data.botsCount !== undefined) {
            botsCountSel.value = data.botsCount;
          } else {
            botsCountSel.value = data.enableBots ? 3 : 0;
          }
          if (data.inheritTerritory !== undefined) {
            inheritTerritorySel.value = data.inheritTerritory;
          }
          loadSettingsFromDOM();
          restartGame();
        }
      };
      gameMP.on('restart_game', onRestartHandler);
    }

    // Clean up WebRTC listeners
    window.addEventListener('unload', () => {
      if (gameMode === 'multi' && gameMP) {
        if (onMoveHandler) gameMP.off('move', onMoveHandler);
        if (onSteerHandler) gameMP.off('steer', onSteerHandler);
        if (onPauseHandler) gameMP.off('pause_change', onPauseHandler);
        if (onRestartHandler) gameMP.off('restart_game', onRestartHandler);
      }
    });

    // Main Loop delta tracking
    let lastTime = performance.now();
    let physicsAccumulator = 0;
    const physicsStep = 100; // 10 Hz physics step

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      if ((gameState === 'playing' || gameState === 'spectating') && !paused) {
        physicsAccumulator += dt;
        while (physicsAccumulator >= physicsStep) {
          step(physicsStep);
          physicsAccumulator -= physicsStep;
        }
      }

      updateParticles();
      draw();

      requestAnimationFrame(loop);
    }

    overlayBtn.addEventListener('click', () => {
      initAudio();
      triggerRestart(true);
      overlayBtn.blur();
    });

    spectateBtn.addEventListener('click', () => {
      initAudio();
      wasSpectating = true;
      gameState = 'spectating';
      overlay.classList.remove('visible');
      spectateBtn.style.display = 'none';
    });

    function setupButtonGroup(groupId, onChange) {
      const group = document.getElementById(groupId);
      if (!group) return;
      const buttons = group.querySelectorAll('.opt-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (gameMode === 'multi' && mpRole === 'guest') return;
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          btn.blur();
          onChange();
        });
      });
    }

    // Trigger Mode Options
    setupButtonGroup('mapSizeGroup', () => triggerRestart(true));
    setupButtonGroup('mapShapeGroup', () => triggerRestart(true));
    setupButtonGroup('botsCountGroup', () => triggerRestart(true));
    setupButtonGroup('inheritTerritoryGroup', () => {});

    initMode();
    initGrid();
    overlay.classList.add('visible');
    requestAnimationFrame(loop);
  </script>
</body>
</html>
