<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tic Tac Toe – OfflineArcade</title>

  <style>
    /* ── Variables ── */
    :root {
      --bg-color: #f8fafc;
      --text-color: #0f172a;
      --text-gradient: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      --bg-radial-1: rgba(59,130,246,0.08);
      --bg-radial-2: rgba(147,51,234,0.08);
      --bg-linear: linear-gradient(180deg,#ffffff 0%,#f1f5f9 100%);
      --box-bg: rgba(255,255,255,0.7);
      --box-border: rgba(0,0,0,0.08);
      --box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      --btn-bg: rgba(0,0,0,0.04);
      --btn-border: rgba(0,0,0,0.08);
      --btn-color: #0f172a;
      --btn-hover-bg: rgba(0,0,0,0.08);
      --btn-hover-border: rgba(59,130,246,0.4);
      --btn-active-bg: #3b82f6;
      --btn-active-color: white;
      --cell-bg: rgba(0,0,0,0.03);
      --cell-hover-bg: rgba(0,0,0,0.06);
      --cell-border: rgba(0,0,0,0.06);
      --score-bg: rgba(0,0,0,0.03);
      --score-border: rgba(0,0,0,0.04);
      --score-title: #475569;
      --winner-color: #3b82f6;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.35);
    }
    body.dark-mode {
      --bg-color: #0f172a;
      --text-color: #ffffff;
      --text-gradient: linear-gradient(135deg,#ffffff 0%,#cbd5e1 100%);
      --bg-radial-1: rgba(76,201,240,0.18);
      --bg-radial-2: rgba(99,102,241,0.18);
      --bg-linear: linear-gradient(180deg,#111827 0%,#0b1120 100%);
      --box-bg: rgba(255,255,255,0.06);
      --box-border: rgba(255,255,255,0.08);
      --box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      --btn-bg: rgba(255,255,255,0.08);
      --btn-border: rgba(255,255,255,0.1);
      --btn-color: #ffffff;
      --btn-hover-bg: rgba(255,255,255,0.16);
      --btn-hover-border: rgba(76,201,240,0.4);
      --btn-active-bg: #38bdf8;
      --btn-active-color: #0f172a;
      --cell-bg: rgba(255,255,255,0.05);
      --cell-hover-bg: rgba(255,255,255,0.1);
      --cell-border: rgba(255,255,255,0.06);
      --score-bg: rgba(255,255,255,0.04);
      --score-border: rgba(255,255,255,0.05);
      --score-title: #94a3b8;
      --winner-color: #4cc9f0;
      --accent: #38bdf8;
      --accent-glow: rgba(56,189,248,0.35);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text-color);background:var(--bg-color);transition:color .3s,background-color .3s;}
    body{position:fixed;inset:0;}

    .background{position:fixed;inset:0;background:radial-gradient(circle at top right,var(--bg-radial-1),transparent 35%),radial-gradient(circle at bottom left,var(--bg-radial-2),transparent 35%),var(--bg-linear);z-index:0;transition:background .4s;}

    /* ── Header ── */
    .game-header{position:fixed;top:0;left:0;right:0;padding:max(16px,env(safe-area-inset-top)) 16px 10px;display:flex;justify-content:space-between;align-items:center;z-index:100;pointer-events:none;}
    .back-btn,#mute-btn,#chat-btn{pointer-events:auto;border:none;background:var(--box-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--box-border);color:var(--text-color);padding:8px 14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:transform .2s,background-color .2s,border-color .2s;box-shadow:0 4px 12px rgba(0,0,0,.05);}
    #mute-btn,#chat-btn{width:38px;height:38px;padding:0;font-size:16px;position:relative;}
    .back-btn:hover,#mute-btn:hover,#chat-btn:hover{transform:translateY(-2px);background:var(--btn-hover-bg);border-color:var(--btn-hover-border);}
    .back-btn:active,#mute-btn:active,#chat-btn:active{transform:scale(.95);}
    .header-right{display:flex;gap:8px;pointer-events:auto;}
    .chat-badge-hdr{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid var(--bg-color);}

    /* Mode badge shown in header */
    .mode-badge{display: none !important;}

    /* ── Container ── */
    .container{position:relative;z-index:1;width:100%;height:100%;display:flex;justify-content:center;align-items:center;padding:72px 16px 20px;}

    /* ── Game Box ── */
    .game-box{width:100%;max-width:420px;background:var(--box-bg);border:1px solid var(--box-border);border-radius:28px;padding:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--box-shadow);transition:background-color .3s,border-color .3s,box-shadow .3s;}
    .title{text-align:center;font-size:34px;font-weight:800;margin-bottom:4px;background:var(--text-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .subtitle{text-align:center;color:var(--score-title);margin-bottom:18px;font-size:13px;}

    /* ── Difficulty (bot only) ── */
    .difficulty-select{display:flex;gap:8px;margin-bottom:14px;}
    button{border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background-color .2s,transform .1s,border-color .2s,color .2s;}
    .diff-btn{flex:1;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-color);}
    .diff-btn.active{background:var(--btn-active-bg);color:var(--btn-active-color);border-color:var(--btn-active-bg);box-shadow:0 4px 12px var(--accent-glow);}
    .diff-btn:hover{background:var(--btn-hover-bg);border-color:var(--btn-hover-border);}

    /* ── Board ── */
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
    .cell{aspect-ratio:1;background:var(--cell-bg);border:1px solid var(--cell-border);border-radius:20px;display:flex;justify-content:center;align-items:center;font-size:48px;font-weight:800;cursor:pointer;transition:transform .2s,background-color .2s,border-color .2s;user-select:none;}
    .cell:hover:not(.taken){transform:scale(1.03);background:var(--cell-hover-bg);border-color:var(--btn-hover-border);}
    .cell.taken{cursor:default;}
    @keyframes popIn{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    .cell.pop{animation:popIn .22s cubic-bezier(.175,.885,.32,1.275) forwards;}
    @keyframes winGlow{0%,100%{box-shadow:0 0 10px rgba(59,130,246,.4);background:rgba(59,130,246,.1);transform:scale(1)}50%{box-shadow:0 0 25px rgba(59,130,246,.8);background:rgba(59,130,246,.3);transform:scale(1.05)}}
    @keyframes winGlowDark{0%,100%{box-shadow:0 0 10px rgba(76,201,240,.4);background:rgba(76,201,240,.1);transform:scale(1)}50%{box-shadow:0 0 25px rgba(76,201,240,.8);background:rgba(76,201,240,.3);transform:scale(1.05)}}
    .cell.win{animation:winGlow .8s infinite ease-in-out;border-color:#3b82f6!important;color:white!important;z-index:2;}
    body.dark-mode .cell.win{animation:winGlowDark .8s infinite ease-in-out;border-color:#4cc9f0!important;}
    .x{color:#3b82f6;text-shadow:0 0 10px rgba(59,130,246,.2);}
    body.dark-mode .x{color:#38bdf8;text-shadow:0 0 10px rgba(56,189,248,.3);}
    .o{color:#ef4444;text-shadow:0 0 10px rgba(239,68,68,.2);}
    body.dark-mode .o{color:#f43f5e;text-shadow:0 0 10px rgba(244,63,94,.3);}

    /* Waiting indicator (online: other player's turn) */
    .cell.waiting-turn{opacity:.4;cursor:not-allowed;}
    .cell.waiting-turn:hover{transform:none;background:var(--cell-bg);}

    /* ── Status ── */
    .status{text-align:center;margin-top:14px;font-size:15px;font-weight:700;color:var(--text-color);min-height:24px;}

    /* ── Online opponent indicator ── */
    .opponent-bar{display:none;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(56,189,248,.08));border:1px solid rgba(34,197,94,.25);border-radius:16px;}
    .opponent-bar.show{display:flex;}
    .opp-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
    .opp-name{font-size:13px;font-weight:700;}
    .opp-role{font-size:11px;opacity:.55;margin-top:1px;}

    /* ── Scoreboard ── */
    .scoreboard{display:flex;justify-content:space-between;gap:10px;margin-top:16px;}
    .score{flex:1;background:var(--score-bg);border:1px solid var(--score-border);padding:10px;border-radius:16px;text-align:center;transition:background-color .3s,border-color .3s;}
    .score-title{color:var(--score-title);margin-bottom:4px;font-size:12px;font-weight:600;}
    .score-value{font-size:22px;font-weight:800;}

    /* ── Controls ── */
    .controls{margin-top:16px;display:flex;gap:10px;}
    .control-btn{flex:1;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-color);}
    .control-btn:hover{background:var(--btn-hover-bg);border-color:var(--btn-hover-border);transform:translateY(-1px);}
    .control-btn:active{transform:scale(.97);}

    /* ── Landscape ── */
    @media(max-height:550px) and (orientation:landscape){
      .container{padding:55px 12px 10px;height:auto;min-height:100vh;}
      .game-box{max-width:680px;display:grid;grid-template-columns:1fr 1.1fr;gap:20px;padding:16px;align-items:center;}
      .title-section{display:flex;flex-direction:column;justify-content:center;}
      .title{font-size:22px;}
      .subtitle{font-size:12px;margin-bottom:8px;}
      .difficulty-select{margin-bottom:6px;gap:6px;}
      button{padding:8px 10px;font-size:13px;border-radius:10px;}
      .board{margin-top:0;gap:8px;}
      .cell{font-size:34px;border-radius:14px;}
      .scoreboard{margin-top:8px;gap:6px;}
      .score{padding:6px;border-radius:12px;}
      .score-title{font-size:11px;margin-bottom:2px;}
      .score-value{font-size:16px;}
      .controls{margin-top:8px;gap:6px;}
      .status{margin-top:8px;font-size:14px;}
      .opponent-bar{margin-bottom:8px;}
    }
    @media(max-width:360px){
      .game-box{padding:16px;}
      .title{font-size:26px;}
      .cell{font-size:36px;}
    }

    /* ── Chat overlay (inline, not main.js dependent) ── */
    .chat-overlay-local{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;}
    .chat-overlay-local.open{opacity:1;pointer-events:auto;}
    .chat-drawer-local{position:fixed;right:0;top:0;bottom:0;width:min(340px,92vw);background:var(--box-bg);border-left:1px solid var(--box-border);z-index:400;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.2);}
    .chat-drawer-local.open{transform:translateX(0);}
    .chat-header-local{display:flex;align-items:center;justify-content:space-between;padding:max(52px,env(safe-area-inset-top)) 16px 14px;border-bottom:1px solid var(--box-border);flex-shrink:0;}
    .chat-title-local{font-size:16px;font-weight:800;}
    .chat-close-local{border:1px solid var(--btn-border);background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text-color);width:30px;height:30px;border-radius:9px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .chat-messages-local{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
    .chat-msg-local{max-width:80%;padding:8px 13px;border-radius:18px;font-size:14px;line-height:1.4;word-break:break-word;}
    .chat-msg-local.mine{align-self:flex-end;background:var(--btn-active-bg);color:var(--btn-active-color);border-bottom-right-radius:4px;}
    .chat-msg-local.theirs{align-self:flex-start;background:var(--cell-bg);border:1px solid var(--cell-border);border-bottom-left-radius:4px;}
    .chat-name-local{font-size:10px;font-weight:700;opacity:.55;margin-bottom:3px;}
    .chat-input-row-local{display:flex;gap:8px;padding:10px 14px 8px;border-top:1px solid var(--box-border);flex-shrink:0;}
    .chat-disclaimer-local{font-size:10px;opacity:.4;text-align:center;padding:4px 14px max(8px,env(safe-area-inset-bottom));line-height:1.4;flex-shrink:0;}
    .chat-input-local{flex:1;padding:9px 13px;background:var(--cell-bg);border:1px solid var(--cell-border);border-radius:11px;color:var(--text-color);font-size:14px;outline:none;transition:border-color .2s;}
    .chat-input-local:focus{border-color:var(--accent);}
    .chat-send-local{border:none;background:var(--btn-active-bg);color:var(--btn-active-color);width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .toast-local{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(15,23,42,.92);color:#fff;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:600;z-index:700;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;backdrop-filter:blur(8px);}
    .toast-local.show{opacity:1;transform:translateX(-50%) translateY(0);}
    body.dark-mode .toast-local{background:rgba(255,255,255,.12);}
  </style>
</head>
<body>
  <div class="background"></div>

  <!-- Header -->
  <div class="game-header">
    <a href="../../index.html" class="back-btn" id="backBtn">← Menu</a>
    <span class="mode-badge" id="modeBadge">Solo</span>
    <div class="header-right">
      <button id="chat-btn" title="Chat" style="display:none;">💬<span class="chat-badge-hdr" id="chatBadgeHdr"></span></button>
      <button id="mute-btn" title="Mute audio">🔊</button>
    </div>
  </div>

  <div class="container">
    <div class="game-box">
      <div class="title-section">
        <div class="title">Tic Tac Toe</div>
        <div class="subtitle" id="subtitle">Play against a friend or smart AI.</div>

        <!-- Opponent bar (online mode only) -->
        <div class="opponent-bar" id="opponentBar">
          <div class="opp-avatar" id="oppAvatar">?</div>
          <div>
            <div class="opp-name" id="oppName">Opponent</div>
            <div class="opp-role" id="oppRole">O</div>
          </div>
        </div>

        <!-- Difficulty (bot mode only) -->
        <div class="difficulty-select" id="difficultyBox" style="display:none;">
          <button class="diff-btn active" data-diff="easy">Easy</button>
          <button class="diff-btn" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
      </div>

      <div>
        <div class="board" id="board"></div>
        <div class="status" id="status">X Turn</div>
        <div class="scoreboard">
          <div class="score">
            <div class="score-title" id="xLabel">X Wins</div>
            <div class="score-value" id="xScore">0</div>
          </div>
          <div class="score">
            <div class="score-title">Draws</div>
            <div class="score-value" id="drawScore">0</div>
          </div>
          <div class="score">
            <div class="score-title" id="oLabel">O Wins</div>
            <div class="score-value" id="oScore">0</div>
          </div>
        </div>
        <div class="controls">
          <button class="control-btn" id="restartBtn">Restart</button>
          <button class="control-btn" id="resetBtn">Reset Score</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Local Chat (for multiplayer) -->
  <div class="chat-overlay-local" id="chatOverlay"></div>
  <div class="chat-drawer-local" id="chatDrawer">
    <div class="chat-header-local">
      <span class="chat-title-local">💬 Chat – <span id="chatWith">Opponent</span></span>
      <div style="display:flex; gap: 6px;">
        <button class="chat-close-local" id="chatDeleteBtn" title="Clear chat history" style="margin-right: 0; font-size: 13px;">🗑️</button>
        <button class="chat-close-local" id="chatClose">✕</button>
      </div>
    </div>
    <div class="chat-messages-local" id="chatMessages"></div>

    <!-- Confirm chat deletion box -->
    <div id="chatConfirmDelete" style="display:none; position:absolute; inset: 0; background:rgba(15,23,42,0.9); backdrop-filter:blur(6px); z-index:500; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:16px;">
      <div style="font-size:16px; font-weight:800; text-align:center; color:white;">Delete chat history?</div>
      <div style="font-size:12px; opacity:0.6; text-align:center; color:rgba(255,255,255,0.7);">This action cannot be undone.</div>
      <div style="display:flex; gap:12px; width:100%;">
        <button class="overlay-btn" id="confirmDeleteYes" style="flex:1; background:#ef4444; color:white; border-color:transparent; padding: 10px; font-size: 13px; font-weight: 700; border-radius: 10px;">Yes</button>
        <button class="overlay-btn" id="confirmDeleteNo" style="flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); padding: 10px; font-size: 13px; font-weight: 700; border-radius: 10px;">Cancel</button>
      </div>
    </div>

    <div class="chat-input-row-local">
      <input type="text" class="chat-input-local" id="chatInput" placeholder="Message…" maxlength="200">
      <button class="chat-send-local" id="chatSend">➤</button>
    </div>
    <p class="chat-disclaimer-local">Chats are stored locally on your device (max 100 messages).</p>
  </div>

  <div class="toast-local" id="toast"></div>

  <script src="../../multiplayer.js"></script>
  <script>
    // Use parent MP if available (running inside iframe), otherwise fall back to local MP
    const gameMP = (window.parent && window.parent !== window && window.parent.MP) ? window.parent.MP : MP;
    if (gameMP && typeof gameMP.clearGameListeners === 'function') {
      gameMP.clearGameListeners();
    }

    /* ══════════════════════════════════════════════════════
       Tic Tac Toe – 3 modes: solo | bot | multi
       Mode comes from localStorage('gameMode')
       ══════════════════════════════════════════════════════ */

    const gameMode  = localStorage.getItem('gameMode') || 'solo'; // solo | bot | multi
    const myName    = localStorage.getItem('playerName') || 'You';
    const mpRole    = (gameMP.role === 'host') ? 'X' : 'O';

    /* ── Elements ── */
    const boardEl       = document.getElementById('board');
    const statusText    = document.getElementById('status');
    const difficultyBox = document.getElementById('difficultyBox');
    const diffButtons   = document.querySelectorAll('.diff-btn');
    const restartBtn    = document.getElementById('restartBtn');
    const resetBtn      = document.getElementById('resetBtn');
    const muteBtn       = document.getElementById('mute-btn');
    const modeBadge     = document.getElementById('modeBadge');
    const subtitle      = document.getElementById('subtitle');
    const opponentBar   = document.getElementById('opponentBar');
    const oppAvatar     = document.getElementById('oppAvatar');
    const oppName       = document.getElementById('oppName');
    const oppRole       = document.getElementById('oppRole');
    const chatBtn       = document.getElementById('chat-btn');
    const chatBadgeHdr  = document.getElementById('chatBadgeHdr');
    const chatOverlay   = document.getElementById('chatOverlay');
    const chatDrawer    = document.getElementById('chatDrawer');
    const chatClose     = document.getElementById('chatClose');
    const chatDeleteBtn   = document.getElementById('chatDeleteBtn');
    const chatConfirmDelete = document.getElementById('chatConfirmDelete');
    const confirmDeleteYes = document.getElementById('confirmDeleteYes');
    const confirmDeleteNo = document.getElementById('confirmDeleteNo');
    const chatMessages  = document.getElementById('chatMessages');
    const chatWith      = document.getElementById('chatWith');
    const chatInput     = document.getElementById('chatInput');
    const chatSend      = document.getElementById('chatSend');
    const xLabel        = document.getElementById('xLabel');
    const oLabel        = document.getElementById('oLabel');
    const xScoreEl      = document.getElementById('xScore');
    const oScoreEl      = document.getElementById('oScore');
    const drawScoreEl   = document.getElementById('drawScore');
    const backBtn       = document.getElementById('backBtn');
    const toast         = document.getElementById('toast');

    /* ── Game state ── */
    let cells        = [];
    let boardState   = Array(9).fill('');
    let currentPlayer= 'X';
    let gameActive   = true;
    let difficulty   = 'easy';
    let isMuted      = false;
    let myTurn       = true; // for online mode
    let mySymbol     = 'X';  // X or O in online mode
    let unreadChat   = 0;
    let chatHistory  = [];

    const scores = { X: 0, O: 0, draw: 0 };

    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    /* ── Theme ── */
    const theme = localStorage.getItem('theme') || 'dark';
    document.body.classList.toggle('dark-mode', theme === 'dark');

    /* ── Mute ── */
    if (localStorage.getItem('mute') === 'true') { isMuted = true; muteBtn.textContent = '🔇'; }
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      localStorage.setItem('mute', isMuted);
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    /* ── Init based on mode ── */
    function initMode() {
      if (gameMode === 'solo') {
        modeBadge.textContent    = '🎮 Solo';
        subtitle.textContent     = '2 players on one device.';
        difficultyBox.style.display = 'none';
        myTurn = true;
        xLabel.textContent = 'X Wins';
        oLabel.textContent = 'O Wins';
      } else if (gameMode === 'bot') {
        modeBadge.textContent   = '🤖 vs. Bot';
        subtitle.textContent    = 'You vs. AI – good luck!';
        difficultyBox.style.display = 'flex';
        mySymbol = 'X'; myTurn = true;
        xLabel.textContent = '👤 You';
        oLabel.textContent = '🤖 Bot';
      } else if (gameMode === 'multi') {
        modeBadge.textContent   = '📡 Online';
        subtitle.textContent    = '';
        difficultyBox.style.display = 'none';
        chatBtn.style.display   = 'flex';

        // Hide/Show restart and reset buttons depending on host authority
        if (mpRole !== 'X') {
          restartBtn.style.display = 'none';
          resetBtn.style.display = 'none';
        } else {
          restartBtn.style.display = 'block';
          resetBtn.style.display = 'block';
        }

        mySymbol  = mpRole; // X=host, O=guest
        myTurn    = (mySymbol === 'X'); // X starts

        const opponent = gameMP.opponent || localStorage.getItem('lastOpponent') || 'Opponent';
        localStorage.setItem('lastOpponent', opponent);
        chatWith.textContent    = opponent;
        oppAvatar.textContent   = opponent[0].toUpperCase();
        oppName.textContent     = opponent;
        oppRole.textContent     = `Plays ${mySymbol === 'X' ? 'O' : 'X'}`;
        opponentBar.classList.add('show');

        xLabel.textContent = mySymbol === 'X' ? '👤 You (X)' : `👤 ${opponent} (X)`;
        oLabel.textContent = mySymbol === 'O' ? '👤 You (O)' : `👤 ${opponent} (O)`;

        const key = gameMP.opponentDeviceId || 'unknown_peer';
        try {
          const fullHistory = JSON.parse(localStorage.getItem('chatHistory') || '{}');
          chatHistory = fullHistory[key] || [];
        } catch {}
        renderChatHistory();

        setupMultiplayerEvents();
        if (mySymbol === 'O') {
          gameMP.send('guest_rejoin', { game: 'tic-tac-toe' });
        }
      }
    }

    /* ── Board ── */
    function createBoard() {
      boardEl.innerHTML = '';
      cells = [];
      boardState = Array(9).fill('');
      currentPlayer = 'X';
      gameActive = true;
      statusText.textContent = currentPlayer + ' Turn';
      updateBoardInteractivity();

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.addEventListener('click', () => handleMove(i));
        boardEl.appendChild(cell);
        cells.push(cell);
      }
    }

    function updateBoardInteractivity() {
      if (gameMode !== 'multi') return;
      const myTurnNow = (currentPlayer === mySymbol) && gameActive;
      cells.forEach(c => {
        if (c.textContent !== '') return;
        c.classList.toggle('waiting-turn', !myTurnNow);
      });
      if (myTurnNow) {
        statusText.textContent = '✅ Your turn (' + mySymbol + ')';
      } else {
        statusText.textContent = '⏳ ' + (gameMP.opponent || 'Opponent') + '\'s turn…';
      }
    }

    /* ── Move handler ── */
    function handleMove(index) {
      if (!gameActive) {
        if (gameMode === 'multi' && mySymbol !== 'X') return;
        restartGame();
        return;
      }
      if (boardState[index] !== '') return;

      /* In multi: only allow move when it's my turn */
      if (gameMode === 'multi' && currentPlayer !== mySymbol) return;

      makeMove(index, currentPlayer);

      /* Send move to opponent in online mode */
      if (gameMode === 'multi') {
        gameMP.send('move', { game: 'tic-tac-toe', data: { cell: index } });
      }

      const win = checkWinner(boardState, currentPlayer);
      if (win) { endGame(win, currentPlayer); return; }
      if (boardState.every(c => c !== '')) { endDraw(); return; }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

      if (gameMode === 'bot' && currentPlayer === 'O') {
        boardEl.style.pointerEvents = 'none';
        statusText.textContent = '🤖 Bot is thinking…';
        setTimeout(() => { botMove(); boardEl.style.pointerEvents = 'auto'; }, 350);
      } else {
        if (gameMode === 'multi') {
          updateBoardInteractivity();
        } else {
          statusText.textContent = currentPlayer + ' Turn';
        }
      }
    }

    function makeMove(index, player) {
      boardState[index] = player;
      cells[index].textContent = player;
      cells[index].classList.add(player.toLowerCase(), 'pop', 'taken');
      playSound(player.toLowerCase());
    }

    function endGame(pattern, winner) {
      pattern.forEach(i => cells[i].classList.add('win'));
      scores[winner]++;
      updateScores();
      gameActive = false;
      playSound('win');

      if (gameMode === 'multi') {
        const iWon = winner === mySymbol;
        if (mySymbol === 'X') {
          statusText.textContent = (iWon ? '🎉 You won!' : `😔 ${gameMP.opponent} won!`) + ' Tap board to restart';
        } else {
          statusText.textContent = (iWon ? '🎉 You won!' : `😔 ${gameMP.opponent} won!`) + ' Waiting for Host…';
        }
      } else if (gameMode === 'bot') {
        statusText.textContent = winner === 'X' ? '🎉 You won! Tap board to restart' : '🤖 Bot wins! Tap board to restart';
      } else {
        statusText.textContent = winner + ' Wins! Tap board to restart';
      }
    }

    function endDraw() {
      scores.draw++;
      updateScores();
      gameActive = false;
      if (gameMode === 'multi') {
        if (mySymbol === 'X') {
          statusText.textContent = 'Draw! Tap board to restart';
        } else {
          statusText.textContent = 'Draw! Waiting for Host…';
        }
      } else {
        statusText.textContent = 'Draw! Tap board to restart';
      }
      playSound('draw');
    }

    function restartGame(sendNotify = true) {
      if (gameMode === 'multi') {
        myTurn = (mySymbol === 'X');
        if (sendNotify) {
          gameMP.send('restart_game');
        }
      }
      createBoard();
      if (gameMode === 'multi') updateBoardInteractivity();
    }

    function updateScores() {
      xScoreEl.textContent    = scores.X;
      oScoreEl.textContent    = scores.O;
      drawScoreEl.textContent = scores.draw;
    }

    /* ── Bot Logic (unchanged from original) ── */
    function botMove() {
      if (!gameActive) return;
      let move;
      if (difficulty === 'easy')   move = Math.random() < 0.1 ? getTacticalMove() : getRandomMove();
      else if (difficulty === 'medium') move = getMediumMove();
      else move = getBestMinimaxMove();
      handleMove(move);
    }

    function getRandomMove() {
      const empty = boardState.map((c,i) => c===''?i:null).filter(v=>v!==null);
      return empty[Math.floor(Math.random()*empty.length)];
    }
    function getTacticalMove() {
      for (let i=0;i<9;i++){if(boardState[i]===''){boardState[i]='O';if(checkWinner(boardState,'O')){boardState[i]='';return i;}boardState[i]='';}}
      for (let i=0;i<9;i++){if(boardState[i]===''){boardState[i]='X';if(checkWinner(boardState,'X')){boardState[i]='';return i;}boardState[i]='';}}
      return getRandomMove();
    }
    function getMediumMove() {
      const t=getTacticalMove();
      boardState[t]='O'; const isTac=checkWinner(boardState,'O')!==null; boardState[t]='';
      boardState[t]='X'; const isBlk=checkWinner(boardState,'X')!==null; boardState[t]='';
      if(isTac||isBlk) return t;
      if(Math.random()<0.5){if(boardState[4]==='')return 4;const c=[0,2,6,8].filter(i=>boardState[i]==='');if(c.length)return c[Math.floor(Math.random()*c.length)];}
      return getRandomMove();
    }
    function getBestMinimaxMove() {
      let best=-Infinity,move=0;
      for(let i=0;i<9;i++){if(boardState[i]===''){boardState[i]='O';const s=minimax(boardState,0,false);boardState[i]='';if(s>best){best=s;move=i;}}}
      return move;
    }
    function minimax(b,d,max) {
      if(checkWinner(b,'O')) return 10-d;
      if(checkWinner(b,'X')) return d-10;
      if(b.every(c=>c!=='')) return 0;
      if(max){let best=-Infinity;for(let i=0;i<9;i++){if(b[i]===''){b[i]='O';best=Math.max(best,minimax(b,d+1,false));b[i]='';}}return best;}
      else{let best=Infinity;for(let i=0;i<9;i++){if(b[i]===''){b[i]='X';best=Math.min(best,minimax(b,d+1,true));b[i]='';}}return best;}
    }
    function checkWinner(b, player) {
      for (const p of winPatterns) { if(p.every(i=>b[i]===player)) return p; }
      return null;
    }

    /* ── Multiplayer Events ── */
    let onMoveHandler, onChatHandler, onDisconnectedHandler, onMenuHandler, onRestartHandler, onGuestRejoinHandler, onSyncStateHandler;

    function setupMultiplayerEvents() {
      onMoveHandler = ({ data }) => {
        const { cell } = data;
        makeMove(cell, currentPlayer);
        const win = checkWinner(boardState, currentPlayer);
        if (win) { endGame(win, currentPlayer); return; }
        if (boardState.every(c=>c!=='')) { endDraw(); return; }
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateBoardInteractivity();
      };

      onChatHandler = ({ text, name }) => {
        addChatMsg(text, name, false);
        if (!chatDrawer.classList.contains('open')) {
          unreadChat++;
          chatBadgeHdr.textContent = unreadChat;
          chatBadgeHdr.style.display = 'flex';
        }
      };

      onDisconnectedHandler = () => {
        showToast(`${gameMP.opponent || 'Opponent'} disconnected.`);
        gameActive = false;
        statusText.textContent = '⚡ Connection disconnected';
      };

      onMenuHandler = () => {
        showToast(`${gameMP.opponent || 'Opponent'} returned to menu.`);
      };

      onRestartHandler = () => {
        restartGame(false);
      };

      onGuestRejoinHandler = () => {
        if (mySymbol === 'X') {
          gameMP.send('sync_state', { boardState, currentPlayer, scores });
        }
      };

      onSyncStateHandler = ({ boardState: bState, currentPlayer: currPlayer, scores: scr }) => {
        boardState = bState;
        currentPlayer = currPlayer;
        scores.X = scr.X;
        scores.O = scr.O;
        scores.draw = scr.draw;
        updateScores();
        boardState.forEach((val, idx) => {
          cells[idx].className = 'cell' + (val ? ' taken pop ' + val.toLowerCase() : '');
          cells[idx].textContent = val;
        });
        updateBoardInteractivity();
      };

      gameMP.on('move', onMoveHandler);
      gameMP.on('chat', onChatHandler);
      gameMP.on('disconnected', onDisconnectedHandler);
      gameMP.on('menu', onMenuHandler);
      gameMP.on('restart_game', onRestartHandler);
      gameMP.on('guest_rejoin', onGuestRejoinHandler);
      gameMP.on('sync_state', onSyncStateHandler);
    }

    // Clean up WebRTC listeners when iframe is closed/unloaded to prevent dead object references
    window.addEventListener('unload', () => {
      if (gameMode === 'multi' && gameMP) {
        if (onMoveHandler) gameMP.off('move', onMoveHandler);
        if (onChatHandler) gameMP.off('chat', onChatHandler);
        if (onDisconnectedHandler) gameMP.off('disconnected', onDisconnectedHandler);
        if (onMenuHandler) gameMP.off('menu', onMenuHandler);
        if (onRestartHandler) gameMP.off('restart_game', onRestartHandler);
        if (onGuestRejoinHandler) gameMP.off('guest_rejoin', onGuestRejoinHandler);
        if (onSyncStateHandler) gameMP.off('sync_state', onSyncStateHandler);
      }
    });

    /* ── Back button: send 'menu' message, don't disconnect ── */
    backBtn.addEventListener('click', (e) => {
      if (window.parent && window.parent !== window && window.parent.closeGameFrame) {
        e.preventDefault();
        window.parent.closeGameFrame();
      } else {
        if (gameMode === 'multi' && gameMP.isConnected()) {
          gameMP.send('menu');
        }
      }
      /* mpRole stays set; main page restores session */
    });

    /* ── Difficulty ── */
    diffButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        diffButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
        restartGame();
      });
    });

    restartBtn.addEventListener('click', restartGame);
    resetBtn.addEventListener('click', () => {
      Object.keys(scores).forEach(k => scores[k]=0);
      updateScores(); restartGame();
    });

    /* ── Chat ── */
    chatBtn.addEventListener('click', openChat);
    chatClose.addEventListener('click', closeChat);
    chatOverlay.addEventListener('click', closeChat);

    function openChat() {
      chatOverlay.classList.add('open');
      chatDrawer.classList.add('open');
      unreadChat = 0;
      chatBadgeHdr.style.display = 'none';
      setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 50);
    }
    function closeChat() {
      chatOverlay.classList.remove('open');
      chatDrawer.classList.remove('open');
      if (chatConfirmDelete) chatConfirmDelete.style.display = 'none';
    }

    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });

    function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      if (gameMode === 'multi' && gameMP.isConnected()) {
        gameMP.send('chat', { text, name: myName });
        if (window.parent && window.parent.addChatMessageFromGame) {
          window.parent.addChatMessageFromGame(text, myName, true);
        }
      }
      addChatMsg(text, myName, true);
      chatInput.value = '';
    }

    function addChatMsg(text, name, mine) {
      const msg = { text, name, mine };
      chatHistory.push(msg);
      if (chatHistory.length > 100) chatHistory.shift();
      const key = gameMP.opponentDeviceId || 'unknown_peer';
      try {
        const fullHistory = JSON.parse(localStorage.getItem('chatHistory') || '{}');
        fullHistory[key] = chatHistory;
        localStorage.setItem('chatHistory', JSON.stringify(fullHistory));
      } catch (e) {}
      if (chatDrawer.classList.contains('open')) {
        appendBubble(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    }

    /* Chat deletion confirmation triggers */
    if (chatDeleteBtn) {
      chatDeleteBtn.addEventListener('click', () => {
        if (chatConfirmDelete) chatConfirmDelete.style.display = 'flex';
      });
    }

    if (confirmDeleteNo) {
      confirmDeleteNo.addEventListener('click', () => {
        if (chatConfirmDelete) chatConfirmDelete.style.display = 'none';
      });
    }

    if (confirmDeleteYes) {
      confirmDeleteYes.addEventListener('click', () => {
        const key = gameMP.opponentDeviceId || 'unknown_peer';
        chatHistory = [];
        try {
          const fullHistory = JSON.parse(localStorage.getItem('chatHistory') || '{}');
          delete fullHistory[key];
          localStorage.setItem('chatHistory', JSON.stringify(fullHistory));
        } catch (e) {}
        
        if (chatMessages) chatMessages.innerHTML = '';
        if (chatConfirmDelete) chatConfirmDelete.style.display = 'none';
        showToast('Chat history cleared.');
      });
    }

    function renderChatHistory() {
      chatMessages.innerHTML = '';
      chatHistory.forEach(m => appendBubble(m));
    }

    function appendBubble({ text, name, mine }) {
      const div = document.createElement('div');
      div.className = `chat-msg-local ${mine?'mine':'theirs'}`;
      if (!mine) {
        const n = document.createElement('div');
        n.className = 'chat-name-local';
        n.textContent = name;
        div.appendChild(n);
      }
      const t = document.createElement('div');
      t.textContent = text;
      div.appendChild(t);
      chatMessages.appendChild(div);
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    /* ── Sound ── */
    function playSound(type) {
      if (isMuted) return;
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain= ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        if (type==='x')    { osc.frequency.value=523.25; gain.gain.setValueAtTime(.08,now); gain.gain.exponentialRampToValueAtTime(.01,now+.1); osc.start(now); osc.stop(now+.1); }
        else if(type==='o'){ osc.frequency.value=392.00; gain.gain.setValueAtTime(.08,now); gain.gain.exponentialRampToValueAtTime(.01,now+.1); osc.start(now); osc.stop(now+.1); }
        else if(type==='win'){
          osc.type='triangle';
          [261.63,329.63,392.00,523.25].forEach((f,i)=>osc.frequency.setValueAtTime(f,now+i*.08));
          gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.01,now+.45);
          osc.start(now); osc.stop(now+.45);
        }
        else if(type==='draw'){
          osc.type='sawtooth';
          osc.frequency.setValueAtTime(220,now); osc.frequency.linearRampToValueAtTime(110,now+.35);
          gain.gain.setValueAtTime(.08,now); gain.gain.exponentialRampToValueAtTime(.01,now+.35);
          osc.start(now); osc.stop(now+.35);
        }
      } catch(e) {}
    }

    /* ── Start ── */
    initMode();
    createBoard();
  </script>
</body>
</html>
