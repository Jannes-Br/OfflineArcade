<style>
* {

  padding: 0;
  box-sizing: border-box;

<body>

<div class="container">
  <div class="game-box">

    <div class="title">Tic Tac Toe</div>

    <div class="subtitle">
      Play against a friend or smart AI.
    </div>

    <div class="mode-select">
      <button class="mode-btn active" id="pvpBtn">
        2 Players
      </button>

      <button class="mode-btn" id="botBtn">
        VS Bot
      </button>
    </div>

    <div class="difficulty-select" id="difficultyBox" style="display:none;">
      <button class="diff-btn active" data-diff="easy">
        Easy
      </button>

      <button class="diff-btn" data-diff="medium">
        Medium
      </button>

      <button class="diff-btn" data-diff="hard">
        Hard
      </button>
    </div>

    <div class="board" id="board"></div>

    <div class="status" id="status">
      X Turn
    </div>

    <div class="scoreboard">

      <div class="score">
        <div class="score-title">X Wins</div>
        <div class="score-value" id="xScore">0</div>
      </div>

      <div class="score">
        <div class="score-title">Draws</div>
        <div class="score-value" id="drawScore">0</div>
      </div>

      <div class="score">
        <div class="score-title">O Wins</div>
        <div class="score-value" id="oScore">0</div>
      </div>

    </div>

    <div class="controls">

      <button class="control-btn" id="restartBtn">
        Restart
      </button>

      <button class="control-btn" id="resetBtn">
        Reset Score
      </button>

    </div>

  </div>
</div>

<script>
const board = document.getElementById('board');
const statusText = document.getElementById('status');
const pvpBtn = document.getElementById('pvpBtn');
const botBtn = document.getElementById('botBtn');
const difficultyBox = document.getElementById('difficultyBox');
const restartBtn = document.getElementById('restartBtn');
const resetBtn = document.getElementById('resetBtn');
const diffButtons = document.querySelectorAll('.diff-btn');

const xScoreEl = document.getElementById('xScore');
const oScoreEl = document.getElementById('oScore');
const drawScoreEl = document.getElementById('drawScore');

let cells = [];
let currentPlayer = 'X';
let gameActive = true;
let gameMode = 'pvp';
let difficulty = 'easy';

let scores = {
  X: 0,
  O: 0,
  draw: 0
};

const winPatterns = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

function createBoard() {
  board.innerHTML = '';
  cells = [];

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.classList.add('cell');
    cell.dataset.index = i;

    cell.addEventListener('click', () => handleMove(i));

    board.appendChild(cell);
    cells.push(cell);
  }
}

function handleMove(index) {
  if (!gameActive) return;

  if (cells[index].textContent !== '') return;

  makeMove(index, currentPlayer);

  if (checkWinner(currentPlayer)) {
    statusText.textContent = currentPlayer + ' Wins!';
    scores[currentPlayer]++;
    updateScores();
    gameActive = false;
    return;
  }

  if (isDraw()) {
    statusText.textContent = 'Draw!';
    scores.draw++;
    updateScores();
    gameActive = false;
    return;
  }

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

  statusText.textContent = currentPlayer + ' Turn';

  if (
    gameMode === 'bot' &&
    currentPlayer === 'O'
  ) {
    setTimeout(botMove, 400);
  }
}

function makeMove(index, player) {
  cells[index].textContent = player;
  cells[index].classList.add(player.toLowerCase());
}

function botMove() {
  if (!gameActive) return;

  let move;

  if (difficulty === 'easy') {
    move = randomMove();
  }

  if (difficulty === 'medium') {
    move = Math.random() < 0.5
      ? bestMove()
      : randomMove();
  }

  if (difficulty === 'hard') {
    move = bestMove();
  }

  handleMove(move);
}

function randomMove() {
  const empty = cells
    .map((cell, index) =>
      cell.textContent === '' ? index : null
    )
    .filter(v => v !== null);

  return empty[
    Math.floor(Math.random() * empty.length)
  ];
}

function bestMove() {
  for (const pattern of winPatterns) {
    const values = pattern.map(i => cells[i].textContent);

    if (
      values.filter(v => v === 'O').length === 2 &&
      values.includes('')
    ) {
      return pattern[values.indexOf('')];
    }
  }

  for (const pattern of winPatterns) {
    const values = pattern.map(i => cells[i].textContent);

    if (
      values.filter(v => v === 'X').length === 2 &&
      values.includes('')
    ) {
      return pattern[values.indexOf('')];
    }
  }

  if (cells[4].textContent === '') {
    return 4;
  }

  return randomMove();
}

function checkWinner(player) {
  return winPatterns.some(pattern => {
    return pattern.every(index => {
      return cells[index].textContent === player;
    });
  });
}

function isDraw() {
  return cells.every(cell => cell.textContent !== '');
}

function restartGame() {
  currentPlayer = 'X';
  gameActive = true;
  statusText.textContent = 'X Turn';
  createBoard();
}

function updateScores() {
  xScoreEl.textContent = scores.X;
  oScoreEl.textContent = scores.O;
  drawScoreEl.textContent = scores.draw;
}

restartBtn.addEventListener('click', restartGame);

resetBtn.addEventListener('click', () => {
  scores = {
    X: 0,
    O: 0,
    draw: 0
  };

  updateScores();
  restartGame();
});

pvpBtn.addEventListener('click', () => {
  gameMode = 'pvp';

  pvpBtn.classList.add('active');
  botBtn.classList.remove('active');

  difficultyBox.style.display = 'none';

  restartGame();
});

botBtn.addEventListener('click', () => {
  gameMode = 'bot';

  botBtn.classList.add('active');
  pvpBtn.classList.remove('active');

  difficultyBox.style.display = 'flex';

  restartGame();
});

diffButtons.forEach(btn => {
  btn.addEventListener('click', () => {

    diffButtons.forEach(b =>
      b.classList.remove('active')
    );

    btn.classList.add('active');

    difficulty = btn.dataset.diff;

    restartGame();

  });
});

createBoard();
</script>

</body>
</html>
