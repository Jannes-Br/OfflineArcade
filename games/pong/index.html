<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Pong</title>

<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

body{
  overflow:hidden;
  width:100vw;
  height:100vh;
  font-family:'Fredoka',sans-serif;
  background:
    radial-gradient(circle at top left,
    rgba(80,120,255,0.28),
    transparent 40%),

    radial-gradient(circle at bottom right,
    rgba(160,90,255,0.28),
    transparent 40%),

    #020617;

  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.wrapper{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  width:100%;
  padding:18px 20px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  z-index:10;
}

.title{
  font-size:52px;
  font-weight:700;
  letter-spacing:1px;
  color:white;
  text-shadow:
    0 0 20px rgba(120,120,255,0.8);
}

.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
}

.segment{
  display:flex;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:5px;
  backdrop-filter:blur(14px);
}

.segment button{
  border:none;
  background:transparent;
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:15px;
  font-family:'Fredoka',sans-serif;
  cursor:pointer;
  transition:0.25s;
}

.segment button.active{
  background:rgba(255,255,255,0.14);
}

.pause-btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(12px);
}

.pause-icon{
  width:18px;
  height:22px;
  display:flex;
  justify-content:space-between;
}

.pause-icon div{
  width:6px;
  height:22px;
  background:white;
  border-radius:999px;
}

.play-icon{
  width:0;
  height:0;
  border-top:12px solid transparent;
  border-bottom:12px solid transparent;
  border-left:18px solid white;
  margin-left:4px;
}

.game-wrap{
  width:96vw;
  height:calc(100vh - 180px);
  max-width:1700px;
  max-height:850px;
  border-radius:30px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 40px rgba(90,120,255,0.15);

  border:1px solid rgba(255,255,255,0.08);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  pointer-events:none;
}

.overlay-text{
  margin-top:80px;
  font-size:58px;
  font-weight:700;
  text-align:center;
  text-shadow:
    0 0 25px rgba(255,255,255,0.4);
}

.score{
  position:absolute;
  top:26px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20%;
  font-size:72px;
  color:rgba(255,255,255,0.14);
  pointer-events:none;
  font-weight:700;
}

</style>
</head>
<body>

<div class="wrapper">

  <div class="topbar">

    <div class="title">
      Pong
    </div>

    <div class="controls">

      <div class="segment">
        <button id="vsBtn" class="active">
          2 Players
        </button>

        <button id="botBtn">
          Bot
        </button>
      </div>

      <div class="segment">
        <button id="normalBtn" class="active">
          Normal
        </button>

        <button id="fastBtn">
          Fast
        </button>

        <button id="superBtn">
          Super Fast
        </button>
      </div>

      <button id="pauseBtn" class="pause-btn">
        <div class="pause-icon" id="pauseIcon">
          <div></div>
          <div></div>
        </div>
      </button>

    </div>

  </div>

  <div class="game-wrap">

    <canvas id="game"></canvas>

    <div class="score">
      <div id="leftScore">0</div>
      <div id="rightScore">0</div>
    </div>

    <div class="overlay">
      <div class="overlay-text" id="overlayText">
        HOLD TO PLAY
      </div>
    </div>

  </div>

</div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const overlayText =
  document.getElementById('overlayText');

const pauseBtn =
  document.getElementById('pauseBtn');

const pauseIcon =
  document.getElementById('pauseIcon');

const leftScoreEl =
  document.getElementById('leftScore');

const rightScoreEl =
  document.getElementById('rightScore');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const normalBtn =
  document.getElementById('normalBtn');

const fastBtn =
  document.getElementById('fastBtn');

const superBtn =
  document.getElementById('superBtn');

function resize(){

  canvas.width =
    canvas.offsetWidth;

  canvas.height =
    canvas.offsetHeight;

  right.x =
    canvas.width - 46;

}

window.addEventListener(
  'resize',
  resize
);

const paddle = {
  width:18,
  height:150
};

const left = {
  x:28,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:12,
  trail:[]
};

let mode = 'vs';

let speed = 11;

let paused = false;
let playing = false;
let countdown = false;

let keys = {};

function resetPositions(){

  left.y =
    canvas.height/2 -
    paddle.height/2;

  right.x =
    canvas.width - 46;

  right.y =
    canvas.height/2 -
    paddle.height/2;

  ball.x =
    canvas.width/2;

  ball.y =
    canvas.height/2;

  ball.vx = 0;
  ball.vy = 0;

}

function launchBall(direction){

  const angle =
    (Math.random()*0.9)-0.45;

  ball.vx =
    Math.cos(angle) *
    speed *
    direction;

  ball.vy =
    Math.sin(angle) *
    speed;

}

function updateScores(){

  leftScoreEl.textContent =
    left.score;

  rightScoreEl.textContent =
    right.score;

}

resize();
resetPositions();
updateScores();

function setOverlay(text){

  overlayText.textContent =
    text;

}

function clearOverlay(){

  overlayText.textContent = '';

}

function requiredInputs(){

  if(mode === 'bot'){

    return (
      activeTouches.size >= 1 ||
      keys['w'] ||
      keys['s']
    );

  }

  return (
    activeTouches.size >= 2 ||
    keys['w'] ||
    keys['s'] ||
    keys['arrowup'] ||
    keys['arrowdown']
  );

}

async function startCountdown(){

  if(countdown) return;

  countdown = true;

  for(const text of ['3','2','1','GO!']){

    if(
      !requiredInputs() &&
      !playing
    ){
      countdown = false;
      setOverlay('HOLD TO PLAY');
      return;
    }

    setOverlay(text);

    await new Promise(r =>
      setTimeout(r,700)
    );

  }

  clearOverlay();

  countdown = false;
  playing = true;

  launchBall(
    Math.random() > 0.5 ? 1 : -1
  );

}

function resetRound(direction){

  playing = false;

  resetPositions();

  setOverlay('3');

  let nums = ['3','2','1','GO!'];
  let i = 0;

  const interval =
    setInterval(()=>{

      setOverlay(nums[i]);
      i++;

      if(i >= nums.length){

        clearInterval(interval);

        clearOverlay();

        playing = true;

        launchBall(direction);

      }

    },700);

}

pauseBtn.addEventListener(
  'click',
  ()=>{

    paused = !paused;

    if(paused){

      setOverlay('PAUSED');

      pauseIcon.innerHTML =
        `<div class="play-icon"></div>`;

    } else {

      pauseIcon.innerHTML =
      `
      <div></div>
      <div></div>
      `;

      startCountdown();

    }

  }
);

function setMode(newMode){

  mode = newMode;

  playing = false;
  paused = false;

  resetPositions();

  setOverlay('HOLD TO PLAY');

  vsBtn.classList.toggle(
    'active',
    newMode === 'vs'
  );

  botBtn.classList.toggle(
    'active',
    newMode === 'bot'
  );

}

vsBtn.onclick = ()=> setMode('vs');
botBtn.onclick = ()=> setMode('bot');

function setSpeed(value){

  speed = value;

  normalBtn.classList.remove('active');
  fastBtn.classList.remove('active');
  superBtn.classList.remove('active');

}

normalBtn.onclick = ()=>{

  setSpeed(11);
  normalBtn.classList.add('active');

};

fastBtn.onclick = ()=>{

  setSpeed(18);
  fastBtn.classList.add('active');

};

superBtn.onclick = ()=>{

  setSpeed(24);
  superBtn.classList.add('active');

};

const activeTouches =
  new Map();

window.addEventListener(
  'touchstart',
  e=>{

    for(const touch of e.changedTouches){

      activeTouches.set(
        touch.identifier,
        touch
      );

    }

    if(
      !playing &&
      !paused &&
      !countdown
    ){

      if(requiredInputs()){

        startCountdown();

      }

    }

  },
  {passive:false}
);

window.addEventListener(
  'touchend',
  e=>{

    for(const touch of e.changedTouches){

      activeTouches.delete(
        touch.identifier
      );

    }

  }
);

window.addEventListener(
  'touchmove',
  e=>{

    if(paused) return;

    for(const touch of e.touches){

      if(mode === 'bot'){

        left.y =
          touch.clientY -
          paddle.height/2;

      }

      else{

        if(
          touch.clientX <
          canvas.width/2
        ){

          left.y =
            touch.clientY -
            paddle.height/2;

        }

        else{

          right.y =
            touch.clientY -
            paddle.height/2;

        }

      }

    }

  },
  {passive:false}
);

window.addEventListener(
  'keydown',
  e=>{

    keys[
      e.key.toLowerCase()
    ] = true;

    if(
      !playing &&
      !paused &&
      !countdown &&
      requiredInputs()
    ){

      startCountdown();

    }

  }
);

window.addEventListener(
  'keyup',
  e=>{

    keys[
      e.key.toLowerCase()
    ] = false;

  }
);

function clamp(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddle.height,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddle.height,
      right.y
    )
  );

}

function update(){

  if(paused) return;

  if(keys['w'])
    left.y -= 12;

  if(keys['s'])
    left.y += 12;

  if(
    mode === 'vs'
  ){

    if(keys['arrowup'])
      right.y -= 12;

    if(keys['arrowdown'])
      right.y += 12;

  }

  else{

    const target =
      ball.y -
      paddle.height/2;

    right.y +=
      (target - right.y) * 0.18;

  }

  clamp();

  if(!playing) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ){

    ball.vy *= -1;

  }

  function bounce(p){

    const relative =
      (ball.y -
      (p.y + paddle.height/2))
      /
      (paddle.height/2);

    const angle =
      relative * 1.1;

    const dir =
      p === left ? 1 : -1;

    ball.vx =
      Math.cos(angle) *
      speed *
      dir;

    ball.vy =
      Math.sin(angle) *
      speed;

    p.glow = 1;

  }

  if(
    ball.x - ball.size <
    left.x + paddle.width &&

    ball.y >
    left.y &&

    ball.y <
    left.y + paddle.height
  ){

    ball.x =
      left.x +
      paddle.width +
      ball.size;

    bounce(left);

  }

  if(
    ball.x + ball.size >
    right.x &&

    ball.y >
    right.y &&

    ball.y <
    right.y + paddle.height
  ){

    ball.x =
      right.x -
      ball.size;

    bounce(right);

  }

  if(ball.x < -50){

    right.score++;
    updateScores();

    resetRound(-1);

  }

  if(ball.x > canvas.width + 50){

    left.score++;
    updateScores();

    resetRound(1);

  }

  left.glow *= 0.9;
  right.glow *= 0.9;

}

function drawBackground(){

  const g =
    ctx.createLinearGradient(
      0,
      0,
      canvas.width,
      canvas.height
    );

  g.addColorStop(0,'#081225');
  g.addColorStop(1,'#140a24');

  ctx.fillStyle = g;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

}

function drawMiddle(){

  ctx.strokeStyle =
    'rgba(255,255,255,0.12)';

  ctx.setLineDash([18,16]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(p,color){

  ctx.save();

  ctx.shadowBlur =
    30 * p.glow;

  ctx.shadowColor =
    color;

  ctx.fillStyle =
    color;

  ctx.beginPath();

  ctx.roundRect(
    p.x,
    p.y,
    paddle.width,
    paddle.height,
    999
  );

  ctx.fill();

  ctx.restore();

}

function drawBall(){

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length > 12){

    ball.trail.shift();

  }

  for(let i=0;i<ball.trail.length;i++){

    const t =
      ball.trail[i];

    ctx.beginPath();

    ctx.fillStyle =
      `rgba(255,255,255,${
        i/16
      })`;

    ctx.arc(
      t.x,
      t.y,
      ball.size *
      (i/ball.trail.length),
      0,
      Math.PI*2
    );

    ctx.fill();

  }

  ctx.shadowBlur = 30;
  ctx.shadowColor = 'white';

  ctx.fillStyle = 'white';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.shadowBlur = 0;

}

function render(){

  drawBackground();
  drawMiddle();

  drawPaddle(
    left,
    '#7c8cff'
  );

  drawPaddle(
    right,
    '#c084fc'
  );

  drawBall();

}

function loop(){

  update();
  render();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>+
