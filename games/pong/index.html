<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;

  background:
    radial-gradient(
      circle at top left,
      rgba(0,255,200,.12),
      transparent 30%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(255,120,0,.14),
      transparent 35%
    ),

    linear-gradient(
      180deg,
      #07111f,
      #020617
    );

  color:white;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#game-wrapper{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

#top-ui{

  position:absolute;
  top:0;
  left:0;
  width:100%;

  z-index:20;

  padding:
    14px
    16px
    0
    16px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

.ui-card{

  background:
    rgba(255,255,255,.05);

  border:
    1px solid
    rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

  border-radius:24px;

  padding:12px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}

.group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{

  border:none;
  outline:none;

  color:white;

  background:
    rgba(255,255,255,.06);

  border-radius:16px;

  padding:
    12px
    18px;

  min-width:110px;

  font-size:15px;

  transition:
    .18s;
}

button:active{
  transform:scale(.95);
}

button.active{

  background:
    rgba(255,255,255,.15);

  transform:scale(1.04);
}

.mode-blue.active{

  background:#00c2ff;

  box-shadow:
    0 0 24px
    rgba(0,194,255,.55);
}

.mode-orange.active{

  background:#ff7b00;

  box-shadow:
    0 0 24px
    rgba(255,123,0,.45);
}

#pauseBtn{

  width:58px;
  min-width:58px;

  padding:12px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;
}

#playOverlay{

  position:absolute;
  inset:0;

  z-index:30;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    rgba(2,6,23,.25);

  backdrop-filter:blur(4px);
}

#playBtn{

  border:none;

  color:white;

  font-size:28px;

  padding:
    24px
    52px;

  border-radius:26px;

  background:
    linear-gradient(
      135deg,
      #00c2ff,
      #ff7b00
    );

  box-shadow:
    0 0 50px
    rgba(0,194,255,.25),

    0 0 50px
    rgba(255,123,0,.22);
}

#game-container{

  position:absolute;

  left:50%;
  top:162px;

  transform:translateX(-50%);

  width:95vw;

  height:calc(100vh - 180px);

  border-radius:30px;

  overflow:hidden;

  border:
    2px solid
    rgba(255,255,255,.08);

  background:
    linear-gradient(
      180deg,
      rgba(7,17,31,.97),
      rgba(2,6,23,.98)
    );

  box-shadow:
    inset 0 0 90px rgba(255,255,255,.03),
    0 0 80px rgba(0,0,0,.45);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

</style>
</head>
<body>

<div id="game-wrapper">

  <div id="top-ui">

    <div class="ui-card">

      <div class="group">

        <button
          id="vsBtn"
          class="active mode-blue"
        >
          2 Players
        </button>

        <button
          id="botBtn"
          class="mode-orange"
        >
          Impossible Bot
        </button>

      </div>

      <button id="pauseBtn">
        ⏸
      </button>

    </div>

    <div class="ui-card">

      <div class="group">

        <button
          class="speedBtn active"
          data-speed="1"
        >
          Normal
        </button>

        <button
          class="speedBtn"
          data-speed="1.45"
        >
          Fast
        </button>

        <button
          class="speedBtn"
          data-speed="1.9"
        >
          Chaos
        </button>

      </div>

      <div class="group">

        <button
          class="shapeBtn active"
          data-shape="normal"
        >
          Paddle
        </button>

        <button
          class="shapeBtn"
          data-shape="curve"
        >
          Curve
        </button>

        <button
          class="shapeBtn"
          data-shape="triangle"
        >
          Spike
        </button>

      </div>

    </div>

  </div>

  <div id="playOverlay">

    <button id="playBtn">
      PLAY
    </button>

  </div>

  <div id="game-container">

    <canvas id="game"></canvas>

  </div>

</div>

<script>

const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const container =
  document.getElementById(
    'game-container'
  );

const playOverlay =
  document.getElementById(
    'playOverlay'
  );

const playBtn =
  document.getElementById(
    'playBtn'
  );

const pauseBtn =
  document.getElementById(
    'pauseBtn'
  );

const vsBtn =
  document.getElementById(
    'vsBtn'
  );

const botBtn =
  document.getElementById(
    'botBtn'
  );

const speedBtns =
  document.querySelectorAll(
    '.speedBtn'
  );

const shapeBtns =
  document.querySelectorAll(
    '.shapeBtn'
  );

let running = false;
let paused = false;

let mode = 'vs';

let speedMultiplier = 1;

let paddleShape = 'normal';

function resize(){

  canvas.width =
    container.clientWidth;

  canvas.height =
    container.clientHeight;

}

resize();

window.addEventListener(
  'resize',
  resize
);

const paddleWidth = 22;
const paddleHeight = 180;

const left = {
  x:40,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

function resetBall(){

  ball.x =
    canvas.width/2;

  ball.y =
    canvas.height/2;

  ball.trail = [];

  const dir =
    Math.random() > .5 ? 1 : -1;

  const speed =
    8 * speedMultiplier;

  ball.vx =
    speed * dir;

  ball.vy =
    (Math.random()*6-3)
    * speedMultiplier;

}

function resetGame(){

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height/2
    - paddleHeight/2;

  right.y =
    canvas.height/2
    - paddleHeight/2;

  resetBall();

  running = false;
  paused = false;

  pauseBtn.textContent =
    '⏸';

  playOverlay.style.display =
    'flex';

}

resetGame();

function startGame(){

  running = true;

  paused = false;

  playOverlay.style.display =
    'none';

}

playBtn.onclick =
  startGame;

pauseBtn.onclick = () => {

  if(!running) return;

  paused = !paused;

  pauseBtn.textContent =
    paused ? '▶' : '⏸';

};

function setMode(newMode){

  mode = newMode;

  vsBtn.classList.remove(
    'active'
  );

  botBtn.classList.remove(
    'active'
  );

  if(mode === 'vs'){

    vsBtn.classList.add(
      'active'
    );

  }else{

    botBtn.classList.add(
      'active'
    );

  }

  resetGame();

}

vsBtn.onclick =
  () => setMode('vs');

botBtn.onclick =
  () => setMode('bot');

speedBtns.forEach(btn => {

  btn.onclick = () => {

    speedBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    speedMultiplier =
      Number(
        btn.dataset.speed
      );

    resetGame();

  };

});

shapeBtns.forEach(btn => {

  btn.onclick = () => {

    shapeBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    paddleShape =
      btn.dataset.shape;

    resetGame();

  };

});

function drawBackground(){

  const grad =
    ctx.createLinearGradient(
      0,0,0,canvas.height
    );

  grad.addColorStop(
    0,
    '#08111f'
  );

  grad.addColorStop(
    1,
    '#020617'
  );

  ctx.fillStyle = grad;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,.08)';

  ctx.setLineDash([18,18]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(
  p,
  color,
  side
){

  ctx.save();

  if(p.glow > 0){

    ctx.shadowBlur =
      34 * p.glow;

    ctx.shadowColor =
      color;

  }

  ctx.fillStyle = color;

  if(
    paddleShape === 'normal'
  ){

    ctx.beginPath();

    ctx.roundRect(
      p.x,
      p.y,
      paddleWidth,
      paddleHeight,
      16
    );

    ctx.fill();

  }

  else if(
    paddleShape === 'curve'
  ){

    ctx.beginPath();

    if(side === 'left'){

      ctx.moveTo(
        p.x,
        p.y
      );

      ctx.quadraticCurveTo(
        p.x + 60,
        p.y + paddleHeight/2,
        p.x,
        p.y + paddleHeight
      );

    }else{

      ctx.moveTo(
        p.x + paddleWidth,
        p.y
      );

      ctx.quadraticCurveTo(
        p.x - 60,
        p.y + paddleHeight/2,
        p.x + paddleWidth,
        p.y + paddleHeight
      );

    }

    ctx.closePath();
    ctx.fill();

  }

  else{

    ctx.beginPath();

    if(side === 'left'){

      ctx.moveTo(
        p.x,
        p.y
      );

      ctx.lineTo(
        p.x + 42,
        p.y + paddleHeight/2
      );

      ctx.lineTo(
        p.x,
        p.y + paddleHeight
      );

    }else{

      ctx.moveTo(
        p.x + paddleWidth,
        p.y
      );

      ctx.lineTo(
        p.x - 20,
        p.y + paddleHeight/2
      );

      ctx.lineTo(
        p.x + paddleWidth,
        p.y + paddleHeight
      );

    }

    ctx.closePath();
    ctx.fill();

  }

  ctx.restore();

}

function drawBall(){

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length > 12){

    ball.trail.shift();

  }

  for(let i=0;i<ball.trail.length;i++){

    const t =
      ball.trail[i];

    const alpha =
      i / ball.trail.length;

    ctx.beginPath();

    ctx.fillStyle =
      `rgba(255,255,255,${alpha*.18})`;

    ctx.arc(
      t.x,
      t.y,
      ball.size * alpha,
      0,
      Math.PI*2
    );

    ctx.fill();

  }

  ctx.save();

  ctx.shadowBlur = 22;
  ctx.shadowColor = 'white';

  ctx.fillStyle = 'white';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();

}

function drawScores(){

  ctx.font =
    'bold 72px Arial';

  ctx.fillStyle =
    'rgba(255,255,255,.08)';

  ctx.fillText(
    left.score,
    canvas.width*.25,
    90
  );

  ctx.fillText(
    right.score,
    canvas.width*.75,
    90
  );

}

function flash(side){

  if(side === 'left'){

    left.glow = 1;

  }else{

    right.glow = 1;

  }

}

function update(){

  if(
    !running ||
    paused
  ) return;

  right.x =
    canvas.width - 62;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ){

    ball.vy *= -1;

  }

  if(
    ball.x - ball.size <
    left.x + paddleWidth &&

    ball.y >
    left.y &&

    ball.y <
    left.y + paddleHeight
  ){

    ball.vx =
      Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (left.y + paddleHeight/2))
      * .03;

    flash('left');

  }

  if(
    ball.x + ball.size >
    right.x &&

    ball.y >
    right.y &&

    ball.y <
    right.y + paddleHeight
  ){

    ball.vx =
      -Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (right.y + paddleHeight/2))
      * .03;

    flash('right');

  }

  if(ball.x < -40){

    right.score++;

    resetBall();

  }

  if(ball.x > canvas.width+40){

    left.score++;

    resetBall();

  }

  if(mode === 'bot'){

    const target =
      ball.y -
      paddleHeight/2;

    right.y +=
      (target-right.y)
      * .42;

  }

  left.glow *= .9;
  right.glow *= .9;

}

function draw(){

  drawBackground();

  drawScores();

  drawPaddle(
    left,
    '#00c2ff',
    'left'
  );

  drawPaddle(
    right,
    '#ff7b00',
    'right'
  );

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(
    loop
  );

}

loop();

function clamp(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddleHeight,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddleHeight,
      right.y
    )
  );

}

window.addEventListener(
  'touchmove',
  e => {

    for(const t of e.touches){

      const rect =
        canvas.getBoundingClientRect();

      const y =
        t.clientY - rect.top;

      if(
        t.clientX <
        window.innerWidth/2
      ){

        left.y =
          y - paddleHeight/2;

      }

      else if(
        mode === 'vs'
      ){

        right.y =
          y - paddleHeight/2;

      }

    }

    clamp();

  },
  {passive:false}
);

const keys = {};

window.addEventListener(
  'keydown',
  e => {

    keys[e.key.toLowerCase()] =
      true;

  }
);

window.addEventListener(
  'keyup',
  e => {

    keys[e.key.toLowerCase()] =
      false;

  }
);

function keyboardLoop(){

  if(keys['w']){

    left.y -= 10;

  }

  if(keys['s']){

    left.y += 10;

  }

  if(
    mode === 'vs'
  ){

    if(keys['arrowup']){

      right.y -= 10;

    }

    if(keys['arrowdown']){

      right.y += 10;

    }

  }

  clamp();

  requestAnimationFrame(
    keyboardLoop
  );

}

keyboardLoop();

</script>

</body>
</html>
