<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Pong</title>

<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

body{
  overflow:hidden;
  width:100vw;
  height:100vh;
  font-family:'Fredoka',sans-serif;
  background:
    radial-gradient(circle at top left,
    rgba(95,120,255,0.35),
    transparent 42%),

    radial-gradient(circle at bottom right,
    rgba(175,110,255,0.35),
    transparent 42%),

    #020617;

  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.wrapper{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  width:100%;
  padding:16px 20px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}

.title{
  font-size:56px;
  font-weight:700;
  letter-spacing:1px;
  text-shadow:
    0 0 22px rgba(120,130,255,0.85);
}

.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
}

.segment{
  display:flex;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:5px;
  backdrop-filter:blur(14px);
}

.segment button{
  border:none;
  background:transparent;
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:15px;
  font-family:'Fredoka',sans-serif;
  cursor:pointer;
  transition:0.22s;
}

.segment button.active{
  background:rgba(255,255,255,0.14);
}

.pause-btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(12px);
}

.pause-bars{
  width:18px;
  height:22px;
  display:flex;
  justify-content:space-between;
}

.pause-bars div{
  width:5px;
  height:22px;
  background:white;
  border-radius:999px;
}

.play-triangle{
  width:0;
  height:0;
  border-top:12px solid transparent;
  border-bottom:12px solid transparent;
  border-left:18px solid white;
  margin-left:4px;
}

.game-wrap{
  width:96vw;
  height:calc(100vh - 180px);
  max-width:1700px;
  max-height:850px;
  border-radius:30px;
  overflow:hidden;
  position:relative;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 40px rgba(100,120,255,0.18);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  pointer-events:none;
}

.overlay-text{
  margin-top:75px;
  font-size:62px;
  font-weight:700;
  text-align:center;

  text-shadow:
    0 0 25px rgba(255,255,255,0.35);
}

.score{
  position:absolute;
  top:24px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20%;
  font-size:74px;
  font-weight:700;
  color:rgba(255,255,255,0.12);
  pointer-events:none;
}

</style>
</head>
<body>

<div class="wrapper">

  <div class="topbar">

    <div class="title">
      Pong
    </div>

    <div class="controls">

      <div class="segment">

        <button
          id="vsBtn"
          class="active"
        >
          2 Players
        </button>

        <button
          id="botBtn"
        >
          Bot
        </button>

      </div>

      <div class="segment">

        <button
          id="normalBtn"
          class="active"
        >
          Normal
        </button>

        <button
          id="fastBtn"
        >
          Fast
        </button>

        <button
          id="superBtn"
        >
          Super Fast
        </button>

      </div>

      <button
        id="pauseBtn"
        class="pause-btn"
      >

        <div
          class="pause-bars"
          id="pauseIcon"
        >
          <div></div>
          <div></div>
        </div>

      </button>

    </div>

  </div>

  <div class="game-wrap">

    <canvas id="game"></canvas>

    <div class="score">
      <div id="leftScore">0</div>
      <div id="rightScore">0</div>
    </div>

    <div class="overlay">
      <div
        class="overlay-text"
        id="overlayText"
      >
        HOLD TO PLAY
      </div>
    </div>

  </div>

</div>

<script>

const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const overlayText =
  document.getElementById(
    'overlayText'
  );

const leftScoreEl =
  document.getElementById(
    'leftScore'
  );

const rightScoreEl =
  document.getElementById(
    'rightScore'
  );

const pauseBtn =
  document.getElementById(
    'pauseBtn'
  );

const pauseIcon =
  document.getElementById(
    'pauseIcon'
  );

const vsBtn =
  document.getElementById(
    'vsBtn'
  );

const botBtn =
  document.getElementById(
    'botBtn'
  );

const normalBtn =
  document.getElementById(
    'normalBtn'
  );

const fastBtn =
  document.getElementById(
    'fastBtn'
  );

const superBtn =
  document.getElementById(
    'superBtn'
  );

function resize(){

  canvas.width =
    canvas.offsetWidth;

  canvas.height =
    canvas.offsetHeight;

  right.x =
    canvas.width - 46;

}

window.addEventListener(
  'resize',
  resize
);

const paddle = {
  width:18,
  height:150
};

const left = {
  x:28,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:12,
  trail:[]
};

let mode = 'vs';

let speed = 11;

let playing = false;
let paused = false;
let countdownRunning = false;

let countdownTimeouts = [];

const keys = {};

const touches = new Map();

function clearCountdowns(){

  for(const id of countdownTimeouts){

    clearTimeout(id);

  }

  countdownTimeouts = [];

}

function setOverlay(text){

  overlayText.textContent =
    text;

}

function clearOverlay(){

  overlayText.textContent = '';

}

function resetPositions(){

  left.y =
    canvas.height/2 -
    paddle.height/2;

  right.x =
    canvas.width - 46;

  right.y =
    canvas.height/2 -
    paddle.height/2;

  ball.x =
    canvas.width/2;

  ball.y =
    canvas.height/2;

  ball.vx = 0;
  ball.vy = 0;

}

function updateScores(){

  leftScoreEl.textContent =
    left.score;

  rightScoreEl.textContent =
    right.score;

}

resize();
resetPositions();
updateScores();

function requiredInputActive(){

  const keyboardLeft =
    keys['w'] || keys['s'];

  const keyboardRight =
    keys['arrowup'] ||
    keys['arrowdown'];

  if(mode === 'bot'){

    return (
      touches.size >= 1 ||
      keyboardLeft
    );

  }

  return (
    touches.size >= 2 ||
    (keyboardLeft && keyboardRight)
  );

}

function launchBall(direction){

  const angle =
    (Math.random()*1)-0.5;

  ball.vx =
    Math.cos(angle) *
    speed *
    direction;

  ball.vy =
    Math.sin(angle) *
    speed;

}

function startCountdown(direction){

  if(
    countdownRunning ||
    paused
  ) return;

  countdownRunning = true;

  const texts =
    ['3','2','1','GO!'];

  texts.forEach((text,index)=>{

    const id =
      setTimeout(()=>{

        if(
          !playing &&
          !requiredInputActive()
        ){

          countdownRunning = false;

          setOverlay(
            'HOLD TO PLAY'
          );

          clearCountdowns();

          return;

        }

        setOverlay(text);

      },index*700);

    countdownTimeouts.push(id);

  });

  const startId =
    setTimeout(()=>{

      clearOverlay();

      countdownRunning = false;

      playing = true;

      launchBall(direction);

    },2800);

  countdownTimeouts.push(startId);

}

function resetRound(direction){

  playing = false;

  resetPositions();

  startCountdown(direction);

}

function setPause(state){

  paused = state;

  if(paused){

    setOverlay('PAUSED');

    pauseIcon.innerHTML =
      `
      <div class="play-triangle"></div>
      `;

  }

  else{

    pauseIcon.innerHTML =
      `
      <div></div>
      <div></div>
      `;

    startCountdown(
      Math.random()>0.5 ? 1 : -1
    );

  }

}

pauseBtn.addEventListener(
  'click',
  ()=>{

    setPause(!paused);

  }
);

function setMode(newMode){

  mode = newMode;

  playing = false;
  paused = false;

  clearCountdowns();

  countdownRunning = false;

  resetPositions();

  setOverlay('HOLD TO PLAY');

  vsBtn.classList.toggle(
    'active',
    newMode === 'vs'
  );

  botBtn.classList.toggle(
    'active',
    newMode === 'bot'
  );

}

vsBtn.onclick =
  ()=> setMode('vs');

botBtn.onclick =
  ()=> setMode('bot');

function activateSpeed(btn,value){

  speed = value;

  normalBtn.classList.remove(
    'active'
  );

  fastBtn.classList.remove(
    'active'
  );

  superBtn.classList.remove(
    'active'
  );

  btn.classList.add(
    'active'
  );

}

normalBtn.onclick =
  ()=> activateSpeed(
    normalBtn,
    11
  );

fastBtn.onclick =
  ()=> activateSpeed(
    fastBtn,
    18
  );

superBtn.onclick =
  ()=> activateSpeed(
    superBtn,
    24
  );

window.addEventListener(
  'keydown',
  e=>{

    keys[
      e.key.toLowerCase()
    ] = true;

    if(
      !playing &&
      !paused &&
      !countdownRunning &&
      requiredInputActive()
    ){

      startCountdown(
        Math.random()>0.5 ? 1 : -1
      );

    }

  }
);

window.addEventListener(
  'keyup',
  e=>{

    keys[
      e.key.toLowerCase()
    ] = false;

  }
);

window.addEventListener(
  'touchstart',
  e=>{

    for(const touch of e.changedTouches){

      touches.set(
        touch.identifier,
        {
          x:touch.clientX,
          y:touch.clientY
        }
      );

    }

    if(
      !playing &&
      !paused &&
      !countdownRunning &&
      requiredInputActive()
    ){

      startCountdown(
        Math.random()>0.5 ? 1 : -1
      );

    }

  },
  {passive:false}
);

window.addEventListener(
  'touchmove',
  e=>{

    if(paused) return;

    for(const touch of e.touches){

      if(mode === 'bot'){

        left.y =
          touch.clientY -
          paddle.height/2;

      }

      else{

        if(
          touch.clientX <
          canvas.width/2
        ){

          left.y =
            touch.clientY -
            paddle.height/2;

        }

        else{

          right.y =
            touch.clientY -
            paddle.height/2;

        }

      }

    }

  },
  {passive:false}
);

window.addEventListener(
  'touchend',
  e=>{

    for(const touch of e.changedTouches){

      touches.delete(
        touch.identifier
      );

    }

  }
);

function clamp(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddle.height,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddle.height,
      right.y
    )
  );

}

function update(){

  if(paused) return;

  if(keys['w'])
    left.y -= 12;

  if(keys['s'])
    left.y += 12;

  if(mode === 'vs'){

    if(keys['arrowup'])
      right.y -= 12;

    if(keys['arrowdown'])
      right.y += 12;

  }

  else{

    const target =
      ball.y -
      paddle.height/2;

    right.y +=
      (target-right.y)*0.18;

  }

  clamp();

  if(!playing) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(ball.y < ball.size){

    ball.y = ball.size;
    ball.vy *= -1;

  }

  if(
    ball.y >
    canvas.height-ball.size
  ){

    ball.y =
      canvas.height-ball.size;

    ball.vy *= -1;

  }

  function bounce(p){

    const relative =
      (
        ball.y -
        (
          p.y +
          paddle.height/2
        )
      )
      /
      (
        paddle.height/2
      );

    const angle =
      relative * 1.1;

    const dir =
      p === left ? 1 : -1;

    ball.vx =
      Math.cos(angle) *
      speed *
      dir;

    ball.vy =
      Math.sin(angle) *
      speed;

    p.glow = 1;

  }

  if(

    ball.x-ball.size <
    left.x+paddle.width &&

    ball.y > left.y &&
    ball.y < left.y+paddle.height

  ){

    ball.x =
      left.x +
      paddle.width +
      ball.size;

    bounce(left);

  }

  if(

    ball.x+ball.size >
    right.x &&

    ball.y > right.y &&
    ball.y < right.y+paddle.height

  ){

    ball.x =
      right.x -
      ball.size;

    bounce(right);

  }

  if(ball.x < -50){

    right.score++;

    updateScores();

    resetRound(-1);

  }

  if(ball.x > canvas.width+50){

    left.score++;

    updateScores();

    resetRound(1);

  }

  left.glow *= 0.9;
  right.glow *= 0.9;

}

function drawBackground(){

  const g =
    ctx.createLinearGradient(
      0,
      0,
      canvas.width,
      canvas.height
    );

  g.addColorStop(0,'#091426');
  g.addColorStop(1,'#180d2f');

  ctx.fillStyle = g;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

}

function drawMiddle(){

  ctx.strokeStyle =
    'rgba(255,255,255,0.12)';

  ctx.setLineDash([18,16]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPrediction(){

  if(playing) return;

  const dir =
    Math.random() > 0.5 ? 1 : -1;

  ctx.setLineDash([12,10]);

  ctx.strokeStyle =
    'rgba(255,255,255,0.22)';

  ctx.beginPath();

  ctx.moveTo(
    ball.x,
    ball.y
  );

  ctx.lineTo(
    ball.x + dir*250,
    ball.y - 80
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(p,color){

  ctx.save();

  ctx.shadowBlur =
    30 * p.glow;

  ctx.shadowColor =
    color;

  ctx.fillStyle =
    color;

  ctx.beginPath();

  ctx.roundRect(
    p.x,
    p.y,
    paddle.width,
    paddle.height,
    999
  );

  ctx.fill();

  ctx.restore();

}

function drawBall(){

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length > 12){

    ball.trail.shift();

  }

  for(let i=0;i<ball.trail.length;i++){

    const t =
      ball.trail[i];

    ctx.beginPath();

    ctx.fillStyle =
      `rgba(255,255,255,${
        i/16
      })`;

    ctx.arc(
      t.x,
      t.y,
      ball.size *
      (i/ball.trail.length),
      0,
      Math.PI*2
    );

    ctx.fill();

  }

  ctx.shadowBlur = 30;
  ctx.shadowColor = 'white';

  ctx.fillStyle = 'white';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.shadowBlur = 0;

}

function render(){

  drawBackground();

  drawMiddle();

  drawPrediction();

  drawPaddle(
    left,
    '#7c8cff'
  );

  drawPaddle(
    right,
    '#c084fc'
  );

  drawBall();

}

function loop(){

  update();

  render();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
