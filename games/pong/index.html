<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;

  background:
    radial-gradient(circle at top left,
    rgba(99,102,241,0.22),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(16,185,129,0.18),
    transparent 35%),

    linear-gradient(
      180deg,
      #020617,
      #050816,
      #020617
    );

  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  gap:14px;
}

.topbar{
  width:min(1200px,100%);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  z-index:20;
}

.group{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.08);
}

button{
  border:none;
  background:transparent;
  color:white;

  padding:12px 18px;

  border-radius:14px;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:0.25s;
}

button.active{
  background:rgba(255,255,255,0.12);
}

button:hover{
  background:rgba(255,255,255,0.08);
}

.pause-btn{
  width:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.game-container{
  position:relative;

  width:min(1200px,100%);
  height:calc(100vh - 150px);

  border-radius:34px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,0.08);

  background:
    linear-gradient(
      135deg,
      rgba(99,102,241,0.12),
      rgba(16,185,129,0.08)
    );

  box-shadow:
    0 0 50px rgba(0,0,0,0.4),
    inset 0 0 80px rgba(255,255,255,0.03);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:30;

  background:rgba(0,0,0,0.35);

  backdrop-filter:blur(8px);
}

.play-btn{
  border:none;

  width:130px;
  height:130px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #6366f1,
      #10b981
    );

  color:white;

  font-size:34px;
  font-weight:900;

  cursor:pointer;

  box-shadow:
    0 0 40px rgba(99,102,241,0.45);

  transition:0.25s;
}

.play-btn:active{
  transform:scale(0.95);
}
</style>
</head>
<body>

<div class="app">

  <div class="topbar">

    <div class="group">

      <button
        id="vsBtn"
        class="active"
      >
        2 Players
      </button>

      <button id="botBtn">
        Impossible Bot
      </button>

    </div>

    <div class="group">

      <button
        id="slowBtn"
      >
        Slow
      </button>

      <button
        id="normalBtn"
        class="active"
      >
        Normal
      </button>

      <button
        id="fastBtn"
      >
        Fast
      </button>

    </div>

    <div class="group">

      <button
        id="pauseBtn"
        class="pause-btn"
      >
        ❚❚
      </button>

    </div>

  </div>

  <div class="game-container">

    <canvas id="game"></canvas>

    <div
      id="overlay"
      class="overlay"
    >

      <button
        id="playBtn"
        class="play-btn"
      >
        ▶
      </button>

    </div>

  </div>

</div>

<script>
const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const overlay =
  document.getElementById('overlay');

const playBtn =
  document.getElementById('playBtn');

const pauseBtn =
  document.getElementById('pauseBtn');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const slowBtn =
  document.getElementById('slowBtn');

const normalBtn =
  document.getElementById('normalBtn');

const fastBtn =
  document.getElementById('fastBtn');

let running = false;
let paused = false;

let mode = 'vs';

let baseSpeed = 8;

function resize() {

  const rect =
    canvas.parentElement.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;

}

resize();

window.addEventListener(
  'resize',
  resize
);

const paddle = {
  width:20,
  height:150
};

const left = {
  x:40,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

function resetBall() {

  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  ball.trail = [];

  const dir =
    Math.random() > 0.5 ? 1 : -1;

  ball.vx = baseSpeed * dir;

  ball.vy =
    (Math.random() * 6) - 3;

}

function resetGame() {

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height/2 -
    paddle.height/2;

  right.y =
    canvas.height/2 -
    paddle.height/2;

  resetBall();

  running = false;
  paused = false;

  overlay.style.display = 'flex';

  pauseBtn.innerHTML = '❚❚';

}

resetGame();

function activate(button,list){

  list.forEach(btn=>{
    btn.classList.remove('active');
  });

  button.classList.add('active');

}

vsBtn.onclick = () => {

  mode = 'vs';

  activate(
    vsBtn,
    [vsBtn,botBtn]
  );

  resetGame();

};

botBtn.onclick = () => {

  mode = 'bot';

  activate(
    botBtn,
    [vsBtn,botBtn]
  );

  resetGame();

};

slowBtn.onclick = () => {

  baseSpeed = 6;

  activate(
    slowBtn,
    [slowBtn,normalBtn,fastBtn]
  );

  resetGame();

};

normalBtn.onclick = () => {

  baseSpeed = 8;

  activate(
    normalBtn,
    [slowBtn,normalBtn,fastBtn]
  );

  resetGame();

};

fastBtn.onclick = () => {

  baseSpeed = 11;

  activate(
    fastBtn,
    [slowBtn,normalBtn,fastBtn]
  );

  resetGame();

};

playBtn.onclick = () => {

  running = true;
  paused = false;

  overlay.style.display = 'none';

};

pauseBtn.onclick = () => {

  if (!running) return;

  paused = !paused;

  if (paused) {

    pauseBtn.innerHTML = '▶';

  } else {

    pauseBtn.innerHTML = '❚❚';

  }

};

function clampPaddles(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height - paddle.height,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height - paddle.height,
      right.y
    )
  );

}

const keys = {};

window.addEventListener(
  'keydown',
  e => {

    keys[e.key] = true;

  }
);

window.addEventListener(
  'keyup',
  e => {

    keys[e.key] = false;

  }
);

window.addEventListener(
  'touchmove',
  e => {

    e.preventDefault();

    for (const touch of e.touches){

      if (
        touch.clientX <
        window.innerWidth / 2
      ) {

        left.y =
          touch.clientY -
          paddle.height / 2;

      }

      else if (mode === 'vs') {

        right.y =
          touch.clientY -
          paddle.height / 2;

      }

    }

    clampPaddles();

  },
  {passive:false}
);

function update(){

  if (!running || paused) return;

  right.x =
    canvas.width - 60;

  if (keys['w']) {
    left.y -= 10;
  }

  if (keys['s']) {
    left.y += 10;
  }

  if (mode === 'vs') {

    if (keys['ArrowUp']) {
      right.y -= 10;
    }

    if (keys['ArrowDown']) {
      right.y += 10;
    }

  }

  if (mode === 'bot') {

    const target =
      ball.y - paddle.height/2;

    right.y +=
      (target - right.y) * 0.24;

  }

  clampPaddles();

  left.glow *= 0.9;
  right.glow *= 0.9;

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if (ball.trail.length > 10){
    ball.trail.shift();
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ) {

    ball.vy *= -1;

  }

  if (
    ball.x - ball.size <
    left.x + paddle.width &&

    ball.y >
    left.y &&

    ball.y <
    left.y + paddle.height
  ) {

    const hit =
      (
        ball.y -
        (left.y + paddle.height/2)
      ) / (paddle.height/2);

    ball.vx =
      Math.abs(ball.vx);

    ball.vy =
      hit * 10;

    left.glow = 1;

  }

  if (
    ball.x + ball.size >
    right.x &&

    ball.y >
    right.y &&

    ball.y <
    right.y + paddle.height
  ) {

    const hit =
      (
        ball.y -
        (right.y + paddle.height/2)
      ) / (paddle.height/2);

    ball.vx =
      -Math.abs(ball.vx);

    ball.vy =
      hit * 10;

    right.glow = 1;

  }

  if (ball.x < 0){

    right.score++;

    resetBall();

  }

  if (ball.x > canvas.width){

    left.score++;

    resetBall();

  }

}

function drawBackground(){

  ctx.fillStyle = '#020617';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,0.08)';

  ctx.setLineDash([14,14]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(player,color){

  ctx.shadowBlur =
    25 * player.glow;

  ctx.shadowColor = color;

  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.roundRect(
    player.x,
    player.y,
    paddle.width,
    paddle.height,
    14
  );

  ctx.fill();

  ctx.shadowBlur = 0;

}

function drawBall(){

  for (
    let i = 0;
    i < ball.trail.length;
    i++
  ){

    const t =
      ball.trail[i];

    ctx.globalAlpha =
      i / ball.trail.length * 0.5;

    ctx.beginPath();

    ctx.arc(
      t.x,
      t.y,
      ball.size,
      0,
      Math.PI*2
    );

    ctx.fillStyle =
      '#ffffff';

    ctx.fill();

  }

  ctx.globalAlpha = 1;

  ctx.shadowBlur = 20;

  ctx.shadowColor = '#ffffff';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fillStyle = '#ffffff';

  ctx.fill();

  ctx.shadowBlur = 0;

}

function drawScores(){

  ctx.font =
    'bold 72px Arial';

  ctx.fillStyle =
    'rgba(255,255,255,0.12)';

  ctx.fillText(
    left.score,
    canvas.width * 0.25,
    90
  );

  ctx.fillText(
    right.score,
    canvas.width * 0.75,
    90
  );

}

function draw(){

  drawBackground();

  drawScores();

  drawPaddle(
    left,
    '#6366f1'
  );

  drawPaddle(
    right,
    '#10b981'
  );

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();
</script>

</body>
</html>
