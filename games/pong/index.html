<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

body{
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top left,#132238 0%,transparent 40%),
    radial-gradient(circle at bottom right,#1b1030 0%,transparent 40%),
    #020617;
  color:white;
  width:100vw;
  height:100vh;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:10;
  padding:18px 24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.title{
  font-size:44px;
  font-weight:900;
  letter-spacing:2px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.group{
  display:flex;
  gap:10px;
  background:rgba(255,255,255,0.06);
  padding:8px;
  border-radius:18px;
  backdrop-filter:blur(10px);
}

button{
  border:none;
  background:transparent;
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  transition:.2s;
}

button.active{
  background:rgba(255,255,255,0.14);
}

button.pause{
  width:52px;
  font-size:22px;
}

.game-wrapper{
  position:absolute;
  top:170px;
  left:20px;
  right:20px;
  bottom:20px;
  border-radius:30px;
  overflow:hidden;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.01)
    );
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 80px rgba(80,120,255,0.12),
    inset 0 0 80px rgba(255,255,255,0.02);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.overlay{
  position:absolute;
  top:18%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  pointer-events:none;
}

.bigtext{
  font-size:58px;
  font-weight:900;
  text-shadow:0 0 25px rgba(255,255,255,0.4);
}

.smalltext{
  margin-top:10px;
  font-size:20px;
  opacity:.7;
}

.score{
  position:absolute;
  top:28px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20%;
  font-size:72px;
  font-weight:900;
  opacity:.15;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="topbar">

  <div class="title">
    PONG
  </div>

  <div class="controls">

    <div class="group">

      <button id="vsBtn" class="active">
        2 Players
      </button>

      <button id="botBtn">
        Bot
      </button>

    </div>

    <div class="group">

      <button id="normalBtn" class="active">
        Normal
      </button>

      <button id="fastBtn">
        Fast
      </button>

      <button id="superBtn">
        Super Fast
      </button>

    </div>

    <div class="group">

      <button id="pauseBtn" class="pause">
        ⏸
      </button>

    </div>

  </div>

</div>

<div class="game-wrapper">

  <div class="score">
    <div id="leftScore">0</div>
    <div id="rightScore">0</div>
  </div>

  <canvas id="game"></canvas>

  <div class="overlay">

    <div class="bigtext" id="overlayTitle">
      HOLD TO PLAY
    </div>

    <div class="smalltext" id="overlaySub">
      Keep fingers or keys pressed
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

const wrapper=document.querySelector('.game-wrapper');

function resize(){
  canvas.width=wrapper.clientWidth;
  canvas.height=wrapper.clientHeight;
}
resize();
window.addEventListener('resize',resize);

const overlayTitle=document.getElementById('overlayTitle');
const overlaySub=document.getElementById('overlaySub');

const pauseBtn=document.getElementById('pauseBtn');

const leftScoreText=document.getElementById('leftScore');
const rightScoreText=document.getElementById('rightScore');

let mode='vs';
let paused=false;
let state='hold';

let speed=12;

const keys={};

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
});

window.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;
});

const left={
  x:24,
  y:200,
  w:20,
  h:160,
  score:0,
  glow:0
};

const right={
  x:0,
  y:200,
  w:20,
  h:160,
  score:0,
  glow:0
};

const ball={
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

let nextDirection=1;

function resetBall(){
  ball.x=canvas.width/2;
  ball.y=canvas.height/2;

  const angle=(Math.random()*1.2)-0.6;

  ball.vx=Math.cos(angle)*speed*nextDirection;
  ball.vy=Math.sin(angle)*speed;

  ball.trail=[];
}

resetBall();

function setMode(newMode){
  mode=newMode;

  document.getElementById('vsBtn')
    .classList.toggle('active',mode==='vs');

  document.getElementById('botBtn')
    .classList.toggle('active',mode==='bot');

  startHold();
}

function setSpeed(value){
  speed=value;

  document.getElementById('normalBtn')
    .classList.remove('active');

  document.getElementById('fastBtn')
    .classList.remove('active');

  document.getElementById('superBtn')
    .classList.remove('active');

  if(value===12){
    normalBtn.classList.add('active');
  }

  if(value===20){
    fastBtn.classList.add('active');
  }

  if(value===28){
    superBtn.classList.add('active');
  }

  startHold();
}

vsBtn.onclick=()=>setMode('vs');
botBtn.onclick=()=>setMode('bot');

normalBtn.onclick=()=>setSpeed(12);
fastBtn.onclick=()=>setSpeed(20);
superBtn.onclick=()=>setSpeed(28);

pauseBtn.onclick=()=>{

  if(paused){

    paused=false;
    startCountdown();

    pauseBtn.textContent='⏸';

  }else{

    paused=true;

    overlayTitle.textContent='PAUSED';
    overlaySub.textContent='Press Play';

    pauseBtn.textContent='▶';

  }

};

function startHold(){

  paused=false;

  state='hold';

  overlayTitle.textContent='HOLD TO PLAY';
  overlaySub.textContent='Keep touching or holding keys';

  pauseBtn.textContent='⏸';

  resetBall();
}

function startCountdown(){

  state='countdown';

  let count=3;

  overlayTitle.textContent=count;
  overlaySub.textContent='';

  const interval=setInterval(()=>{

    if(paused){
      clearInterval(interval);
      return;
    }

    count--;

    if(count>0){

      overlayTitle.textContent=count;

    }else if(count===0){

      overlayTitle.textContent='GO!';

    }else{

      clearInterval(interval);

      overlayTitle.textContent='';
      overlaySub.textContent='';

      state='play';

    }

  },700);

}

function playerReady(){

  const leftReady=
    keys['w']||
    keys['s']||
    activeLeftTouch;

  const rightReady=
    keys['arrowup']||
    keys['arrowdown']||
    activeRightTouch;

  if(mode==='vs'){
    return leftReady&&rightReady;
  }

  return leftReady;
}

let activeLeftTouch=null;
let activeRightTouch=null;

window.addEventListener('touchstart',handleTouch,{passive:false});
window.addEventListener('touchmove',handleTouch,{passive:false});
window.addEventListener('touchend',clearTouches,{passive:false});

function handleTouch(e){

  e.preventDefault();

  activeLeftTouch=null;
  activeRightTouch=null;

  for(const touch of e.touches){

    if(mode==='vs'){

      if(touch.clientX<window.innerWidth/2){

        activeLeftTouch=touch.clientY;

      }else{

        activeRightTouch=touch.clientY;

      }

    }else{

      activeLeftTouch=touch.clientY;

    }

  }

}

function clearTouches(e){

  activeLeftTouch=null;
  activeRightTouch=null;

  for(const touch of e.touches){

    if(mode==='vs'){

      if(touch.clientX<window.innerWidth/2){

        activeLeftTouch=touch.clientY;

      }else{

        activeRightTouch=touch.clientY;

      }

    }else{

      activeLeftTouch=touch.clientY;

    }

  }

}

function clamp(){

  left.y=Math.max(
    0,
    Math.min(canvas.height-left.h,left.y)
  );

  right.y=Math.max(
    0,
    Math.min(canvas.height-right.h,right.y)
  );

}

function movePlayers(){

  const keyboardSpeed=14;

  if(keys['w']) left.y-=keyboardSpeed;
  if(keys['s']) left.y+=keyboardSpeed;

  if(mode==='vs'){

    if(keys['arrowup']) right.y-=keyboardSpeed;
    if(keys['arrowdown']) right.y+=keyboardSpeed;

  }

  if(activeLeftTouch!==null){

    left.y=
      activeLeftTouch
      -wrapper.getBoundingClientRect().top
      -left.h/2;

  }

  if(mode==='vs'&&activeRightTouch!==null){

    right.y=
      activeRightTouch
      -wrapper.getBoundingClientRect().top
      -right.h/2;

  }

  if(mode==='bot'){

    const target=ball.y-right.h/2;

    right.y+=(target-right.y)*0.24;

  }

  clamp();
}

function paddleBounce(paddle,isLeft){

  const relative=
    (ball.y-(paddle.y+paddle.h/2))
    /(paddle.h/2);

  const bounceAngle=
    relative*1.2;

  const direction=isLeft?1:-1;

  ball.vx=
    Math.cos(bounceAngle)
    *speed
    *direction;

  ball.vy=
    Math.sin(bounceAngle)
    *speed;

  paddle.glow=1;
}

function update(){

  movePlayers();

  if(paused) return;

  if(state==='hold'){

    if(playerReady()){
      startCountdown();
    }

    return;
  }

  if(state!=='play') return;

  left.glow*=0.9;
  right.glow*=0.9;

  ball.x+=ball.vx;
  ball.y+=ball.vy;

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length>14){
    ball.trail.shift();
  }

  if(ball.y<ball.size||
     ball.y>canvas.height-ball.size){

    ball.vy*=-1;

  }

  if(
    ball.x-ball.size<left.x+left.w&&
    ball.y>left.y&&
    ball.y<left.y+left.h
  ){
    paddleBounce(left,true);
  }

  right.x=canvas.width-right.w-24;

  if(
    ball.x+ball.size>right.x&&
    ball.y>right.y&&
    ball.y<right.y+right.h
  ){
    paddleBounce(right,false);
  }

  if(ball.x<0){

    right.score++;
    rightScoreText.textContent=right.score;

    nextDirection=-1;

    startCountdown();
    resetBall();

  }

  if(ball.x>canvas.width){

    left.score++;
    leftScoreText.textContent=left.score;

    nextDirection=1;

    startCountdown();
    resetBall();

  }

}

function drawBackground(){

  ctx.fillStyle='#020617';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const g=ctx.createLinearGradient(
    0,0,
    canvas.width,
    canvas.height
  );

  g.addColorStop(0,'rgba(80,120,255,0.08)');
  g.addColorStop(1,'rgba(180,80,255,0.08)');

  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.setLineDash([12,18]);

  ctx.strokeStyle='rgba(255,255,255,0.12)';

  ctx.beginPath();
  ctx.moveTo(canvas.width/2,0);
  ctx.lineTo(canvas.width/2,canvas.height);
  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(p,color){

  ctx.shadowBlur=25*p.glow;
  ctx.shadowColor=color;

  ctx.fillStyle=color;

  ctx.beginPath();
  ctx.roundRect(
    p.x,
    p.y,
    p.w,
    p.h,
    20
  );

  ctx.fill();

  ctx.shadowBlur=0;
}

function drawBall(){

  for(let i=0;i<ball.trail.length;i++){

    const t=ball.trail[i];

    ctx.globalAlpha=i/ball.trail.length;

    ctx.fillStyle='white';

    ctx.beginPath();
    ctx.arc(
      t.x,
      t.y,
      ball.size*(i/ball.trail.length),
      0,
      Math.PI*2
    );

    ctx.fill();

  }

  ctx.globalAlpha=1;

  ctx.shadowBlur=25;
  ctx.shadowColor='white';

  ctx.fillStyle='white';

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.size,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
}

function drawPrediction(){

  if(state!=='countdown') return;

  ctx.setLineDash([10,14]);

  ctx.strokeStyle='rgba(255,255,255,0.35)';

  ctx.beginPath();

  ctx.moveTo(ball.x,ball.y);

  ctx.lineTo(
    ball.x+ball.vx*18,
    ball.y+ball.vy*18
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function draw(){

  drawBackground();

  drawPrediction();

  drawPaddle(left,'#7dd3fc');
  drawPaddle(right,'#c084fc');

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();
</script>

</body>
</html>
