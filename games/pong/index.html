<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;

  background:
    radial-gradient(circle at top left,
    rgba(99,102,241,0.18),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(16,185,129,0.16),
    transparent 35%),

    linear-gradient(
      180deg,
      #020617,
      #050816,
      #020617
    );

  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.app{
  width:100%;
  height:100%;
  padding:16px;

  display:flex;
  flex-direction:column;
  gap:14px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:min(1200px,100%);
  margin:0 auto;
}

.title{
  font-size:34px;
  font-weight:900;
  letter-spacing:1px;
}

.topbar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.group{
  display:flex;
  gap:10px;

  padding:10px;

  border-radius:18px;

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);
}

button{
  border:none;
  background:transparent;
  color:white;

  padding:12px 18px;

  border-radius:14px;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:0.2s;
}

button.active{
  background:rgba(255,255,255,0.12);
}

.pause-btn{
  width:54px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

.game-container{
  position:relative;

  width:min(1200px,100%);
  height:calc(100vh - 140px);

  margin:0 auto;

  border-radius:34px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,0.08);

  background:
    linear-gradient(
      135deg,
      rgba(99,102,241,0.08),
      rgba(16,185,129,0.06)
    );

  box-shadow:
    0 0 50px rgba(0,0,0,0.4),
    inset 0 0 80px rgba(255,255,255,0.03);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.center-message{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  pointer-events:none;

  z-index:20;
}

.message{
  font-size:48px;
  font-weight:900;

  text-align:center;

  text-shadow:
    0 0 20px rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div class="app">

  <div class="header">

    <div class="title">
      Pong
    </div>

    <div class="topbar">

      <div class="group">

        <button
          id="vsBtn"
          class="active"
        >
          2 Players
        </button>

        <button id="botBtn">
          Impossible Bot
        </button>

      </div>

      <div class="group">

        <button id="normalBtn" class="active">
          Normal
        </button>

        <button id="fastBtn">
          Fast
        </button>

      </div>

      <div class="group">

        <button
          id="pauseBtn"
          class="pause-btn"
        >
          ❚❚
        </button>

      </div>

    </div>

  </div>

  <div class="game-container">

    <canvas id="game"></canvas>

    <div class="center-message">
      <div
        class="message"
        id="message"
      >
        Hold To Play
      </div>
    </div>

  </div>

</div>

<script>
const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const message =
  document.getElementById('message');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const normalBtn =
  document.getElementById('normalBtn');

const fastBtn =
  document.getElementById('fastBtn');

const pauseBtn =
  document.getElementById('pauseBtn');

let mode = 'vs';

let baseSpeed = 12;

let running = false;
let paused = false;

let countdown = null;

let launchDirection = 1;

function resize(){

  const rect =
    canvas.parentElement.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;

}

resize();

window.addEventListener(
  'resize',
  resize
);

const paddle = {
  width:20,
  height:150
};

const left = {
  x:22,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

function resetBall(dir){

  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  ball.trail = [];

  launchDirection = dir;

  ball.vx = 0;
  ball.vy = 0;

}

function startCountdown(callback){

  if (countdown) return;

  let steps = ['3','2','1','GO!'];

  let index = 0;

  countdown = setInterval(()=>{

    message.textContent =
      steps[index];

    index++;

    if (index >= steps.length){

      clearInterval(countdown);

      countdown = null;

      message.textContent = '';

      callback();

    }

  },700);

}

function setReadyMessage(){

  if (!running && !paused){

    message.textContent =
      'Hold To Play';

  }

}

function resetGame(){

  running = false;
  paused = false;

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height/2 -
    paddle.height/2;

  right.y =
    canvas.height/2 -
    paddle.height/2;

  resetBall(1);

  pauseBtn.innerHTML = '❚❚';

  setReadyMessage();

}

resetGame();

function activate(button,list){

  list.forEach(btn=>{
    btn.classList.remove('active');
  });

  button.classList.add('active');

}

vsBtn.onclick = ()=>{

  mode = 'vs';

  activate(
    vsBtn,
    [vsBtn,botBtn]
  );

  resetGame();

};

botBtn.onclick = ()=>{

  mode = 'bot';

  activate(
    botBtn,
    [vsBtn,botBtn]
  );

  resetGame();

};

normalBtn.onclick = ()=>{

  baseSpeed = 12;

  activate(
    normalBtn,
    [normalBtn,fastBtn]
  );

  resetGame();

};

fastBtn.onclick = ()=>{

  baseSpeed = 24;

  activate(
    fastBtn,
    [normalBtn,fastBtn]
  );

  resetGame();

};

pauseBtn.onclick = ()=>{

  if (!running) return;

  paused = !paused;

  if (paused){

    message.textContent =
      'Paused';

    pauseBtn.innerHTML = '▶';

  }

  else{

    pauseBtn.innerHTML = '❚❚';

    startCountdown(()=>{

      running = true;

      ball.vx =
        baseSpeed * launchDirection;

    });

  }

};

const touches = {};

window.addEventListener(
  'touchstart',
  e=>{

    for (const touch of e.touches){

      touches[touch.identifier] = touch;

    }

    checkStart();

  },
  {passive:false}
);

window.addEventListener(
  'touchmove',
  e=>{

    e.preventDefault();

    if (paused) return;

    for (const touch of e.touches){

      if (mode === 'vs'){

        if (
          touch.clientX <
          window.innerWidth/2
        ){

          left.y =
            touch.clientY -
            paddle.height/2;

        }

        else{

          right.y =
            touch.clientY -
            paddle.height/2;

        }

      }

      else{

        left.y =
          touch.clientY -
          paddle.height/2;

      }

    }

    clampPaddles();

  },
  {passive:false}
);

window.addEventListener(
  'touchend',
  ()=>{

    if (!running){

      setReadyMessage();

    }

  }
);

function checkStart(){

  if (running || paused) return;

  const touchCount =
    Object.keys(touches).length;

  if (
    (mode === 'vs' && touchCount >= 2)
    ||
    (mode === 'bot' && touchCount >= 1)
  ){

    startCountdown(()=>{

      running = true;

      ball.vx =
        baseSpeed * launchDirection;

      ball.vy =
        (Math.random()*6)-3;

    });

  }

}

const keys = {};

window.addEventListener(
  'keydown',
  e=>{

    if (paused) return;

    keys[e.key] = true;

  }
);

window.addEventListener(
  'keyup',
  e=>{

    keys[e.key] = false;

  }
);

function clampPaddles(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height - paddle.height,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height - paddle.height,
      right.y
    )
  );

}

function scorePoint(side){

  running = false;

  resetBall(side);

  startCountdown(()=>{

    running = true;

    ball.vx =
      baseSpeed * side;

    ball.vy =
      (Math.random()*6)-3;

  });

}

function update(){

  right.x =
    canvas.width - 42;

  left.glow *= 0.9;
  right.glow *= 0.9;

  if (!running || paused){

    return;

  }

  if (keys['w']){
    left.y -= 10;
  }

  if (keys['s']){
    left.y += 10;
  }

  if (mode === 'vs'){

    if (keys['ArrowUp']){
      right.y -= 10;
    }

    if (keys['ArrowDown']){
      right.y += 10;
    }

  }

  if (mode === 'bot'){

    const target =
      ball.y - paddle.height/2;

    right.y +=
      (target - right.y) * 0.25;

  }

  clampPaddles();

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if (ball.trail.length > 10){
    ball.trail.shift();
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ){

    ball.vy *= -1;

  }

  if (
    ball.x - ball.size <
    left.x + paddle.width &&

    ball.y >
    left.y &&

    ball.y <
    left.y + paddle.height
  ){

    const hit =
      (
        ball.y -
        (left.y + paddle.height/2)
      ) / (paddle.height/2);

    ball.vx =
      Math.abs(ball.vx);

    ball.vy =
      hit * 12;

    left.glow = 1;

  }

  if (
    ball.x + ball.size >
    right.x &&

    ball.y >
    right.y &&

    ball.y <
    right.y + paddle.height
  ){

    const hit =
      (
        ball.y -
        (right.y + paddle.height/2)
      ) / (paddle.height/2);

    ball.vx =
      -Math.abs(ball.vx);

    ball.vy =
      hit * 12;

    right.glow = 1;

  }

  if (ball.x < 0){

    right.score++;

    scorePoint(-1);

  }

  if (ball.x > canvas.width){

    left.score++;

    scorePoint(1);

  }

}

function drawBackground(){

  ctx.fillStyle = '#020617';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,0.08)';

  ctx.setLineDash([14,14]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPrediction(){

  if (running) return;

  ctx.strokeStyle =
    'rgba(255,255,255,0.22)';

  ctx.setLineDash([10,14]);

  ctx.beginPath();

  ctx.moveTo(
    ball.x,
    ball.y
  );

  ctx.lineTo(
    ball.x + launchDirection * 220,
    ball.y
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(player,color){

  ctx.shadowBlur =
    25 * player.glow;

  ctx.shadowColor = color;

  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.roundRect(
    player.x,
    player.y,
    paddle.width,
    paddle.height,
    14
  );

  ctx.fill();

  ctx.shadowBlur = 0;

}

function drawBall(){

  for (
    let i = 0;
    i < ball.trail.length;
    i++
  ){

    const t =
      ball.trail[i];

    ctx.globalAlpha =
      i / ball.trail.length * 0.45;

    ctx.beginPath();

    ctx.arc(
      t.x,
      t.y,
      ball.size,
      0,
      Math.PI*2
    );

    ctx.fillStyle = '#ffffff';

    ctx.fill();

  }

  ctx.globalAlpha = 1;

  ctx.shadowBlur = 20;

  ctx.shadowColor = '#ffffff';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fillStyle = '#ffffff';

  ctx.fill();

  ctx.shadowBlur = 0;

}

function drawScores(){

  ctx.font =
    'bold 72px Arial';

  ctx.fillStyle =
    'rgba(255,255,255,0.12)';

  ctx.fillText(
    left.score,
    canvas.width * 0.25,
    90
  );

  ctx.fillText(
    right.score,
    canvas.width * 0.75,
    90
  );

}

function draw(){

  drawBackground();

  drawPrediction();

  drawScores();

  drawPaddle(
    left,
    '#6366f1'
  );

  drawPaddle(
    right,
    '#10b981'
  );

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();
</script>

</body>
</html>
