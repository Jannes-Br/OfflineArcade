<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;

  background:
    radial-gradient(circle at top,
    #1e293b,
    #020617 70%);

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
}

#game-wrapper{
  width:96vw;
  height:94vh;

  max-width:1800px;
  max-height:1000px;

  border-radius:28px;

  overflow:hidden;

  background:#020617;

  border:2px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 50px rgba(0,0,0,0.45),
    inset 0 0 40px rgba(255,255,255,0.03);

  position:relative;

  display:flex;
  flex-direction:column;
}

#topbar{
  width:100%;
  padding:14px;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;

  z-index:10;

  background:
    rgba(255,255,255,0.03);

  border-bottom:
    1px solid rgba(255,255,255,0.05);
}

.segment{
  display:flex;
  gap:8px;
}

.segment button{
  border:none;

  background:
    rgba(255,255,255,0.07);

  color:white;

  padding:12px 18px;

  border-radius:14px;

  font-size:15px;

  transition:0.15s;
}

.segment button.active{
  background:white;
  color:black;
  font-weight:bold;
}

#pauseBtn{
  min-width:110px;
}

#playBtn{
  min-width:110px;
}

canvas{
  flex:1;
  width:100%;
  display:block;
}

#start-message{
  position:absolute;

  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  pointer-events:none;
}

#start-text{
  font-size:52px;
  font-weight:bold;

  opacity:0.08;
}

#winner-text{
  margin-top:12px;
  font-size:24px;
  opacity:0.7;
}

</style>
</head>

<body>

<div id="game-wrapper">

  <div id="topbar">

    <div class="segment">

      <button
        id="vsBtn"
        class="active"
      >
        2 Players
      </button>

      <button id="botBtn">
        Impossible Bot
      </button>

    </div>

    <div class="segment">

      <button
        class="speedBtn active"
        data-speed="7"
      >
        Slow
      </button>

      <button
        class="speedBtn"
        data-speed="10"
      >
        Normal
      </button>

      <button
        class="speedBtn"
        data-speed="14"
      >
        Fast
      </button>

    </div>

    <div class="segment">

      <button
        class="shapeBtn active"
        data-shape="classic"
      >
        Classic
      </button>

      <button
        class="shapeBtn"
        data-shape="round"
      >
        Round
      </button>

      <button
        class="shapeBtn"
        data-shape="sharp"
      >
        Sharp
      </button>

    </div>

    <div class="segment">

      <button id="playBtn">
        Play
      </button>

      <button id="pauseBtn">
        Pause
      </button>

    </div>

  </div>

  <canvas id="game"></canvas>

  <div id="start-message">

    <div id="start-text">
      PONG
    </div>

    <div id="winner-text">
      Press Play
    </div>

  </div>

</div>

<script>

const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const playBtn =
  document.getElementById('playBtn');

const pauseBtn =
  document.getElementById('pauseBtn');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const winnerText =
  document.getElementById('winner-text');

const speedButtons =
  document.querySelectorAll('.speedBtn');

const shapeButtons =
  document.querySelectorAll('.shapeBtn');

let mode = 'vs';

let running = false;
let paused = false;

let ballSpeed = 7;

let paddleShape = 'classic';

function resize(){

  canvas.width =
    canvas.clientWidth;

  canvas.height =
    canvas.clientHeight;

  right.x =
    canvas.width - 55;
}

window.addEventListener(
  'resize',
  resize
);

resize();

const paddleWidth = 18;
const paddleHeight = 170;

const left = {
  x:35,
  y:100,
  score:0
};

const right = {
  x:0,
  y:100,
  score:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14
};

function resetBall(){

  ball.x =
    canvas.width / 2;

  ball.y =
    canvas.height / 2;

  const dir =
    Math.random() > 0.5
    ? 1
    : -1;

  ball.vx =
    ballSpeed * dir;

  ball.vy =
    (Math.random() * 8 - 4);
}

function resetGame(){

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height / 2
    - paddleHeight / 2;

  right.y =
    canvas.height / 2
    - paddleHeight / 2;

  resetBall();

  running = false;
  paused = false;

  playBtn.textContent =
    'Play';

  pauseBtn.textContent =
    'Pause';

  winnerText.textContent =
    'Press Play';
}

function startGame(){

  running = true;
  paused = false;

  winnerText.textContent =
    '';
}

playBtn.addEventListener(
  'click',
  () => {

    resetBall();

    startGame();

  }
);

pauseBtn.addEventListener(
  'click',
  () => {

    if (!running){
      return;
    }

    paused = !paused;

    if (paused){

      pauseBtn.textContent =
        'Resume';

      winnerText.textContent =
        'Paused';

    } else {

      pauseBtn.textContent =
        'Pause';

      winnerText.textContent =
        '';
    }

  }
);

function setMode(newMode){

  mode = newMode;

  vsBtn.classList.remove(
    'active'
  );

  botBtn.classList.remove(
    'active'
  );

  if (mode === 'vs'){

    vsBtn.classList.add(
      'active'
    );

  } else {

    botBtn.classList.add(
      'active'
    );
  }

  resetGame();
}

vsBtn.addEventListener(
  'click',
  () => setMode('vs')
);

botBtn.addEventListener(
  'click',
  () => setMode('bot')
);

speedButtons.forEach(btn => {

  btn.addEventListener(
    'click',
    () => {

      speedButtons.forEach(
        b => b.classList.remove('active')
      );

      btn.classList.add(
        'active'
      );

      ballSpeed =
        Number(
          btn.dataset.speed
        );

      resetGame();
    }
  );

});

shapeButtons.forEach(btn => {

  btn.addEventListener(
    'click',
    () => {

      shapeButtons.forEach(
        b => b.classList.remove('active')
      );

      btn.classList.add(
        'active'
      );

      paddleShape =
        btn.dataset.shape;

      resetGame();
    }
  );

});

function drawBackground(){

  ctx.fillStyle =
    '#020617';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,0.08)';

  ctx.setLineDash([16,16]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);
}

function drawPaddle(x,y){

  ctx.fillStyle =
    'white';

  if (paddleShape === 'sharp'){

    ctx.fillRect(
      x,
      y,
      paddleWidth,
      paddleHeight
    );

    return;
  }

  ctx.beginPath();

  ctx.roundRect(
    x,
    y,
    paddleWidth,
    paddleHeight,

    paddleShape === 'round'
    ? 40
    : 14
  );

  ctx.fill();
}

function drawBall(){

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI * 2
  );

  ctx.fillStyle =
    'white';

  ctx.shadowBlur = 20;
  ctx.shadowColor = 'white';

  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawScores(){

  ctx.font =
    'bold 72px Arial';

  ctx.fillStyle =
    'rgba(255,255,255,0.12)';

  ctx.fillText(
    left.score,
    canvas.width * 0.25,
    90
  );

  ctx.fillText(
    right.score,
    canvas.width * 0.75,
    90
  );
}

function update(){

  if (!running || paused){
    return;
  }

  right.x =
    canvas.width - 55;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ){
    ball.vy *= -1;
  }

  if (

    ball.x - ball.size <
    left.x + paddleWidth &&

    ball.y > left.y &&
    ball.y <
    left.y + paddleHeight

  ){

    ball.vx =
      Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (left.y +
      paddleHeight/2))
      * 0.05;
  }

  if (

    ball.x + ball.size >
    right.x &&

    ball.y > right.y &&
    ball.y <
    right.y + paddleHeight

  ){

    ball.vx =
      -Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (right.y +
      paddleHeight/2))
      * 0.05;
  }

  if (ball.x < 0){

    right.score++;

    if (right.score >= 10){

      running = false;

      winnerText.textContent =
        mode === 'bot'
        ? 'Bot Wins'
        : 'Right Player Wins';
    }

    resetBall();
  }

  if (ball.x > canvas.width){

    left.score++;

    if (left.score >= 10){

      running = false;

      winnerText.textContent =
        'Left Player Wins';
    }

    resetBall();
  }

  if (mode === 'bot'){

    const target =
      ball.y -
      paddleHeight/2;

    right.y +=
      (target - right.y)
      * 0.30;
  }

  clampPaddles();
}

function draw(){

  drawBackground();

  drawScores();

  drawPaddle(
    left.x,
    left.y
  );

  drawPaddle(
    right.x,
    right.y
  );

  drawBall();
}

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

loop();

function clampPaddles(){

  left.y =
    Math.max(
      0,
      Math.min(
        canvas.height -
        paddleHeight,
        left.y
      )
    );

  right.y =
    Math.max(
      0,
      Math.min(
        canvas.height -
        paddleHeight,
        right.y
      )
    );
}

window.addEventListener(
  'touchmove',
  e => {

    for (const touch of e.touches){

      const rect =
        canvas.getBoundingClientRect();

      const x =
        touch.clientX -
        rect.left;

      const y =
        touch.clientY -
        rect.top;

      if (
        x < canvas.width / 2
      ){

        left.y =
          y -
          paddleHeight/2;
      }

      else if (
        mode === 'vs'
      ){

        right.y =
          y -
          paddleHeight/2;
      }
    }

    clampPaddles();

  },
  {passive:false}
);

resetGame();

</script>

</body>
</html>
