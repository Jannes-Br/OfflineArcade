<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>Pong</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  touch-action: none;
  user-select: none;
}

body {
  background: linear-gradient(180deg,#020617,#0f172a);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

.ui {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 12px;
}

button {
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  padding: 12px 18px;
  border-radius: 14px;
  font-size: 16px;
}

button.active {
  background: rgba(255,255,255,0.18);
}
</style>
</head>
<body>

<div class="ui">
  <button id="vsBtn" class="active">
    2 Players
  </button>

  <button id="botBtn">
    Impossible Bot
  </button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const vsBtn = document.getElementById('vsBtn');
const botBtn = document.getElementById('botBtn');

let mode = 'vs';

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

const paddleWidth = 18;
const paddleHeight = 180;

const left = {
  x: 40,
  y: 200,
  score: 0
};

const right = {
  x: 0,
  y: 200,
  score: 0
};

const ball = {
  x: 0,
  y: 0,
  vx: 8,
  vy: 6,
  size: 16
};

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  const dir = Math.random() > 0.5 ? 1 : -1;

  ball.vx = 8 * dir;
  ball.vy = (Math.random() * 8 - 4);
}

resetBall();

function drawBackground() {
  ctx.fillStyle = '#020617';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.setLineDash([18,18]);

  ctx.beginPath();
  ctx.moveTo(canvas.width/2,0);
  ctx.lineTo(canvas.width/2,canvas.height);
  ctx.stroke();

  ctx.setLineDash([]);
}

function drawPaddle(x,y) {
  ctx.fillStyle = 'white';

  ctx.beginPath();
  ctx.roundRect(x,y,paddleWidth,paddleHeight,14);
  ctx.fill();
}

function drawBall() {
  ctx.fillStyle = 'white';

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.size,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 25;
  ctx.shadowColor = 'white';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawScores() {
  ctx.font = 'bold 70px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';

  ctx.fillText(left.score,canvas.width*0.25,90);
  ctx.fillText(right.score,canvas.width*0.75,90);
}

function update() {
  right.x = canvas.width - 58;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y < ball.size || ball.y > canvas.height - ball.size) {
    ball.vy *= -1;
  }

  if (
    ball.x - ball.size < left.x + paddleWidth &&
    ball.y > left.y &&
    ball.y < left.y + paddleHeight
  ) {
    ball.vx = Math.abs(ball.vx);
  }

  if (
    ball.x + ball.size > right.x &&
    ball.y > right.y &&
    ball.y < right.y + paddleHeight
  ) {
    ball.vx = -Math.abs(ball.vx);
  }

  if (ball.x < 0) {
    right.score++;
    resetBall();
  }

  if (ball.x > canvas.width) {
    left.score++;
    resetBall();
  }

  if (mode === 'bot') {
    const target = ball.y - paddleHeight/2;

    right.y += (target - right.y) * 0.22;
  }
}

function draw() {
  drawBackground();
  drawScores();
  drawPaddle(left.x,left.y);
  drawPaddle(right.x,right.y);
  drawBall();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

function clampPaddles() {
  left.y = Math.max(0,Math.min(canvas.height-paddleHeight,left.y));
  right.y = Math.max(0,Math.min(canvas.height-paddleHeight,right.y));
}

window.addEventListener('touchmove', e => {
  for (const touch of e.touches) {

    if (touch.clientX < canvas.width / 2) {
      left.y = touch.clientY - paddleHeight/2;
    }
    else if (mode === 'vs') {
      right.y = touch.clientY - paddleHeight/2;
    }
  }

  clampPaddles();
},{passive:false});

vsBtn.addEventListener('click', () => {
  mode = 'vs';

  vsBtn.classList.add('active');
  botBtn.classList.remove('active');
});

botBtn.addEventListener('click', () => {
  mode = 'bot';

  botBtn.classList.add('active');
  vsBtn.classList.remove('active');
});
</script>

</body>
</html>
