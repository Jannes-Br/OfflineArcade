<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Inter,Arial,sans-serif;

  background:
    radial-gradient(circle at top left,
      rgba(99,102,241,0.18),
      transparent 35%),

    radial-gradient(circle at bottom right,
      rgba(20,184,166,0.18),
      transparent 35%),

    linear-gradient(
      180deg,
      #020617,
      #08111f,
      #020617
    );

  display:flex;
  justify-content:center;
  align-items:center;
}

.wrapper{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:14px;
  gap:14px;
}

.topbar{
  width:min(1200px,100%);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  z-index:10;
}

.group{
  display:flex;
  gap:8px;
  padding:8px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.06);
}

button{
  border:none;
  background:transparent;
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button.active{
  background:rgba(255,255,255,0.14);
}

button:hover{
  background:rgba(255,255,255,0.08);
}

.icon-btn{
  width:50px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}

.game-container{
  position:relative;

  width:min(1200px,100%);
  height:calc(100vh - 150px);

  border-radius:30px;

  overflow:hidden;

  background:
    linear-gradient(
      135deg,
      rgba(99,102,241,0.08),
      rgba(20,184,166,0.08)
    );

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 60px rgba(0,0,0,0.45),
    inset 0 0 80px rgba(255,255,255,0.02);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:18px;

  background:rgba(2,6,23,0.45);
  backdrop-filter:blur(8px);

  z-index:20;
}

.overlay.hidden{
  display:none;
}

.play-btn{
  border:none;

  width:110px;
  height:110px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #6366f1,
      #14b8a6
    );

  color:white;
  font-size:42px;
  cursor:pointer;

  box-shadow:
    0 0 30px rgba(99,102,241,0.45);

  transition:0.2s;
}

.play-btn:active{
  transform:scale(0.95);
}

.title{
  color:white;
  font-size:42px;
  font-weight:800;
  letter-spacing:1px;
}

.subtitle{
  color:rgba(255,255,255,0.65);
  font-size:15px;
}

@media(max-width:800px){

  .game-container{
    height:calc(100vh - 190px);
  }

  button{
    padding:10px 14px;
    font-size:14px;
  }

}
</style>
</head>
<body>

<div class="wrapper">

  <div class="topbar">

    <div class="group">

      <button
        id="vsBtn"
        class="active"
      >
        2 Players
      </button>

      <button id="botBtn">
        Impossible Bot
      </button>

    </div>

    <div class="group">

      <button
        class="speedBtn active"
        data-speed="7"
      >
        Normal
      </button>

      <button
        class="speedBtn"
        data-speed="10"
      >
        Fast
      </button>

      <button
        class="speedBtn"
        data-speed="14"
      >
        Extreme
      </button>

    </div>

    <div class="group">

      <button
        class="shapeBtn active"
        data-shape="normal"
      >
        Paddle
      </button>

      <button
        class="shapeBtn"
        data-shape="curve"
      >
        Curve
      </button>

      <button
        class="shapeBtn"
        data-shape="diamond"
      >
        Diamond
      </button>

    </div>

    <div class="group">

      <button
        id="pauseBtn"
        class="icon-btn"
      >
        ⏸
      </button>

    </div>

  </div>

  <div class="game-container">

    <canvas id="game"></canvas>

    <div
      class="overlay"
      id="overlay"
    >

      <div class="title">
        Pong
      </div>

      <div class="subtitle">
        Tap Play To Start
      </div>

      <button
        class="play-btn"
        id="playBtn"
      >
        ▶
      </button>

    </div>

  </div>

</div>

<script>
const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const overlay =
  document.getElementById('overlay');

const playBtn =
  document.getElementById('playBtn');

const pauseBtn =
  document.getElementById('pauseBtn');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const speedBtns =
  document.querySelectorAll('.speedBtn');

const shapeBtns =
  document.querySelectorAll('.shapeBtn');

let mode = 'vs';

let running = false;

let ballSpeed = 7;

let paddleShape = 'normal';

function resize(){

  canvas.width =
    canvas.clientWidth;

  canvas.height =
    canvas.clientHeight;

}

window.addEventListener(
  'resize',
  resize
);

resize();

const paddleWidth = 26;
const paddleHeight = 170;

const left = {
  x:40,
  y:200,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:200,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

function resetBall(){

  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  const dir =
    Math.random() > 0.5
    ? 1
    : -1;

  const angle =
    (Math.random()*1.1)-0.55;

  ball.vx =
    Math.cos(angle)
    * ballSpeed
    * dir;

  ball.vy =
    Math.sin(angle)
    * ballSpeed;

}

function resetGame(){

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height/2
    - paddleHeight/2;

  right.y =
    canvas.height/2
    - paddleHeight/2;

  resetBall();

  running = false;

  overlay.classList.remove(
    'hidden'
  );

  pauseBtn.textContent = '⏸';

}

resetGame();

function drawBackground(){

  ctx.fillStyle = '#020617';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,0.08)';

  ctx.lineWidth = 5;

  ctx.setLineDash([20,20]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(p,color){

  ctx.save();

  ctx.shadowBlur = 18 + p.glow;
  ctx.shadowColor = color;

  ctx.fillStyle = color;

  if(
    paddleShape === 'normal'
  ){

    ctx.beginPath();

    ctx.roundRect(
      p.x,
      p.y,
      paddleWidth,
      paddleHeight,
      20
    );

    ctx.fill();

  }

  else if(
    paddleShape === 'curve'
  ){

    ctx.beginPath();

    if(p === left){

      ctx.arc(
        p.x,
        p.y + paddleHeight/2,
        paddleHeight/2,
        -Math.PI/2,
        Math.PI/2
      );

    }

    else{

      ctx.arc(
        p.x + paddleWidth,
        p.y + paddleHeight/2,
        paddleHeight/2,
        Math.PI/2,
        -Math.PI/2
      );

    }

    ctx.closePath();
    ctx.fill();

  }

  else{

    ctx.beginPath();

    if(p === left){

      ctx.moveTo(
        p.x,
        p.y + paddleHeight/2
      );

      ctx.lineTo(
        p.x + paddleWidth,
        p.y + 18
      );

      ctx.lineTo(
        p.x + paddleWidth,
        p.y + paddleHeight - 18
      );

    }

    else{

  ctx.beginPath();

  if(p === left){

    ctx.moveTo(
      p.x + paddleWidth,
      p.y + paddleHeight/2
    );

    ctx.quadraticCurveTo(
      p.x + 4,
      p.y + 8,
      p.x,
      p.y + paddleHeight/2
    );

    ctx.quadraticCurveTo(
      p.x + 4,
      p.y + paddleHeight - 8,
      p.x + paddleWidth,
      p.y + paddleHeight/2
    );

  }

  else{

    ctx.moveTo(
      p.x,
      p.y + paddleHeight/2
    );

    ctx.quadraticCurveTo(
      p.x + paddleWidth - 4,
      p.y + 8,
      p.x + paddleWidth,
      p.y + paddleHeight/2
    );

    ctx.quadraticCurveTo(
      p.x + paddleWidth - 4,
      p.y + paddleHeight - 8,
      p.x,
      p.y + paddleHeight/2
    );

  }

  ctx.closePath();

  ctx.fill();

}
function drawBall(){

  for(let i=0;i<ball.trail.length;i++){

    const t = ball.trail[i];

    ctx.beginPath();

    ctx.fillStyle =
      `rgba(255,255,255,${
        i / ball.trail.length * 0.25
      })`;

    ctx.arc(
      t.x,
      t.y,
      ball.size*(i/ball.trail.length),
      0,
      Math.PI*2
    );

    ctx.fill();

  }

  ctx.save();

  ctx.shadowBlur = 20;
  ctx.shadowColor = '#ffffff';

  ctx.fillStyle = '#ffffff';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();

}

function drawScores(){

  ctx.fillStyle =
    'rgba(255,255,255,0.10)';

  ctx.font =
    'bold 90px Arial';

  ctx.fillText(
    left.score,
    canvas.width*0.25,
    95
  );

  ctx.fillText(
    right.score,
    canvas.width*0.75,
    95
  );

}

function clampPaddle(p){

  if(p.y < 0){
    p.y = 0;
  }

  if(
    p.y + paddleHeight
    > canvas.height
  ){
    p.y =
      canvas.height
      - paddleHeight;
  }

}

function paddlePhysics(p,isLeft){

  const hitPos =
    (
      ball.y
      - (p.y + paddleHeight/2)
    )
    / (paddleHeight/2);

  const clamped =
    Math.max(
      -1,
      Math.min(1, hitPos)
    );

  const maxBounce =
    Math.PI / 3;

  const bounceAngle =
    clamped * maxBounce;

  const speed =
    Math.min(
      22,
      Math.sqrt(
        ball.vx * ball.vx +
        ball.vy * ball.vy
      ) + 0.35
    );

  if(isLeft){

    ball.vx =
      speed *
      Math.cos(bounceAngle);

  } else {

    ball.vx =
      -speed *
      Math.cos(bounceAngle);

  }

  ball.vy =
    speed *
    Math.sin(bounceAngle);

}

function update(){

  if(!running){
    return;
  }

  right.x =
    canvas.width - 66;

  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length > 14){
    ball.trail.shift();
  }

  if(
    ball.y < ball.size
  ){

    ball.y = ball.size;
    ball.vy *= -1;

  }

  if(
    ball.y >
    canvas.height - ball.size
  ){

    ball.y =
      canvas.height
      - ball.size;

    ball.vy *= -1;

  }

  if(
    ball.x - ball.size
    < left.x + paddleWidth
    &&
    ball.y > left.y
    &&
    ball.y <
    left.y + paddleHeight
  ){

    ball.x =
      left.x
      + paddleWidth
      + ball.size;

    paddlePhysics(
      left,
      true
    );

    left.glow = 35;

  }

  if(
    ball.x + ball.size
    > right.x
    &&
    ball.y > right.y
    &&
    ball.y <
    right.y + paddleHeight
  ){

    ball.x =
      right.x
      - ball.size;

    paddlePhysics(
      right,
      false
    );

    right.glow = 35;

  }

  if(ball.x < -30){

    right.score++;
    resetBall();

  }

  if(ball.x > canvas.width + 30){

    left.score++;
    resetBall();

  }

  left.glow *= 0.9;
  right.glow *= 0.9;

  if(mode === 'bot'){

    const target =
      ball.y
      - paddleHeight/2;

    right.y +=
      (target - right.y)
      * 0.24;

    clampPaddle(right);

  }

}

function draw(){

  drawBackground();

  drawScores();

  drawPaddle(
    left,
    '#8b5cf6'
  );

  drawPaddle(
    right,
    '#06b6d4'
  );

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();

const keys = {};

window.addEventListener(
  'keydown',
  e => {
    keys[e.key] = true;
  }
);

window.addEventListener(
  'keyup',
  e => {
    keys[e.key] = false;
  }
);

function controls(){

  if(keys['w']){
    left.y -= 9;
  }

  if(keys['s']){
    left.y += 9;
  }

  if(mode === 'vs'){

    if(keys['ArrowUp']){
      right.y -= 9;
    }

    if(keys['ArrowDown']){
      right.y += 9;
    }

  }

  clampPaddle(left);
  clampPaddle(right);

  requestAnimationFrame(
    controls
  );

}

controls();

window.addEventListener(
  'touchmove',
  e => {

    for(const touch of e.touches){

      if(
        touch.clientX
        < window.innerWidth/2
      ){

        left.y =
          touch.clientY
          - paddleHeight/2;

      }

      else if(mode === 'vs'){

        right.y =
          touch.clientY
          - paddleHeight/2;

      }

    }

    clampPaddle(left);
    clampPaddle(right);

  },
  {passive:false}
);

playBtn.onclick = () => {

  running = true;

  overlay.classList.add(
    'hidden'
  );

};

pauseBtn.onclick = () => {

  if(!running){

    running = true;

    overlay.classList.add(
      'hidden'
    );

    pauseBtn.textContent = '⏸';

  }

  else{

    running = false;

    overlay.classList.remove(
      'hidden'
    );

    pauseBtn.textContent = '▶';

  }

};

vsBtn.onclick = () => {

  mode = 'vs';

  vsBtn.classList.add(
    'active'
  );

  botBtn.classList.remove(
    'active'
  );

  resetGame();

};

botBtn.onclick = () => {

  mode = 'bot';

  botBtn.classList.add(
    'active'
  );

  vsBtn.classList.remove(
    'active'
  );

  resetGame();

};

speedBtns.forEach(btn => {

  btn.onclick = () => {

    speedBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    ballSpeed =
      Number(
        btn.dataset.speed
      );

    resetGame();

  };

});

shapeBtns.forEach(btn => {

  btn.onclick = () => {

    shapeBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    paddleShape =
      btn.dataset.shape;

    resetGame();

  };

});
</script>

</body>
</html>
