<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top,#1e293b 0%,#020617 55%);
  color:white;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#game-wrapper{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

#top-ui{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  padding:16px;
  z-index:20;

  display:flex;
  flex-direction:column;
  gap:12px;

  background:
    linear-gradient(
      to bottom,
      rgba(2,6,23,.95),
      rgba(2,6,23,.35),
      transparent
    );
}

.ui-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.segment{
  display:flex;
  gap:10px;
}

.segment button{
  border:none;
  background:rgba(255,255,255,.08);
  color:white;
  padding:12px 18px;
  border-radius:16px;
  font-size:15px;
  min-width:110px;
  transition:.18s;
}

.segment button.active{
  background:rgba(255,255,255,.2);
  transform:scale(1.04);
}

.segment button.blue.active{
  background:#2563eb;
  box-shadow:0 0 18px rgba(37,99,235,.7);
}

.segment button.orange.active{
  background:#f97316;
  box-shadow:0 0 18px rgba(249,115,22,.7);
}

#pauseBtn{
  min-width:90px;
}

#playOverlay{
  position:absolute;
  inset:0;
  z-index:30;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(2,6,23,.35);
  backdrop-filter:blur(3px);
}

#playBtn{
  border:none;
  color:white;
  font-size:26px;
  padding:24px 50px;
  border-radius:26px;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #f97316
    );

  box-shadow:
    0 0 35px rgba(37,99,235,.5),
    0 0 35px rgba(249,115,22,.35);

  transition:.2s;
}

#playBtn:active{
  transform:scale(.95);
}

#game-container{
  position:absolute;
  left:50%;
  top:108px;

  transform:translateX(-50%);

  width:96vw;
  height:calc(100vh - 124px);

  border-radius:28px;

  overflow:hidden;

  border:2px solid rgba(255,255,255,.08);

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.96),
      rgba(2,6,23,.98)
    );

  box-shadow:
    inset 0 0 80px rgba(255,255,255,.03),
    0 0 60px rgba(0,0,0,.5);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

</style>
</head>
<body>

<div id="game-wrapper">

  <div id="top-ui">

    <div class="ui-row">

      <div class="segment">

        <button
          id="vsBtn"
          class="active blue"
        >
          2 Players
        </button>

        <button
          id="botBtn"
          class="orange"
        >
          Impossible Bot
        </button>

      </div>

      <button id="pauseBtn">
        Pause
      </button>

    </div>

    <div class="ui-row">

      <div class="segment">

        <button
          class="speedBtn active"
          data-speed="1"
        >
          Normal
        </button>

        <button
          class="speedBtn"
          data-speed="1.45"
        >
          Fast
        </button>

        <button
          class="speedBtn"
          data-speed="1.9"
        >
          Chaos
        </button>

      </div>

      <div class="segment">

        <button
          class="shapeBtn active"
          data-shape="normal"
        >
          Paddle
        </button>

        <button
          class="shapeBtn"
          data-shape="curve"
        >
          Curve
        </button>

        <button
          class="shapeBtn"
          data-shape="triangle"
        >
          Triangle
        </button>

      </div>

    </div>

  </div>

  <div id="playOverlay">
    <button id="playBtn">
      PLAY
    </button>
  </div>

  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

</div>

<script>

const canvas =
  document.getElementById('game');

const ctx =
  canvas.getContext('2d');

const container =
  document.getElementById('game-container');

const playOverlay =
  document.getElementById('playOverlay');

const playBtn =
  document.getElementById('playBtn');

const pauseBtn =
  document.getElementById('pauseBtn');

const vsBtn =
  document.getElementById('vsBtn');

const botBtn =
  document.getElementById('botBtn');

const speedBtns =
  document.querySelectorAll('.speedBtn');

const shapeBtns =
  document.querySelectorAll('.shapeBtn');

let running = false;
let paused = false;

let mode = 'vs';

let speedMultiplier = 1;

let paddleShape = 'normal';

function resize(){

  canvas.width =
    container.clientWidth;

  canvas.height =
    container.clientHeight;

}

resize();

window.addEventListener(
  'resize',
  resize
);

const paddleWidth = 22;
const paddleHeight = 180;

const left = {
  x:40,
  y:200,
  score:0,
  flash:0
};

const right = {
  x:0,
  y:200,
  score:0,
  flash:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  flash:0
};

function resetBall(){

  ball.x =
    canvas.width/2;

  ball.y =
    canvas.height/2;

  const dir =
    Math.random() > .5 ? 1 : -1;

  const base =
    8 * speedMultiplier;

  ball.vx =
    base * dir;

  ball.vy =
    (Math.random()*6-3)
    * speedMultiplier;

}

function resetGame(){

  left.score = 0;
  right.score = 0;

  left.y =
    canvas.height/2
    - paddleHeight/2;

  right.y =
    canvas.height/2
    - paddleHeight/2;

  resetBall();

  running = false;
  paused = false;

  pauseBtn.textContent =
    'Pause';

  playOverlay.style.display =
    'flex';

}

resetGame();

function startGame(){

  running = true;
  paused = false;

  playOverlay.style.display =
    'none';

}

playBtn.addEventListener(
  'click',
  startGame
);

pauseBtn.addEventListener(
  'click',
  () => {

    if(!running) return;

    paused = !paused;

    pauseBtn.textContent =
      paused ? 'Resume' : 'Pause';

  }
);

function setMode(newMode){

  mode = newMode;

  vsBtn.classList.remove(
    'active'
  );

  botBtn.classList.remove(
    'active'
  );

  if(mode === 'vs'){

    vsBtn.classList.add(
      'active'
    );

  }else{

    botBtn.classList.add(
      'active'
    );

  }

  resetGame();

}

vsBtn.onclick =
  () => setMode('vs');

botBtn.onclick =
  () => setMode('bot');

speedBtns.forEach(btn => {

  btn.onclick = () => {

    speedBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    speedMultiplier =
      Number(
        btn.dataset.speed
      );

    resetGame();

  };

});

shapeBtns.forEach(btn => {

  btn.onclick = () => {

    shapeBtns.forEach(
      b => b.classList.remove(
        'active'
      )
    );

    btn.classList.add(
      'active'
    );

    paddleShape =
      btn.dataset.shape;

    resetGame();

  };

});

function drawBackground(){

  const grad =
    ctx.createLinearGradient(
      0,0,0,canvas.height
    );

  grad.addColorStop(
    0,
    '#0f172a'
  );

  grad.addColorStop(
    1,
    '#020617'
  );

  ctx.fillStyle = grad;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.strokeStyle =
    'rgba(255,255,255,.08)';

  ctx.setLineDash([16,16]);

  ctx.beginPath();

  ctx.moveTo(
    canvas.width/2,
    0
  );

  ctx.lineTo(
    canvas.width/2,
    canvas.height
  );

  ctx.stroke();

  ctx.setLineDash([]);

}

function drawPaddle(
  p,
  color
){

  ctx.save();

  if(p.flash > 0){

    ctx.shadowBlur = 34;
    ctx.shadowColor = color;

  }

  ctx.fillStyle = color;

  if(
    paddleShape === 'normal'
  ){

    ctx.beginPath();

    ctx.roundRect(
      p.x,
      p.y,
      paddleWidth,
      paddleHeight,
      16
    );

    ctx.fill();

  }

  else if(
    paddleShape === 'curve'
  ){

    ctx.beginPath();

    if(color === '#3b82f6'){

      ctx.moveTo(
        p.x + paddleWidth,
        p.y
      );

      ctx.quadraticCurveTo(
        p.x - 42,
        p.y + paddleHeight/2,
        p.x + paddleWidth,
        p.y + paddleHeight
      );

    }else{

      ctx.moveTo(
        p.x,
        p.y
      );

      ctx.quadraticCurveTo(
        p.x + 64,
        p.y + paddleHeight/2,
        p.x,
        p.y + paddleHeight
      );

    }

    ctx.closePath();
    ctx.fill();

  }

  else{

    ctx.beginPath();

    if(color === '#3b82f6'){

      ctx.moveTo(
        p.x,
        p.y
      );

      ctx.lineTo(
        p.x + paddleWidth,
        p.y + paddleHeight/2
      );

      ctx.lineTo(
        p.x,
        p.y + paddleHeight
      );

    }else{

      ctx.moveTo(
        p.x + paddleWidth,
        p.y
      );

      ctx.lineTo(
        p.x,
        p.y + paddleHeight/2
      );

      ctx.lineTo(
        p.x + paddleWidth,
        p.y + paddleHeight
      );

    }

    ctx.closePath();
    ctx.fill();

  }

  ctx.restore();

}

function drawBall(){

  ctx.save();

  ctx.fillStyle = 'white';

  if(ball.flash > 0){

    ctx.shadowBlur = 34;
    ctx.shadowColor = 'white';

  }

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();

}

function drawScores(){

  ctx.font =
    'bold 70px Arial';

  ctx.fillStyle =
    'rgba(255,255,255,.08)';

  ctx.fillText(
    left.score,
    canvas.width*.25,
    88
  );

  ctx.fillText(
    right.score,
    canvas.width*.75,
    88
  );

}

function flashHit(side){

  ball.flash = 10;

  if(side === 'left'){

    left.flash = 10;

  }else{

    right.flash = 10;

  }

}

function update(){

  if(
    !running ||
    paused
  ) return;

  right.x =
    canvas.width - 62;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(
    ball.y < ball.size ||
    ball.y >
    canvas.height - ball.size
  ){

    ball.vy *= -1;

  }

  if(
    ball.x - ball.size <
    left.x + paddleWidth &&

    ball.y >
    left.y &&

    ball.y <
    left.y + paddleHeight
  ){

    ball.vx =
      Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (left.y + paddleHeight/2))
      * .03;

    flashHit('left');

  }

  if(
    ball.x + ball.size >
    right.x &&

    ball.y >
    right.y &&

    ball.y <
    right.y + paddleHeight
  ){

    ball.vx =
      -Math.abs(ball.vx);

    ball.vy +=
      (ball.y -
      (right.y + paddleHeight/2))
      * .03;

    flashHit('right');

  }

  if(ball.x < -40){

    right.score++;
    resetBall();

  }

  if(ball.x > canvas.width+40){

    left.score++;
    resetBall();

  }

  if(mode === 'bot'){

    const target =
      ball.y - paddleHeight/2;

    right.y +=
      (target - right.y)
      * .42;

  }

  left.flash *= .9;
  right.flash *= .9;
  ball.flash *= .9;

}

function draw(){

  drawBackground();

  drawScores();

  drawPaddle(
    left,
    '#3b82f6'
  );

  drawPaddle(
    right,
    '#f97316'
  );

  drawBall();

}

function loop(){

  update();
  draw();

  requestAnimationFrame(
    loop
  );

}

loop();

function clamp(){

  left.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddleHeight,
      left.y
    )
  );

  right.y = Math.max(
    0,
    Math.min(
      canvas.height -
      paddleHeight,
      right.y
    )
  );

}

window.addEventListener(
  'touchmove',
  e => {

    for(const t of e.touches){

      if(
        t.clientX <
        window.innerWidth/2
      ){

        left.y =
          t.clientY -
          paddleHeight/2;

      }

      else if(
        mode === 'vs'
      ){

        right.y =
          t.clientY -
          paddleHeight/2;

      }

    }

    clamp();

  },
  {passive:false}
);

const keys = {};

window.addEventListener(
  'keydown',
  e => {

    keys[e.key.toLowerCase()] =
      true;

  }
);

window.addEventListener(
  'keyup',
  e => {

    keys[e.key.toLowerCase()] =
      false;

  }
);

function keyboardLoop(){

  if(keys['w']){

    left.y -= 10;

  }

  if(keys['s']){

    left.y += 10;

  }

  if(
    mode === 'vs'
  ){

    if(keys['arrowup']){

      right.y -= 10;

    }

    if(keys['arrowdown']){

      right.y += 10;

    }

  }

  clamp();

  requestAnimationFrame(
    keyboardLoop
  );

}

keyboardLoop();

</script>

</body>
</html>
