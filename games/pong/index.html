<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Pong</title>

<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
  user-select:none;
}

body{
  overflow:hidden;
  width:100vw;
  height:100vh;
  font-family:'Fredoka',sans-serif;
  background:
    radial-gradient(circle at top left,#312e81 0%,transparent 40%),
    radial-gradient(circle at bottom right,#0f766e 0%,transparent 40%),
    #020617;
  color:white;
}

#title{
  position:fixed;
  top:16px;
  left:24px;
  font-size:44px;
  font-weight:700;
  letter-spacing:1px;
  color:white;
  z-index:30;
}

#topbar{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  align-items:center;
  z-index:30;
}

.group{
  display:flex;
  gap:10px;
  padding:8px;
  border-radius:22px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
}

button{
  border:none;
  background:transparent;
  color:white;
  padding:12px 18px;
  border-radius:16px;
  font-size:15px;
  font-family:'Fredoka',sans-serif;
  cursor:pointer;
  transition:0.2s;
}

button.active{
  background:rgba(255,255,255,0.16);
}

#pauseBtn{
  width:58px;
  font-size:22px;
  font-weight:700;
}

#gameWrap{
  position:fixed;
  left:50%;
  top:96px;
  transform:translateX(-50%);
  width:95vw;
  height:calc(100vh - 120px);
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

</style>
</head>
<body>

<div id="title">Pong</div>

<div id="topbar">

  <div class="group">
    <button id="vsBtn" class="active">
      2 Players
    </button>

    <button id="botBtn">
      Bot
    </button>
  </div>

  <div class="group">
    <button id="normalBtn" class="active">
      Normal
    </button>

    <button id="fastBtn">
      Fast
    </button>

    <button id="superBtn">
      Super
    </button>
  </div>

  <div class="group">
    <button id="pauseBtn">
      II
    </button>
  </div>

</div>

<div id="gameWrap">
  <canvas id="game"></canvas>
</div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const wrap = document.getElementById('gameWrap');

const vsBtn = document.getElementById('vsBtn');
const botBtn = document.getElementById('botBtn');

const normalBtn = document.getElementById('normalBtn');
const fastBtn = document.getElementById('fastBtn');
const superBtn = document.getElementById('superBtn');

const pauseBtn = document.getElementById('pauseBtn');

let mode = 'vs';

let speedMode = 'normal';

let paused = false;

let gameState = 'hold';

let countdown = 3;

let countdownTimer = 0;

const paddle = {
  width:18,
  height:160
};

const left = {
  x:28,
  y:0,
  score:0,
  glow:0
};

const right = {
  x:0,
  y:0,
  score:0,
  glow:0
};

const ball = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  size:14,
  trail:[]
};

let prediction = [];

function resize(){

  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;

  right.x = canvas.width - paddle.width - 28;

  if(left.y === 0 && right.y === 0){

    left.y =
      canvas.height/2 - paddle.height/2;

    right.y =
      canvas.height/2 - paddle.height/2;
  }
}

resize();

window.addEventListener('resize',resize);

function getSpeed(){

  if(speedMode === 'normal') return 11;

  if(speedMode === 'fast') return 18;

  return 24;
}

function resetBall(direction = 1){

  const speed = getSpeed();

  ball.x = canvas.width/2;
  ball.y = canvas.height/2;

  ball.vx = speed * direction;

  ball.vy =
    (Math.random()*6 - 3);

  updatePrediction();
}

resetBall();

function updatePrediction(){

  prediction = [];

  let px = ball.x;
  let py = ball.y;

  let vx = ball.vx;
  let vy = ball.vy;

  for(let i=0;i<80;i++){

    px += vx * 0.6;
    py += vy * 0.6;

    if(py < ball.size ||
       py > canvas.height-ball.size){

      vy *= -1;
    }

    prediction.push({
      x:px,
      y:py
    });
  }
}

function startCountdown(){

  gameState = 'countdown';

  countdown = 3;

  countdownTimer = performance.now();
}

function startGame(){

  gameState = 'playing';
}

function setMode(newMode){

  mode = newMode;

  left.score = 0;
  right.score = 0;

  gameState = 'hold';

  resetBall(Math.random()>0.5?1:-1);

  vsBtn.classList.remove('active');
  botBtn.classList.remove('active');

  if(mode === 'vs'){
    vsBtn.classList.add('active');
  }else{
    botBtn.classList.add('active');
  }
}

vsBtn.onclick = () => setMode('vs');
botBtn.onclick = () => setMode('bot');

function setSpeed(newSpeed){

  speedMode = newSpeed;

  normalBtn.classList.remove('active');
  fastBtn.classList.remove('active');
  superBtn.classList.remove('active');

  if(newSpeed === 'normal'){
    normalBtn.classList.add('active');
  }

  if(newSpeed === 'fast'){
    fastBtn.classList.add('active');
  }

  if(newSpeed === 'super'){
    superBtn.classList.add('active');
  }

  resetBall(Math.random()>0.5?1:-1);
}

normalBtn.onclick = () => setSpeed('normal');
fastBtn.onclick = () => setSpeed('fast');
superBtn.onclick = () => setSpeed('super');

pauseBtn.onclick = () => {

  paused = !paused;

  pauseBtn.textContent =
    paused ? '▶' : 'II';
};

const touches = {};

window.addEventListener('touchstart',e=>{

  for(const touch of e.touches){

    touches[touch.identifier] = {
      x:touch.clientX,
      y:touch.clientY
    };
  }

},{passive:false});

window.addEventListener('touchmove',e=>{

  if(paused) return;

  const rect =
    canvas.getBoundingClientRect();

  for(const touch of e.touches){

    const x =
      touch.clientX - rect.left;

    const y =
      touch.clientY - rect.top;

    if(mode === 'vs'){

      if(x < canvas.width/2){

        left.y =
          y - paddle.height/2;
      }
      else{

        right.y =
          y - paddle.height/2;
      }
    }
    else{

      left.y =
        y - paddle.height/2;
    }
  }

  clamp();

},{passive:false});

window.addEventListener('touchend',e=>{

  for(const touch of e.changedTouches){

    delete touches[touch.identifier];
  }

},{passive:false});

const keys = {};

window.addEventListener('keydown',e=>{

  keys[e.key] = true;

});

window.addEventListener('keyup',e=>{

  keys[e.key] = false;

});

function clamp(){

  left.y =
    Math.max(
      0,
      Math.min(
        canvas.height-paddle.height,
        left.y
      )
    );

  right.y =
    Math.max(
      0,
      Math.min(
        canvas.height-paddle.height,
        right.y
      )
    );
}

function checkHold(){

  const touchCount =
    Object.keys(touches).length;

  const keyHold =
    keys['w'] ||
    keys['s'] ||
    keys['ArrowUp'] ||
    keys['ArrowDown'];

  if(mode === 'vs'){

    return touchCount >= 2 || keyHold;
  }

  return touchCount >= 1 || keyHold;
}

function update(){

  right.x =
    canvas.width - paddle.width - 28;

  if(paused) return;

  if(keys['w']) left.y -= 10;
  if(keys['s']) left.y += 10;

  if(mode === 'vs'){

    if(keys['ArrowUp']) right.y -= 10;
    if(keys['ArrowDown']) right.y += 10;
  }

  clamp();

  if(gameState === 'hold'){

    if(checkHold()){

      startCountdown();
    }

    return;
  }

  if(gameState === 'countdown'){

    if(!checkHold() && countdown === 3){

      gameState = 'hold';
      return;
    }

    const now = performance.now();

    if(now - countdownTimer > 1000){

      countdown--;

      countdownTimer = now;

      if(countdown <= 0){

        startGame();
      }
    }

    return;
  }

  if(mode === 'bot'){

    const target =
      ball.y - paddle.height/2;

    right.y +=
      (target - right.y) * 0.25;

    clamp();
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.trail.push({
    x:ball.x,
    y:ball.y
  });

  if(ball.trail.length > 12){
    ball.trail.shift();
  }

  if(
    ball.y < ball.size ||
    ball.y > canvas.height-ball.size
  ){

    ball.vy *= -1;
  }

  function hit(p,isLeft){

    const paddleCenter =
      p.y + paddle.height/2;

    const offset =
      (ball.y - paddleCenter) /
      (paddle.height/2);

    const bounce =
      offset * 5;

    const speed =
      Math.sqrt(
        ball.vx*ball.vx +
        ball.vy*ball.vy
      );

    ball.vx =
      (isLeft ? 1 : -1) *
      speed;

    ball.vy = bounce;

    p.glow = 1;

    updatePrediction();
  }

  if(
    ball.x-ball.size <
    left.x+paddle.width &&
    ball.y > left.y &&
    ball.y < left.y+paddle.height
  ){

    hit(left,true);
  }

  if(
    ball.x+ball.size >
    right.x &&
    ball.y > right.y &&
    ball.y < right.y+paddle.height
  ){

    hit(right,false);
  }

  if(ball.x < -50){

    right.score++;

    gameState = 'countdown';

    countdown = 3;

    countdownTimer = performance.now();

    resetBall(-1);
  }

  if(ball.x > canvas.width+50){

    left.score++;

    gameState = 'countdown';

    countdown = 3;

    countdownTimer = performance.now();

    resetBall(1);
  }

  left.glow *= 0.9;
  right.glow *= 0.9;
}

function drawBackground(){

  ctx.fillStyle = '#020617';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle =
    'rgba(255,255,255,0.08)';

  ctx.setLineDash([18,18]);

  ctx.beginPath();

  ctx.moveTo(canvas.width/2,0);
  ctx.lineTo(canvas.width/2,canvas.height);

  ctx.stroke();

  ctx.setLineDash([]);
}

function drawPrediction(){

  if(gameState !== 'countdown') return;

  ctx.strokeStyle =
    'rgba(255,255,255,0.28)';

  ctx.lineWidth = 2;

  ctx.setLineDash([10,14]);

  ctx.beginPath();

  prediction.forEach((p,i)=>{

    if(i===0){
      ctx.moveTo(p.x,p.y);
    }else{
      ctx.lineTo(p.x,p.y);
    }
  });

  ctx.stroke();

  ctx.setLineDash([]);
}

function drawPaddle(p,color){

  ctx.shadowBlur =
    24 + p.glow*40;

  ctx.shadowColor = color;

  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.roundRect(
    p.x,
    p.y,
    paddle.width,
    paddle.height,
    18
  );

  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawBall(){

  ball.trail.forEach((t,i)=>{

    ctx.fillStyle =
      `rgba(255,255,255,${
        i/ball.trail.length/2
      })`;

    ctx.beginPath();

    ctx.arc(
      t.x,
      t.y,
      ball.size*(i/ball.trail.length),
      0,
      Math.PI*2
    );

    ctx.fill();
  });

  ctx.fillStyle = 'white';

  ctx.shadowBlur = 30;
  ctx.shadowColor = 'white';

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawScores(){

  ctx.font =
    'bold 76px Fredoka';

  ctx.fillStyle =
    'rgba(255,255,255,0.12)';

  ctx.fillText(
    left.score,
    canvas.width*0.25,
    90
  );

  ctx.fillText(
    right.score,
    canvas.width*0.75,
    90
  );
}

function drawText(){

  ctx.textAlign='center';

  if(paused){

    ctx.font =
      'bold 48px Fredoka';

    ctx.fillStyle='white';

    ctx.fillText(
      'Paused',
      canvas.width/2,
      canvas.height*0.3
    );

    return;
  }

  if(gameState === 'hold'){

    ctx.font =
      'bold 44px Fredoka';

    ctx.fillStyle='white';

    ctx.fillText(
      'Hold To Play',
      canvas.width/2,
      canvas.height*0.28
    );
  }

  if(gameState === 'countdown'){

    ctx.font =
      'bold 70px Fredoka';

    ctx.fillStyle='white';

    ctx.fillText(
      countdown > 0
      ? countdown
      : 'GO!',
      canvas.width/2,
      canvas.height*0.28
    );
  }
}

function draw(){

  drawBackground();

  drawPrediction();

  drawScores();

  drawPaddle(left,'#60a5fa');

  drawPaddle(right,'#a78bfa');

  drawBall();

  drawText();
}

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
