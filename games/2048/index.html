<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>2048 – OfflineArcade</title>
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────── */
    :root {
      --bg-color:      #f8fafc;
      --text-color:    #0f172a;
      --text-gradient: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      --bg-radial-1:   rgba(59, 130, 246, 0.08);
      --bg-radial-2:   rgba(147, 51, 234, 0.08);
      --bg-linear:     linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
      --box-bg:        rgba(255,255,255,0.70);
      --box-border:    rgba(0,0,0,0.08);
      --box-shadow:    0 10px 40px rgba(0,0,0,0.06);
      --btn-bg:        rgba(0,0,0,0.04);
      --btn-border:    rgba(0,0,0,0.08);
      --btn-color:     #0f172a;
      --btn-hover-bg:  rgba(0,0,0,0.08);
      --btn-hover-bd:  rgba(59,130,246,0.4);
      --grid-bg:       rgba(0,0,0,0.06);
      --cell-bg:       rgba(0,0,0,0.07);
      --score-bg:      rgba(0,0,0,0.03);
      --score-border:  rgba(0,0,0,0.04);
      --score-label:   #475569;
      /* Tile colours – light */
      --t2:    #e2e8f0; --t2-fg:    #334155;
      --t4:    #dbeafe; --t4-fg:    #1d4ed8;
      --t8:    #ede9fe; --t8-fg:    #6d28d9;
      --t16:   #fce7f3; --t16-fg:   #be185d;
      --t32:   #fff7ed; --t32-fg:   #c2410c;
      --t64:   #fef3c7; --t64-fg:   #b45309;
      --t128:  #d1fae5; --t128-fg:  #065f46;
      --t256:  #ccfbf1; --t256-fg:  #0f766e;
      --t512:  #e0f2fe; --t512-fg:  #0369a1;
      --t1024: #ede9fe; --t1024-fg: #5b21b6;
      --t2048: #fdf4ff; --t2048-fg: #86198f;
      --t-hi:  #f0fdf4; --t-hi-fg:  #14532d;
    }
    body.dark-mode {
      --bg-color:      #0f172a;
      --text-color:    #ffffff;
      --text-gradient: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      --bg-radial-1:   rgba(76,201,240,0.18);
      --bg-radial-2:   rgba(99,102,241,0.18);
      --bg-linear:     linear-gradient(180deg, #111827 0%, #0b1120 100%);
      --box-bg:        rgba(255,255,255,0.06);
      --box-border:    rgba(255,255,255,0.08);
      --box-shadow:    0 10px 40px rgba(0,0,0,0.4);
      --btn-bg:        rgba(255,255,255,0.08);
      --btn-border:    rgba(255,255,255,0.10);
      --btn-color:     #ffffff;
      --btn-hover-bg:  rgba(255,255,255,0.16);
      --btn-hover-bd:  rgba(76,201,240,0.40);
      --grid-bg:       rgba(255,255,255,0.05);
      --cell-bg:       rgba(255,255,255,0.05);
      --score-bg:      rgba(255,255,255,0.04);
      --score-border:  rgba(255,255,255,0.06);
      --score-label:   #94a3b8;
      /* Tile colours – dark (vibrant neons) */
      --t2:    rgba(148,163,184,0.18); --t2-fg:    #cbd5e1;
      --t4:    rgba(59,130,246,0.25);  --t4-fg:    #93c5fd;
      --t8:    rgba(139,92,246,0.30);  --t8-fg:    #c4b5fd;
      --t16:   rgba(236,72,153,0.28);  --t16-fg:   #f9a8d4;
      --t32:   rgba(245,101,101,0.30); --t32-fg:   #fca5a5;
      --t64:   rgba(251,191,36,0.28);  --t64-fg:   #fcd34d;
      --t128:  rgba(34,197,94,0.28);   --t128-fg:  #86efac;
      --t256:  rgba(20,184,166,0.30);  --t256-fg:  #5eead4;
      --t512:  rgba(56,189,248,0.28);  --t512-fg:  #7dd3fc;
      --t1024: rgba(168,85,247,0.32);  --t1024-fg: #d8b4fe;
      --t2048: rgba(244,63,94,0.32);   --t2048-fg: #fda4af;
      --t-hi:  rgba(250,204,21,0.35);  --t-hi-fg:  #fef08a;
    }
    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-color);
      background: var(--bg-color);
      transition: color .3s, background-color .3s;
      user-select: none;
      -webkit-user-select: none;
    }
    body { position: fixed; inset: 0; }
    /* ─── BACKGROUND ─────────────────────────────────────── */
    .background {
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at top right, var(--bg-radial-1), transparent 35%),
        radial-gradient(circle at bottom left, var(--bg-radial-2), transparent 35%),
        var(--bg-linear);
      z-index: 0;
      transition: background .4s;
    }
    /* ─── FIXED HEADER ───────────────────────────────────── */
    .game-header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: max(16px, env(safe-area-inset-top)) 20px 10px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100; pointer-events: none;
    }
    .back-btn, #mute-btn {
      pointer-events: auto;
      background: var(--box-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--box-border);
      color: var(--text-color);
      border-radius: 12px;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, background-color .2s, border-color .2s, color .2s;
      box-shadow: 0 4px 12px rgba(0,0,0,.05);
    }
    .back-btn { padding: 8px 14px; }
    #mute-btn  { width: 38px; height: 38px; padding: 0; font-size: 16px; }
    .back-btn:hover, #mute-btn:hover {
      transform: translateY(-2px);
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-bd);
    }
    .back-btn:active, #mute-btn:active { transform: scale(.95); }
    /* ─── LAYOUT ─────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 70px 16px max(16px, env(safe-area-inset-bottom));
      gap: 14px;
    }
    /* ─── GLASS BOX ──────────────────────────────────────── */
    .game-box {
      width: 100%; max-width: 420px;
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      border-radius: 28px;
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--box-shadow);
      transition: background-color .3s, border-color .3s, box-shadow .3s;
      display: flex; flex-direction: column; gap: 14px;
    }
    /* ─── TOP BAR ────────────────────────────────────────── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .title-col { display: flex; flex-direction: column; gap: 2px; }
    .game-title {
      font-size: 46px; font-weight: 900; letter-spacing: 1px; line-height: 1;
      background: var(--text-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-sub {
      font-size: 12px; opacity: .65; font-weight: 600;
    }
    .scores-row {
      display: flex; gap: 8px;
    }
    .score-box {
      background: var(--score-bg);
      border: 1px solid var(--score-border);
      border-radius: 14px;
      padding: 8px 12px;
      text-align: center;
      min-width: 68px;
      transition: background-color .3s, border-color .3s;
    }
    .score-label {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      color: var(--score-label); text-transform: uppercase;
    }
    .score-value {
      font-size: 22px; font-weight: 900; line-height: 1.1;
      transition: transform .1s;
    }
    .score-value.bump {
      animation: bump .18s ease-out;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    /* ─── GRID ───────────────────────────────────────────── */
    .grid-wrap {
      background: var(--grid-bg);
      border: 1px solid var(--box-border);
      border-radius: 18px;
      padding: 10px;
      transition: background-color .3s, border-color .3s;
      position: relative;
    }
    /* empty cell shadows */
    .grid-bg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .grid-cell {
      aspect-ratio: 1;
      background: var(--cell-bg);
      border-radius: 12px;
      transition: background-color .3s;
    }
    /* tile layer – absolutely positioned on top */
    .grid-tiles {
      position: absolute;
      inset: 10px; /* matches padding of grid-wrap */
      pointer-events: none;
    }
    /* ─── TILES ──────────────────────────────────────────── */
    .tile {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      font-weight: 900;
      line-height: 1;
      /* smooth slide */
      transition: left .12s ease, top .12s ease, width .12s ease, height .12s ease;
      will-change: left, top;
      z-index: 1;
    }
    /* tile appears with pop animation */
    .tile.tile-new {
      animation: tileAppear .18s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
    }
    /* tile merges with a bigger pop */
    .tile.tile-merged {
      animation: tileMerge .22s cubic-bezier(0.175, 0.885, 0.32, 1.6) forwards;
      z-index: 2;
    }
    @keyframes tileAppear {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes tileMerge {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    /* Tile value colours */
    .tile[data-val="2"]    { background: var(--t2);    color: var(--t2-fg); }
    .tile[data-val="4"]    { background: var(--t4);    color: var(--t4-fg); }
    .tile[data-val="8"]    { background: var(--t8);    color: var(--t8-fg); }
    .tile[data-val="16"]   { background: var(--t16);   color: var(--t16-fg); }
    .tile[data-val="32"]   { background: var(--t32);   color: var(--t32-fg); }
    .tile[data-val="64"]   { background: var(--t64);   color: var(--t64-fg); }
    .tile[data-val="128"]  { background: var(--t128);  color: var(--t128-fg); font-size: 90%; }
    .tile[data-val="256"]  { background: var(--t256);  color: var(--t256-fg); font-size: 90%; }
    .tile[data-val="512"]  { background: var(--t512);  color: var(--t512-fg); font-size: 90%; }
    .tile[data-val="1024"] { background: var(--t1024); color: var(--t1024-fg); font-size: 78%; }
    .tile[data-val="2048"] { background: var(--t2048); color: var(--t2048-fg); font-size: 78%;
                              box-shadow: 0 0 24px rgba(168,85,247,.35); }
    .tile[data-val="4096"],
    .tile[data-val="8192"] { background: var(--t-hi);  color: var(--t-hi-fg);  font-size: 66%;
                              box-shadow: 0 0 28px rgba(250,204,21,.40); }
    /* Dark mode inner glow for neon tiles */
    body.dark-mode .tile[data-val="2048"] {
      box-shadow: 0 0 28px rgba(244,63,94,.55), inset 0 0 12px rgba(255,255,255,.06);
    }
    body.dark-mode .tile[data-val="4096"],
    body.dark-mode .tile[data-val="8192"] {
      box-shadow: 0 0 32px rgba(250,204,21,.65), inset 0 0 12px rgba(255,255,255,.06);
    }
    /* ─── CONTROLS ───────────────────────────────────────── */
    .controls {
      display: flex; gap: 8px;
    }
    .ctrl-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--btn-border);
      border-radius: 14px;
      background: var(--btn-bg);
      color: var(--btn-color);
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      transition: background-color .2s, transform .1s, border-color .2s, color .2s;
    }
    .ctrl-btn:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-bd);
      transform: translateY(-1px);
    }
    .ctrl-btn:active { transform: scale(.97); }
    /* ─── GAME-OVER / WIN OVERLAY ────────────────────────── */
    .overlay {
      position: absolute; inset: 10px;
      border-radius: 18px;
      background: rgba(15,23,42,.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 10;
    }
    .overlay.visible { display: flex; }
    .overlay-title {
      font-size: 30px; font-weight: 900;
      background: var(--text-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .overlay-sub {
      font-size: 14px; color: rgba(255,255,255,.75);
    }
    .overlay-btn {
      padding: 11px 28px;
      border-radius: 14px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: transform .2s, opacity .2s;
    }
    .overlay-btn:hover { transform: translateY(-2px); opacity: .9; }
    .overlay-btn:active { transform: scale(.96); }
    /* ─── STATUS MESSAGE ─────────────────────────────────── */
    .status-msg {
      text-align: center;
      font-size: 14px; font-weight: 700;
      min-height: 20px;
      opacity: .85;
    }
    /* ─── LANDSCAPE / SMALL SCREENS ──────────────────────── */
    @media (max-height: 620px) and (orientation: landscape) {
      .container {
        flex-direction: row;
        padding: 55px 12px max(8px, env(safe-area-inset-bottom));
        gap: 10px; justify-content: center; align-items: center;
      }
      .game-box {
        max-width: 360px; flex-direction: row;
        flex-wrap: wrap; align-items: flex-start;
        gap: 10px; padding: 14px;
        border-radius: 20px;
      }
      .top-bar { width: 100%; }
      .grid-wrap { flex: 0 0 auto; }
      .controls { flex: 1 1 100%; }
      .game-title { font-size: 34px; }
      .status-msg { font-size: 12px; }
    }
    @media (max-width: 380px) {
      .game-title { font-size: 38px; }
      .game-box { padding: 14px; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <!-- Navigation Header -->
  <div class="game-header">
    <a href="../../index.html" class="back-btn" title="Zurück zum Hauptmenü">← Menü</a>
    <button id="mute-btn" title="Ton stummschalten">🔊</button>
  </div>
  <div class="container">
    <div class="game-box">
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="title-col">
          <div class="game-title">2048</div>
          <div class="game-sub">Merge tiles to reach 2048!</div>
        </div>
        <div class="scores-row">
          <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score-val">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best-val">0</div>
          </div>
        </div>
      </div>
      <!-- GRID -->
      <div class="grid-wrap" id="grid-wrap">
        <!-- Empty cell grid -->
        <div class="grid-bg" id="grid-bg"></div>
        <!-- Moving tiles rendered here -->
        <div class="grid-tiles" id="grid-tiles"></div>
        <!-- Overlay -->
        <div class="overlay" id="overlay">
          <div class="overlay-title" id="overlay-title">Game Over</div>
          <div class="overlay-sub" id="overlay-sub">No more moves!</div>
          <button class="overlay-btn" id="overlay-btn">Try Again</button>
        </div>
      </div>
      <!-- STATUS -->
      <div class="status-msg" id="status-msg">Use arrow keys or swipe!</div>
      <!-- CONTROLS -->
      <div class="controls">
        <button class="ctrl-btn" id="new-btn">New Game</button>
        <button class="ctrl-btn" id="undo-btn">Undo</button>
      </div>
    </div>
  </div>
  <script>
    /* ═══════════════════════════════════════════════════════
       THEME
    ══════════════════════════════════════════════════════ */
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      if (t === 'light') document.body.classList.remove('dark-mode');
      else               document.body.classList.add('dark-mode');
    })();
    /* ═══════════════════════════════════════════════════════
       AUDIO
    ══════════════════════════════════════════════════════ */
    let isMuted = localStorage.getItem('mute') === 'true';
    const muteBtn = document.getElementById('mute-btn');
    muteBtn.textContent = isMuted ? '🔇' : '🔊';
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      localStorage.setItem('mute', isMuted);
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playSound(type) {
      if (isMuted) return;
      try {
        const ctx = getCtx();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        const t = ctx.currentTime;
        if (type === 'slide') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, t);
          osc.frequency.exponentialRampToValueAtTime(200, t + 0.07);
          gain.gain.setValueAtTime(0.06, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
          osc.start(t); osc.stop(t + 0.08);
        } else if (type === 'merge') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, t);
          osc.frequency.exponentialRampToValueAtTime(660, t + 0.12);
          gain.gain.setValueAtTime(0.09, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t); osc.stop(t + 0.15);
        } else if (type === 'win') {
          // Arpeggio
          [261.63, 329.63, 392, 523.25].forEach((freq, i) => {
            const o2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            o2.connect(g2); g2.connect(ctx.destination);
            o2.type = 'triangle';
            o2.frequency.setValueAtTime(freq, t + i * 0.1);
            g2.gain.setValueAtTime(0.10, t + i * 0.1);
            g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.18);
            o2.start(t + i * 0.1); o2.stop(t + i * 0.1 + 0.18);
          });
          return;
        } else if (type === 'over') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, t);
          osc.frequency.linearRampToValueAtTime(80, t + 0.4);
          gain.gain.setValueAtTime(0.08, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'spawn') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(500, t);
          osc.frequency.exponentialRampToValueAtTime(700, t + 0.05);
          gain.gain.setValueAtTime(0.04, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
          osc.start(t); osc.stop(t + 0.06);
        }
      } catch(e) {}
    }
    /* ═══════════════════════════════════════════════════════
       GAME STATE
    ══════════════════════════════════════════════════════ */
    const SIZE = 4;
    let board, score, best, won, over;
    let prevBoard, prevScore; // for undo
    function newState() {
      board  = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
      score  = 0;
      won    = false;
      over   = false;
      prevBoard = null;
      prevScore = 0;
      addRandom(); addRandom();
    }
    best = parseInt(localStorage.getItem('2048best') || '0');
    /* ═══════════════════════════════════════════════════════
       DOM / RENDERING
    ══════════════════════════════════════════════════════ */
    const gridBg    = document.getElementById('grid-bg');
    const gridTiles = document.getElementById('grid-tiles');
    const scoreEl   = document.getElementById('score-val');
    const bestEl    = document.getElementById('best-val');
    const statusEl  = document.getElementById('status-msg');
    const overlay   = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub   = document.getElementById('overlay-sub');
    const overlayBtn   = document.getElementById('overlay-btn');
    const gridWrap  = document.getElementById('grid-wrap');
    // Build static empty-cell background
    function buildGridBg() {
      gridBg.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        gridBg.appendChild(cell);
      }
    }
    // Tile tracking: each live tile gets a unique id
    let nextTileId = 1;
    // tileEls: Map<id, HTMLElement>
    const tileEls = new Map();
    // board of tile objects: { id, val }
    // We keep this separate so we can animate moves
    let tileBoard; // [row][col] = { id, val } | null
    function initTileBoard() {
      tileBoard = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
      tileEls.clear();
      gridTiles.innerHTML = '';
      nextTileId = 1;
    }
    // Calculate pixel position for a tile
    function getTileStyle(row, col) {
      // gridTiles is inset: matches grid-bg
      const wrap = gridBg;
      // cell size = (width - gap*(SIZE-1)) / SIZE
      const gapPx = 8;
      const totalW = gridBg.offsetWidth;
      const totalH = gridBg.offsetHeight;
      const cellW = (totalW - gapPx * (SIZE - 1)) / SIZE;
      const cellH = (totalH - gapPx * (SIZE - 1)) / SIZE;
      return {
        left:   col * (cellW + gapPx),
        top:    row * (cellH + gapPx),
        width:  cellW,
        height: cellH,
        fontSize: Math.round(cellW * 0.38),
      };
    }
    function applyTileStyle(el, row, col) {
      const s = getTileStyle(row, col);
      el.style.left   = s.left   + 'px';
      el.style.top    = s.top    + 'px';
      el.style.width  = s.width  + 'px';
      el.style.height = s.height + 'px';
      el.style.fontSize = s.fontSize + 'px';
    }
    function createTileEl(val, row, col, isNew) {
      const el = document.createElement('div');
      el.className = 'tile' + (isNew ? ' tile-new' : '');
      el.dataset.val = val;
      el.textContent = val;
      applyTileStyle(el, row, col);
      gridTiles.appendChild(el);
      return el;
    }
    // Sync tileBoard DOM from board state (initial render or after undo)
    function syncFromBoard() {
      initTileBoard();
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = board[r][c];
          if (val) {
            const id = nextTileId++;
            const el = createTileEl(val, r, c, false);
            tileEls.set(id, el);
            tileBoard[r][c] = { id, val };
          }
        }
      }
    }
    function updateScoreUI() {
      scoreEl.textContent = score;
      bestEl.textContent  = best;
    }
    function bumpScore() {
      scoreEl.classList.remove('bump');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('bump');
    }
    function setStatus(msg) { statusEl.textContent = msg; }
    /* ═══════════════════════════════════════════════════════
       GAME LOGIC – PURE (no DOM)
    ══════════════════════════════════════════════════════ */
    function addRandom() {
      const empty = [];
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (!board[r][c]) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
      return [r, c];
    }
    function copyBoard(b) {
      return b.map(r => [...r]);
    }
    function slide(row) {
      // Remove zeros
      let vals = row.filter(v => v);
      let merged = 0;
      for (let i = 0; i < vals.length - 1; i++) {
        if (vals[i] === vals[i+1]) {
          vals[i] *= 2;
          merged += vals[i];
          vals.splice(i+1, 1);
        }
      }
      while (vals.length < SIZE) vals.push(0);
      return { row: vals, merged };
    }
    function canMove() {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          if (!board[r][c]) return true;
          if (c < SIZE-1 && board[r][c] === board[r][c+1]) return true;
          if (r < SIZE-1 && board[r][c] === board[r+1][c]) return true;
        }
      return false;
    }
    /* ═══════════════════════════════════════════════════════
       MOVE ENGINE – ANIMATED
       Returns true if board changed.
    ══════════════════════════════════════════════════════ */
    function move(dir) {
      if (over) return false;
      // Save state for undo
      prevBoard = copyBoard(board);
      prevScore = score;
      // We'll track movements: list of { id, fromR, fromC, toR, toC, merged, newVal }
      // merged means this tile absorbed another one – play merge anim
      const movements = [];
      let totalMerged = 0;
      let changed = false;
      // Helper: rotate board + tileBoard
      function rotateCW() {
        const nb = Array.from({length:SIZE}, ()=>Array(SIZE).fill(0));
        const nt = Array.from({length:SIZE}, ()=>Array(SIZE).fill(null));
        for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) {
          nb[c][SIZE-1-r] = board[r][c];
          nt[c][SIZE-1-r] = tileBoard[r][c];
        }
        board = nb; tileBoard = nt;
      }
      function rotateCCW() { rotateCW(); rotateCW(); rotateCW(); }
      // Normalize direction to "left"
      let rotations = 0;
      if (dir === 'right') { rotateCW(); rotateCW(); rotations = 2; }
      else if (dir === 'up')   { rotateCCW(); rotations = 3; }
      else if (dir === 'down') { rotateCW(); rotations = 1; }
      // Process each row leftward
      for (let r = 0; r < SIZE; r++) {
        // Collect non-zero tiles in order
        const tiles = [];
        for (let c = 0; c < SIZE; c++) {
          if (tileBoard[r][c]) tiles.push({ c, tile: tileBoard[r][c] });
          else if (board[r][c]) {
            // Orphaned value (e.g., after undo sync) – create an id
            const id = nextTileId++;
            const el = createTileEl(board[r][c], r, c, false);
            tileEls.set(id, el);
            const t = { id, val: board[r][c] };
            tileBoard[r][c] = t;
            tiles.push({ c, tile: t });
          }
        }
        // Merge pass
        const result = [];
        let i = 0;
        while (i < tiles.length) {
          if (i+1 < tiles.length && tiles[i].tile.val === tiles[i+1].tile.val) {
            // Merge i+1 into i
            const newVal = tiles[i].tile.val * 2;
            result.push({
              toC: result.length,
              fromTile: tiles[i].tile, fromC: tiles[i].c,
              absorbTile: tiles[i+1].tile, absorbC: tiles[i+1].c,
              newVal,
            });
            totalMerged += newVal;
            i += 2;
          } else {
            result.push({
              toC: result.length,
              fromTile: tiles[i].tile, fromC: tiles[i].c,
              absorbTile: null, absorbC: null,
              newVal: tiles[i].tile.val,
            });
            i++;
          }
        }
        // Apply result to board + record movements
        // Clear row
        for (let c = 0; c < SIZE; c++) { board[r][c] = 0; tileBoard[r][c] = null; }
        for (const item of result) {
          const toC = item.toC;
          board[r][toC] = item.newVal;
          if (item.fromC !== toC || dir !== 'left') changed = true;
          if (item.absorbTile) {
            // Two tiles move to toC, absorbTile disappears
            movements.push({ tile: item.absorbTile, fromR: r, fromC: item.absorbC, toR: r, toC, merged: true, newVal: item.newVal });
            movements.push({ tile: item.fromTile,   fromR: r, fromC: item.fromC,   toR: r, toC, merged: true, newVal: item.newVal, primary: true });
            // Update tile val
            item.fromTile.val = item.newVal;
            tileBoard[r][toC] = item.fromTile;
          } else {
            if (item.fromC !== toC) changed = true;
            movements.push({ tile: item.fromTile, fromR: r, fromC: item.fromC, toR: r, toC, merged: false, newVal: item.newVal });
            tileBoard[r][toC] = item.fromTile;
          }
        }
      }
      // Un-rotate
      for (let k = 0; k < rotations; k++) rotateCW();
      // Fix movement coordinates after rotation
      // (rotations were applied to board AND tileBoard inline, movements store pre-rotation coords)
      // We need to transform movement row/col coordinates as well
      function transformCoord(r, c, rots) {
        let pr = r, pc = c;
        for (let k = 0; k < rots; k++) {
          let nr = pc;
          let nc = SIZE - 1 - pr;
          pr = nr; pc = nc;
        }
        return [pr, pc];
      }
      // Also transform movements
      for (const m of movements) {
        [m.fromR, m.fromC] = transformCoord(m.fromR, m.fromC, rotations);
        [m.toR,   m.toC  ] = transformCoord(m.toR,   m.toC,   rotations);
      }
      if (!changed && totalMerged === 0 && movements.every(m => m.fromC === m.toC && m.fromR === m.toR)) {
        // No change, restore prev state
        board = prevBoard;
        prevBoard = null;
        return false;
      }
      // Animate movements
      for (const m of movements) {
        const el = tileEls.get(m.tile.id);
        if (!el) continue;
        // Move to destination
        applyTileStyle(el, m.toR, m.toC);
        if (m.merged && !m.primary) {
          // This is the absorbed tile – it slides to target then disappears
          setTimeout(() => {
            el.remove();
            tileEls.delete(m.tile.id);
          }, 130);
        } else if (m.merged && m.primary) {
          // Primary tile – update value after slide
          setTimeout(() => {
            el.dataset.val = m.newVal;
            el.textContent = m.newVal;
            el.classList.remove('tile-merged');
            void el.offsetWidth;
            el.classList.add('tile-merged');
          }, 120);
        }
      }
      // Update score
      if (totalMerged > 0) {
        score += totalMerged;
        if (score > best) {
          best = score;
          localStorage.setItem('2048best', best);
        }
        bumpScore();
        updateScoreUI();
        playSound('merge');
      } else {
        playSound('slide');
      }
      // Spawn new tile after animation
      setTimeout(() => {
        const pos = addRandom();
        if (pos) {
          const [nr, nc] = pos;
          const val = board[nr][nc];
          const id  = nextTileId++;
          const el  = createTileEl(val, nr, nc, true);
          tileEls.set(id, tileBoard[nr][nc] = { id, val });
          playSound('spawn');
        }
        if (!canMove()) {
          over = true;
          setTimeout(() => showOverlay('over'), 100);
        } else if (!won && board.some(r => r.some(v => v >= 2048))) {
          won = true;
          showOverlay('win');
        } else {
          setStatus(score > 0 ? '🔥 Keep going!' : 'Use arrow keys or swipe!');
        }
      }, 150);
      return true;
    }
    function showOverlay(type) {
      if (type === 'win') {
        overlayTitle.textContent = '🎉 You Win!';
        overlaySub.textContent   = 'You reached 2048!';
        overlayBtn.textContent   = 'Keep Going';
        playSound('win');
      } else {
        overlayTitle.textContent = 'Game Over';
        overlaySub.textContent   = 'No more moves left!';
        overlayBtn.textContent   = 'Try Again';
        playSound('over');
      }
      overlay.classList.add('visible');
    }
    overlayBtn.addEventListener('click', () => {
      overlay.classList.remove('visible');
      if (over) { newGame(); }
      // if win – just continue
    });
    /* ═══════════════════════════════════════════════════════
       NEW GAME / UNDO
    ══════════════════════════════════════════════════════ */
    function newGame() {
      newState();
      initTileBoard();
      syncFromBoard();
      updateScoreUI();
      overlay.classList.remove('visible');
      setStatus('Use arrow keys or swipe!');
    }
    function undo() {
      if (!prevBoard) return;
      board     = prevBoard;
      score     = prevScore;
      prevBoard = null;
      over      = false;
      syncFromBoard();
      updateScoreUI();
      setStatus('Undo! Keep going.');
    }
    document.getElementById('new-btn').addEventListener('click', newGame);
    document.getElementById('undo-btn').addEventListener('click', undo);
    /* ═══════════════════════════════════════════════════════
       INPUT – KEYBOARD
    ══════════════════════════════════════════════════════ */
    const keyMap = {
      ArrowLeft: 'left', ArrowRight: 'right',
      ArrowUp: 'up', ArrowDown: 'down',
      a: 'left', d: 'right', w: 'up', s: 'down',
    };
    document.addEventListener('keydown', e => {
      const dir = keyMap[e.key];
      if (dir) { e.preventDefault(); move(dir); }
    });
    /* ═══════════════════════════════════════════════════════
       INPUT – TOUCH SWIPE
    ══════════════════════════════════════════════════════ */
    let touchX0, touchY0;
    document.addEventListener('touchstart', e => {
      touchX0 = e.touches[0].clientX;
      touchY0 = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (touchX0 == null) return;
      const dx = e.changedTouches[0].clientX - touchX0;
      const dy = e.changedTouches[0].clientY - touchY0;
      const threshold = 30;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < threshold) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
      touchX0 = touchY0 = null;
    }, { passive: true });
    /* ═══════════════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════════════ */
    buildGridBg();
    newGame();
    // Re-position tiles on resize
    window.addEventListener('resize', () => {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          const t = tileBoard[r][c];
          if (t) {
            const el = tileEls.get(t.id);
            if (el) applyTileStyle(el, r, c);
          }
        }
    });
  </script>
</body>
</html>
