<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>2048</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,#312e81 0%,#0f172a 45%),
    linear-gradient(180deg,#0f172a,#020617);

  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
}

.game-container{
  width:min(92vw,540px);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:64px;
  font-weight:900;
  letter-spacing:-2px;
}

.score-box{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:14px 24px;
  text-align:center;
  min-width:120px;
  backdrop-filter:blur(10px);
}

.score-label{
  font-size:12px;
  opacity:.7;
}

.score{
  font-size:34px;
  font-weight:900;
}

.board-wrapper{
  position:relative;
  width:100%;
  aspect-ratio:1;
}

.board{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.08);
  border-radius:28px;
  padding:12px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  touch-action:none;
}

.bg-cell{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
}

.tiles-layer{
  position:absolute;
  inset:12px;
}

.tile{
  position:absolute;

  width:calc((100% - 36px) / 4);
  height:calc((100% - 36px) / 4);

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-weight:900;
  font-size:42px;

  transition:
    left .14s ease,
    top .14s ease,
    transform .10s ease;

  animation:pop .10s ease;
}

@keyframes pop{

  0%{
    transform:scale(.94);
  }

  100%{
    transform:scale(1);
  }

}

.tile-2{
  background:#f8fafc;
  color:#334155;
}

.tile-4{
  background:#e2e8f0;
  color:#334155;
}

.tile-8{
  background:#38bdf8;
  color:white;
}

.tile-16{
  background:#0ea5e9;
  color:white;
}

.tile-32{
  background:#6366f1;
  color:white;
}

.tile-64{
  background:#8b5cf6;
  color:white;
}

.tile-128{
  background:#a855f7;
  color:white;
}

.tile-256{
  background:#c026d3;
  color:white;
}

.tile-512{
  background:#db2777;
  color:white;
}

.tile-1024{
  background:#f43f5e;
  color:white;
}

.tile-2048{
  background:#f59e0b;
  color:white;
}

.controls{
  margin-top:18px;
  display:flex;
  gap:12px;
}

button{
  flex:1;
  border:none;
  border-radius:16px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:rgba(255,255,255,0.14);
}

.special-active{
  border:2px solid #8b5cf6 !important;
  box-shadow:0 0 18px rgba(139,92,246,.45);
}

.special-disabled{
  opacity:.35;
}

.message{
  margin-top:18px;
  text-align:center;
  min-height:24px;
  font-size:18px;
}

@media(max-width:600px){

  .title{
    font-size:52px;
  }

  .tile{
    font-size:34px;
  }

}
</style>
</head>
<body>

<div class="game-container">

  <div class="top-bar">

    <div class="title">
      2048
    </div>

    <div class="score-box">

      <div class="score-label">
        SCORE
      </div>

      <div
        class="score"
        id="score"
      >
        0
      </div>

    </div>

  </div>

  <div class="board-wrapper">

    <div
      class="board"
      id="board"
    ></div>

    <div
      class="tiles-layer"
      id="tilesLayer"
    ></div>

  </div>

  <div class="controls">

    <button id="restartBtn">
      Restart
    </button>

    <button id="deleteBtn">
      🗑 3
    </button>

    <button id="mergeBtn">
      Merge 3
    </button>

  </div>

  <div
    class="message"
    id="message"
  ></div>

</div>

<script>
const board =
  document.getElementById('board');

const tilesLayer =
  document.getElementById('tilesLayer');

const scoreElement =
  document.getElementById('score');

const messageElement =
  document.getElementById('message');

const restartBtn =
  document.getElementById('restartBtn');

const deleteBtn =
  document.getElementById('deleteBtn');

const mergeBtn =
  document.getElementById('mergeBtn');

let score = 0;
let startX = 0;
let startY = 0;
let moving = false;
let nextId = 1;

let deleteUses = 3;
let mergeUses = 3;

let mode = null;

let grid = [];

function createEmptyGrid(){

  return [
    [null,null,null,null],
    [null,null,null,null],
    [null,null,null,null],
    [null,null,null,null]
  ];

}

function setupBoard(){

  board.innerHTML = '';

  for(let i = 0; i < 16; i++){

    const cell =
      document.createElement('div');

    cell.className =
      'bg-cell';

    board.appendChild(cell);

  }

}

function createTile(value,row,col){

  return {
    id: nextId++,
    value,
    row,
    col
  };

}

function init(){

  grid = createEmptyGrid();

  score = 0;

  deleteUses = 3;
  mergeUses = 3;

  mode = null;

  addRandomTile();
  addRandomTile();

  updateSpecialButtons();
  renderTiles();

  messageElement.textContent = '';

}

function updateSpecialButtons(){

  deleteBtn.textContent =
    '🗑 ' + deleteUses;

  mergeBtn.textContent =
    'Merge ' + mergeUses;

  deleteBtn.classList.remove(
    'special-active',
    'special-disabled'
  );

  mergeBtn.classList.remove(
    'special-active',
    'special-disabled'
  );

  if(mode === 'delete'){

    deleteBtn.classList.add(
      'special-active'
    );

  }

  if(mode === 'merge'){

    mergeBtn.classList.add(
      'special-active'
    );

  }

  if(deleteUses <= 0){

    deleteBtn.classList.add(
      'special-disabled'
    );

  }

  if(mergeUses <= 0){

    mergeBtn.classList.add(
      'special-disabled'
    );

  }

}

function addRandomTile(){

  const empty = [];

  for(let r = 0; r < 4; r++){

    for(let c = 0; c < 4; c++){

      if(!grid[r][c]){

        empty.push({r,c});

      }

    }

  }

  if(empty.length === 0) return;

  const spot =
    empty[Math.floor(Math.random()*empty.length)];

  grid[spot.r][spot.c] =
    createTile(
      Math.random() < 0.9 ? 2 : 4,
      spot.r,
      spot.c
    );

}

function getPosition(index){

  return `
    calc(${index} * (100% + 12px) / 4)
  `;

}

function renderTiles(){

  tilesLayer.innerHTML = '';

  for(let r = 0; r < 4; r++){

    for(let c = 0; c < 4; c++){

      const tile = grid[r][c];

      if(!tile) continue;

      const element =
        document.createElement('div');

      element.className =
        `tile tile-${tile.value}`;

      element.textContent =
        tile.value;

      element.style.left =
        getPosition(c);

      element.style.top =
        getPosition(r);

      element.addEventListener(
        'click',
        () => {

          handleTileClick(r,c);

        }
      );

      tilesLayer.appendChild(element);

    }

  }

  scoreElement.textContent = score;

  if(hasWon()){

    messageElement.textContent =
      'You reached 2048!';

  }
  else if(!canMove()){

    messageElement.textContent =
      'Game Over';

  }

}

function highestPowerOfTwo(n){

  let value = 2;

  while(value * 2 <= n){

    value *= 2;

  }

  return value;

}

function handleTileClick(row,col){

  const tile = grid[row][col];

  if(!tile) return;

  // DELETE
  if(mode === 'delete'){

    if(deleteUses <= 0) return;

    grid[row][col] = null;

    deleteUses--;

    mode = null;

    updateSpecialButtons();
    renderTiles();

    return;

  }

  // MERGE
  if(mode === 'merge'){

    if(mergeUses <= 0) return;

    const targetValue =
      tile.value;

    let total = 0;

    for(let r = 0; r < 4; r++){

      for(let c = 0; c < 4; c++){

        const current =
          grid[r][c];

        if(
          current &&
          current.value === targetValue
        ){

          total += current.value;

          grid[r][c] = null;

        }

      }

    }

    const finalValue =
      highestPowerOfTwo(total);

    grid[row][col] =
      createTile(
        finalValue,
        row,
        col
      );

    mergeUses--;

    mode = null;

    updateSpecialButtons();
    renderTiles();

  }

}

function compress(row){

  const filtered =
    row.filter(Boolean);

  while(filtered.length < 4){

    filtered.push(null);

  }

  return filtered;

}

function merge(row){

  for(let i = 0; i < 3; i++){

    const current = row[i];
    const next = row[i + 1];

    if(
      current &&
      next &&
      current.value === next.value
    ){

      current.value *= 2;

      score += current.value;

      row[i + 1] = null;

    }

  }

  return compress(row);

}

function moveLeft(){

  let changed = false;

  for(let r = 0; r < 4; r++){

    let row = grid[r];

    const old =
      JSON.stringify(
        row.map(x => x ? x.value : 0)
      );

    row = compress(row);
    row = merge(row);

    for(let c = 0; c < 4; c++){

      if(row[c]){

        row[c].row = r;
        row[c].col = c;

      }

    }

    const now =
      JSON.stringify(
        row.map(x => x ? x.value : 0)
      );

    if(old !== now){

      changed = true;

    }

    grid[r] = row;

  }

  return changed;

}

function rotate(){

  const newGrid =
    createEmptyGrid();

  for(let r = 0; r < 4; r++){

    for(let c = 0; c < 4; c++){

      const tile = grid[r][c];

      if(tile){

        newGrid[c][3-r] = tile;

      }

    }

  }

  grid = newGrid;

}

async function move(direction){

  if(moving) return;

  if(mode) return;

  moving = true;

  if(direction === 'up'){

    rotate();
    rotate();
    rotate();

  }

  if(direction === 'right'){

    rotate();
    rotate();

  }

  if(direction === 'down'){

    rotate();

  }

  const changed =
    moveLeft();

  if(direction === 'up'){

    rotate();

  }

  if(direction === 'right'){

    rotate();
    rotate();

  }

  if(direction === 'down'){

    rotate();
    rotate();
    rotate();

  }

  renderTiles();

  if(changed){

    await new Promise(resolve =>
      setTimeout(resolve,140)
    );

    addRandomTile();

    renderTiles();

  }

  moving = false;

}

function hasWon(){

  for(let r = 0; r < 4; r++){

    for(let c = 0; c < 4; c++){

      if(
        grid[r][c] &&
        grid[r][c].value === 2048
      ){

        return true;

      }

    }

  }

  return false;

}

function canMove(){

  for(let r = 0; r < 4; r++){

    for(let c = 0; c < 4; c++){

      const tile = grid[r][c];

      if(!tile) return true;

      if(
        c < 3 &&
        grid[r][c+1] &&
        grid[r][c+1].value === tile.value
      ){
        return true;
      }

      if(
        r < 3 &&
        grid[r+1][c] &&
        grid[r+1][c].value === tile.value
      ){
        return true;
      }

    }

  }

  return false;

}

window.addEventListener('keydown', e => {

  if(moving) return;

  switch(e.key){

    case 'ArrowLeft':
      move('left');
      break;

    case 'ArrowRight':
      move('right');
      break;

    case 'ArrowUp':
      move('up');
      break;

    case 'ArrowDown':
      move('down');
      break;

  }

});

board.addEventListener('touchstart', e => {

  startX =
    e.touches[0].clientX;

  startY =
    e.touches[0].clientY;

});

board.addEventListener('touchend', e => {

  const dx =
    e.changedTouches[0].clientX - startX;

  const dy =
    e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){

    if(dx > 40){

      move('right');

    }
    else if(dx < -40){

      move('left');

    }

  }
  else{

    if(dy > 40){

      move('down');

    }
    else if(dy < -40){

      move('up');

    }

  }

});

restartBtn.addEventListener(
  'click',
  init
);

deleteBtn.addEventListener(
  'click',
  () => {

    if(deleteUses <= 0) return;

    if(mode === 'delete'){

      mode = null;

    } else {

      mode = 'delete';

    }

    updateSpecialButtons();

  }
);

mergeBtn.addEventListener(
  'click',
  () => {

    if(mergeUses <= 0) return;

    if(mode === 'merge'){

      mode = null;

    } else {

      mode = 'merge';

    }

    updateSpecialButtons();

  }
);

setupBoard();
init();
</script>

</body>
</html>
