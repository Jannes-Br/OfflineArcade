<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,viewport-fit=cover"
>

<title>OfflineArcade</title>

<link rel="manifest" href="manifest.json">

<link
  rel="apple-touch-icon"
  href="assets/icon-512.png"
>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
>

<meta
  name="theme-color"
  content="#111827"
>

<link rel="stylesheet" href="style.css">

<script defer src="main.js"></script>

</head>

<body>

<div class="background-glow"></div>

<header>

  <h1>OfflineArcade</h1>

  <p class="subtitle">
    Offline Spieleplattform
  </p>

</header>

<main>

  <div class="game-grid">

    <a
      class="game-card"
      href="games/escape-road/index.html"
    >

      <div class="game-icon">
        🚗
      </div>

      <div class="game-title">
        Escape Road
      </div>

      <div class="game-description">
        Fliehe vor der Polizei
      </div>

    </a>

  </div>

</main>

<div id="app-info">

  <div>
    Version:
    <span id="version"></span>
  </div>

  <div>
    Update:
    <span id="last-update"></span>
  </div>

</div>

</body>
</html>
