<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,viewport-fit=cover"
>

<title>OfflineArcade</title>

<link rel="manifest" href="manifest.json">

<link
  rel="apple-touch-icon"
  href="assets/icon-512.png"
>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
>

<meta
  name="theme-color"
  content="#0f172a"
>

<link rel="stylesheet" href="style.css">

<script defer src="main.js"></script>

</head>

<body>

<div class="background"></div>

<div class="app">

<header>

  <h1>OfflineArcade</h1>

  <p class="subtitle">
    Offline gaming platform
  </p>

</header>

<main>

  <div class="games-wrapper">

    <div class="game-grid">

      <a
        class="game-card"
        href="games/escape-road/index.html"
      >

        <img
          class="game-thumb"
          src="assets/thumbnails/escape-road.png"
          alt="Escape Road"
        >

        <div class="game-content">

          <div class="game-title">
            Escape Road
          </div>

          <div class="game-description">
            Escape the police and survive the chase.
          </div>

        </div>

      </a>

    </div>

  </div>

</main>

<div id="app-info">

  <div class="status-row">

    <div id="status-dot"></div>

    <span id="online-status">
      Online
    </span>

  </div>

  <div>
    Version:
    <span id="version"></span>
  </div>

  <div>
    Last Update:
    <span id="last-update"></span>
  </div>

  <div id="update-status-row">

  <span id="last-update"></span>

</div>

</div>

</div>

</body>
</html>
